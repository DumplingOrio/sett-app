<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0e1013">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sett">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<title>Sett — workout log</title>
<style>
  :root{
    --bg:#0e1013; --card:#171a20; --card2:#1f242d; --line:#272d38;
    --text:#eceff4; --muted:#8b93a3; --faint:#5b6270;
    --accent:#ff7a3c; --accent-soft:rgba(255,122,60,.14);
    --good:#7ee081; --bad:#ff5c5c;
    --r:16px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--text);
    font:16px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    overscroll-behavior-y:none;
    /* F16: nothing may create horizontal page scroll — an off-screen sheet
       (translateX/Y 110vw) or an overflowing pill row would let iOS pan the app */
    overflow-x:clip;}
  /* --kb = live keyboard height (F12, set via visualViewport) so lists can
     scroll past the iOS keyboard instead of hiding their last entries */
  body{padding-bottom:calc(76px + env(safe-area-inset-bottom) + var(--kb,0px));}
  h1,h2,h3{margin:0; letter-spacing:-.02em;}
  button{font:inherit; color:inherit; background:none; border:none; cursor:pointer; padding:0;}
  input,textarea,select{font:inherit; color:var(--text); background:var(--card2);
    border:1px solid var(--line); border-radius:10px; padding:10px 12px; outline:none;
    min-width:0; max-width:100%;}
  input:focus,textarea:focus,select:focus{border-color:var(--accent);}
  ::placeholder{color:var(--faint);}

  .topbar{position:sticky; top:0; z-index:20; display:flex; align-items:center; gap:10px;
    padding:calc(10px + env(safe-area-inset-top)) 18px 10px;
    background:color-mix(in srgb, var(--bg) 88%, transparent); backdrop-filter:blur(12px);}
  .wordmark{font-weight:800; font-size:20px; letter-spacing:-.03em;}
  .wordmark span{color:var(--accent);}
  .topbar .vtitle{margin-left:auto; color:var(--muted); font-size:14px; font-weight:600;}
  .gearbtn{margin-left:14px; color:var(--muted); width:30px; height:30px; display:flex; align-items:center; justify-content:center;}
  .gearbtn svg{width:22px; height:22px;}
  .gearbtn.on{color:var(--accent);}

  /* min-height fills the viewport minus topbar (~50px + safe-top) and the
     body's tab-bar padding (76px + safe-bottom) WITHOUT exceeding it — a
     short view (More) must not overflow by a few px, or scrolling hits a
     dead edge instantly and feels broken (owner feedback 2026-07-06) */
  main{max-width:640px; margin:0 auto; padding:6px 16px 24px;
    min-height:70vh;
    min-height:calc(100dvh - 126px - env(safe-area-inset-top) - env(safe-area-inset-bottom));}

  .tabbar{position:fixed; left:0; right:0; bottom:0; z-index:30; display:flex;
    justify-content:space-around; padding:8px 8px calc(8px + env(safe-area-inset-bottom));
    background:color-mix(in srgb, var(--card) 92%, transparent); backdrop-filter:blur(14px);
    border-top:1px solid var(--line);
    transition:transform .2s cubic-bezier(.22,.61,.36,1);}
  /* F20: with the iOS keyboard up (--kb>0) iOS floats the fixed tabbar above it;
     slide it away while typing, restore on close. */
  .kb-open .tabbar{transform:translateY(120%);}
  .tab{display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--faint);
    font-size:11px; font-weight:600; min-width:56px; padding:4px 6px; border-radius:12px;}
  .tab svg{width:24px; height:24px;}
  .tab.on{color:var(--accent);}

  .card{background:var(--card); border:1px solid var(--line); border-radius:var(--r);
    padding:16px; margin:12px 0;}
  .card.resume{display:flex; align-items:center; gap:10px; cursor:pointer;
    background:var(--accent-soft); border-color:color-mix(in srgb, var(--accent) 35%, transparent);}
  .card.resume>.ico{color:var(--accent); flex:none;}
  .prlabel{color:var(--faint); text-transform:uppercase; letter-spacing:.05em; font-weight:700;}
  .pillbtn{display:inline-flex; align-items:center; gap:5px; padding:6px 10px; border-radius:9px;
    border:1px solid var(--line); background:var(--card2); color:var(--muted);
    font-size:12px; font-weight:700; flex:none;}
  .pillbtn .ico{width:13px; height:13px;}
  .pillbtn.on{background:var(--accent-soft); border-color:var(--accent); color:var(--accent);}
  .prbar{height:20px; background:var(--accent-soft); border-radius:6px; display:flex; align-items:center;
    padding:0 8px; font-size:11.5px; font-weight:700; color:var(--accent); white-space:nowrap;}
  .card h3{font-size:15px; margin-bottom:10px;}
  .row{display:flex; align-items:center; gap:10px;}
  .grow{flex:1; min-width:0;}
  .muted{color:var(--muted);} .small{font-size:13px;} .tiny{font-size:11px;}
  .right{text-align:right;}

  .btn{display:inline-flex; align-items:center; justify-content:center; gap:8px;
    background:var(--card2); border:1px solid var(--line); border-radius:12px;
    padding:12px 16px; font-weight:700; font-size:15px;}
  .btn.primary{background:var(--accent); border-color:var(--accent); color:#18100a;}
  .btn.danger{color:var(--bad); border-color:color-mix(in srgb, var(--bad) 40%, var(--line));}
  .btn.wide{width:100%;}
  .btn.ghost{background:none;}
  .iconbtn{width:38px; height:38px; display:inline-flex; align-items:center; justify-content:center;
    border-radius:10px; color:var(--muted); font-size:18px; flex:none;}
  .iconbtn:active{background:var(--card2);}

  .chip{display:inline-flex; align-items:center; gap:6px; padding:3px 10px; border-radius:99px;
    font-size:12px; font-weight:700; background:var(--card2); color:var(--muted); white-space:nowrap;}
  .chip .dot{width:8px; height:8px; border-radius:50%;}
  .chiprow{display:flex; gap:8px; overflow-x:auto; padding:4px 2px 8px; scrollbar-width:none;}
  .chiprow::-webkit-scrollbar{display:none;}
  .chiprow .chip.on{background:var(--accent-soft); color:var(--accent);}

  .hero{padding:26px 18px; text-align:center;}
  .hero .big{font-size:26px; font-weight:800; letter-spacing:-.03em;}
  /* F42: badger empty-state block — the mono badger over house copy, centered */
  .empty{text-align:center; padding:22px 18px;}
  .empty .badger{display:block; margin:0 auto 10px; opacity:.9;}
  .empty .big{font-size:20px; font-weight:800; letter-spacing:-.02em;}
  .empty p{margin:6px auto 0; max-width:32ch;}
  .badger{display:inline-block; vertical-align:middle;}

  .statgrid{display:grid; grid-template-columns:repeat(3,1fr); gap:10px;}
  .statgrid.two{grid-template-columns:1fr 1fr;}
  .stat{background:var(--card2); border-radius:12px; padding:12px;}
  .stat .v{font-size:20px; font-weight:800; letter-spacing:-.02em;}
  .stat .l{font-size:11px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.05em;}

  .listrow{display:flex; align-items:center; gap:12px; padding:13px 4px;
    border-bottom:1px solid var(--line); cursor:pointer;}
  .listrow:last-child{border-bottom:none;}

  /* logger */
  .setmenu{width:34px; height:34px; display:inline-flex; align-items:center; justify-content:center;
    color:var(--faint); font-size:18px; border-radius:9px;}
  .setmenu:active{background:var(--card2);}
  .menu{display:flex; flex-direction:column; margin-top:4px;}
  .menu button{display:flex; align-items:center; gap:10px; width:100%; text-align:left;
    padding:10px 4px; border:none; border-bottom:1px solid var(--line); background:none;
    color:var(--text); font-size:14px; font-weight:600;}
  .menu button .ico{width:16px; height:16px; flex:none;}   /* F19: icons never squash the label */
  .menu button:last-child{border-bottom:none;}
  .menu button.del{color:var(--bad);}
  .menu button:active{background:var(--card2);}
  /* F22: petite ⓘ affordance + collapsible explainer in the exercise ⋯ menu */
  .infobtn{width:30px; height:30px; flex:none; display:inline-flex; align-items:center; justify-content:center;
    border-radius:50%; color:var(--faint); border:1px solid var(--line);}
  .infobtn .ico{width:16px; height:16px;}
  .infobtn.on{color:var(--accent); border-color:var(--accent);}
  .exinfo{background:var(--card2); border:1px solid var(--line); border-radius:12px;
    padding:8px 12px; margin-bottom:10px;}
  .exinfo p{margin:4px 0; font-size:13px; line-height:1.4; color:var(--muted);}
  .exinfo b{color:var(--text);}
  .tgtgrid{display:grid; grid-template-columns:30px 1fr 1fr 1fr 34px; gap:8px; align-items:center; margin-top:8px;}
  .tgtgrid input{text-align:center; padding:11px 6px; font-weight:700; font-size:16px;}
  .setidx{color:var(--faint); font-weight:800; text-align:center; font-size:14px;}
  .setidx.drop{color:var(--accent);}
  .sethead{color:var(--faint); font-size:10px; font-weight:700; text-transform:uppercase;
    letter-spacing:.06em; text-align:center;}
  .ssbadge{font-size:10px; font-weight:800; letter-spacing:.04em; padding:2px 8px;
    border-radius:99px; background:var(--accent-soft); color:var(--accent);}
  .elapsed{font-variant-numeric:tabular-nums; font-weight:800; color:var(--accent);}
  /* drop-set toggle per row: labelled, obvious, tap again to undo */
  /* exercise control row (reorder / superset / delete) — labelled, own line */
  .exctrl{display:flex; gap:6px; flex-wrap:wrap; margin-top:10px;}
  .exctrl button{display:flex; align-items:center; gap:5px; padding:7px 11px; border-radius:10px;
    border:1px solid var(--line); background:var(--card2); color:var(--muted); font-size:12px; font-weight:700;}
  .exctrl button.on{background:var(--accent-soft); border-color:var(--accent); color:var(--accent);}
  .exctrl button.del{color:var(--bad); border-color:color-mix(in srgb, var(--bad) 35%, var(--line));}
  .exctrl .sp{flex:1;}
  .legend{display:flex; gap:14px; flex-wrap:wrap; margin-top:6px; font-size:11px; color:var(--faint);}
  .legend b{color:var(--accent);}

  /* ranks */
  .rankbadge{display:inline-flex; align-items:center; gap:7px; padding:4px 12px; border-radius:99px;
    font-weight:800; font-size:13px; border:1px solid;}
  .rankbar{height:6px; border-radius:99px; background:var(--card2); overflow:hidden; margin-top:6px;}
  .rankbar i{display:block; height:100%; border-radius:99px;}

  .spark{width:100%; height:56px;}
  .bigchart{width:100%; height:190px;}
  .datebadge{width:48px; flex:none; text-align:center; background:var(--card2);
    border-radius:10px; padding:5px 0 6px;}
  .datebadge .dow{font-size:10px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:.04em;}
  .datebadge .d{font-size:18px; font-weight:800; line-height:1.15;}
  .seg{display:flex; gap:6px; flex-wrap:wrap; margin:10px 0;}
  .seg button{padding:7px 13px; border-radius:99px; background:var(--card2); border:1px solid var(--line);
    font-size:13px; font-weight:700; color:var(--muted);}
  .seg button.on{background:var(--accent-soft); color:var(--accent); border-color:transparent;}
  .toggle{width:50px; height:30px; border-radius:99px; background:var(--card2); border:1px solid var(--line);
    position:relative; flex:none; transition:background .15s;}
  .toggle .knob{position:absolute; top:3px; left:3px; width:22px; height:22px; border-radius:50%;
    background:var(--faint); transition:transform .15s, background .15s;}
  .toggle.on{background:var(--accent-soft); border-color:var(--accent);}
  .toggle.on .knob{transform:translateX(20px); background:var(--accent);}

  /* modal */
  #overlay{position:fixed; inset:0; z-index:50; display:none; background:rgba(5,6,8,.72);
    backdrop-filter:blur(4px); overflow-y:auto; overflow-x:clip;
    overscroll-behavior:contain;}   /* F30: don't chain scroll to the page behind */
  #overlay.show{display:block; animation:ovl .2s ease-out;}
  @keyframes ovl{from{opacity:0;} to{opacity:1;}}
  /* F23: one animated dismissal for every close path — overlay fades while the
     sheet slides off; .closing suppresses the entrance animation. */
  #overlay.closing{animation:none; opacity:0; transition:opacity .22s cubic-bezier(.22,.61,.36,1);}
  .sheet.closing{animation:none; transition:transform .22s cubic-bezier(.22,.61,.36,1);}
  .sheet{max-width:640px; margin:8vh auto 0; background:var(--card); border:1px solid var(--line);
    border-radius:20px 20px 0 0; min-height:60vh; padding:0 18px calc(30px + env(safe-area-inset-bottom) + var(--kb,0px));
    animation:up .28s cubic-bezier(.22,.61,.36,1);
    transition:transform .22s cubic-bezier(.22,.61,.36,1);}
  .sheet.dragging{transition:none;}
  @keyframes up{from{transform:translateY(30px); opacity:.4;} to{transform:none; opacity:1;}}
  #main.slide-up{animation:sUp .34s cubic-bezier(.22,.61,.36,1);}
  #main.slide-left{animation:sLeft .42s cubic-bezier(.22,.61,.36,1);}
  #main.slide-right{animation:sRight .42s cubic-bezier(.22,.61,.36,1);}
  @keyframes sUp{from{opacity:0; transform:translateY(12px);} to{opacity:1; transform:none;}}
  @keyframes sLeft{from{opacity:0; transform:translateX(-26px);} to{opacity:1; transform:none;}}
  @keyframes sRight{from{opacity:0; transform:translateX(26px);} to{opacity:1; transform:none;}}
  .tab{transition:color .15s ease, transform .1s ease;}
  .tab:active{transform:scale(.9);}
  .sheethead{position:sticky; top:0; z-index:3; display:flex; align-items:center; justify-content:flex-end;
    height:52px; margin:0 -18px 4px; padding:0 14px;
    background:color-mix(in srgb, var(--card) 94%, transparent); backdrop-filter:blur(8px);
    border-radius:20px 20px 0 0;}
  .sheethead .grab{position:absolute; left:50%; top:9px; transform:translateX(-50%);
    width:44px; height:5px; border-radius:99px; background:var(--line);}
  .sheetclose{width:38px; height:38px; border-radius:50%; background:var(--card2); color:var(--text);
    font-size:17px; display:flex; align-items:center; justify-content:center; flex:none;}
  .sheetclose:active{background:var(--line);}

  #toast{position:fixed; left:50%; bottom:calc(90px + env(safe-area-inset-bottom)); transform:translateX(-50%);
    z-index:60; background:var(--card2); border:1px solid var(--line); color:var(--text);
    padding:10px 18px; border-radius:12px; font-weight:600; font-size:14px; display:none;
    max-width:88vw; text-align:center;}

  textarea.howto{width:100%; min-height:90px; resize:vertical;}
  .visual{background:#fff; border-radius:14px; overflow:hidden; margin:12px 0; text-align:center;}
  .visual img{display:block; width:100%; max-width:440px; margin:0 auto;}
  .thumb{width:52px; height:52px; border-radius:10px; background:#fff; object-fit:cover; flex:none;}
  .musclegrid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:12px 0;}
  .musclegrid .l{font-size:11px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.05em;}
  .musclegrid .v{font-weight:700; text-transform:capitalize;}
  ol.instructions{margin:0; padding-left:20px;}
  ol.instructions li{margin:7px 0; color:var(--text); font-size:14px;}
  .banner{background:var(--accent-soft); border:1px solid color-mix(in srgb, var(--accent) 35%, var(--line));
    color:var(--accent); border-radius:12px; padding:10px 14px; font-size:13px; font-weight:600; margin:12px 0;}
  #restbar{position:fixed; left:0; right:0; z-index:31; display:none; padding:0 12px;
    bottom:calc(84px + env(safe-area-inset-bottom)); pointer-events:none;}
  #restbar.show{display:block; animation:up .18s ease-out;}
  #restbar .inner{max-width:616px; margin:0 auto; pointer-events:auto; display:flex; align-items:center; gap:8px;
    background:var(--card2); border:1px solid var(--accent); border-radius:14px;
    box-shadow:0 10px 30px rgba(0,0,0,.45); padding:9px 12px;}
  #restbar .rlabel{font-size:10px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:.05em;}
  #restbar .rt{font-weight:800; font-size:22px; line-height:1.05; font-variant-numeric:tabular-nums; color:var(--accent);}
  #restbar .inner.done{border-color:var(--good);}
  #restbar .inner.done .rt{color:var(--good);}
  #restbar button{border:1px solid var(--line); background:var(--card); color:var(--text);
    border-radius:10px; padding:9px 11px; font-weight:700; font-size:13px; min-width:44px;}
  /* F29 (2026-07-06): the iOS long-press-to-reorder was selecting the row text
     mid-hold and firing the callout. Kill selection/callout on the reorder rows. */
  #rolist .listrow{user-select:none; -webkit-user-select:none; -webkit-touch-callout:none;}
  .draghandle{touch-action:none; cursor:grab; color:var(--faint); font-size:20px; line-height:1;
    padding:2px 8px 2px 0; margin-right:2px; align-self:center; user-select:none;}
  .draghandle:active{cursor:grabbing; color:var(--accent);}
  .excard.dragging{opacity:.92; box-shadow:0 14px 34px rgba(0,0,0,.55);}
  /* inline icons */
  .ico{width:18px; height:18px; flex:none; vertical-align:-3px;}
  .menu button .ico{width:20px; height:20px; color:var(--muted);}
  .menu button.del .ico{color:var(--bad);}
  .exctrl button .ico{width:15px; height:15px;}
  .btn .ico{width:17px; height:17px;}

  /* #1 RepCount-style set rows: circled number + compact left-packed Kg/Reps,
     values hug the left so the row no longer fills the whole bar */
  .excard{padding:14px 16px;}
  .setrow2{display:flex; align-items:center; gap:20px; padding:8px 0;}
  .setnum{width:26px; height:26px; flex:none; border:1.6px solid var(--line); border-radius:50%;
    display:grid; place-items:center; font-size:13px; font-weight:700; color:var(--muted);}
  .setnum.drop{border-color:var(--accent); color:var(--accent);}
  /* F26: warmup circle — distinct from drop's D (dashed border, warm accent) */
  .setnum.warm{border-style:dashed; border-color:var(--accent); color:var(--accent);}
  /* F26: petite warmup toggle — muted when off, accent when on; non-invading */
  .wtog{width:26px; height:26px; flex:none; border:1px solid var(--line); border-radius:8px;
    background:var(--card2); color:var(--faint); font-size:12px; font-weight:800; margin-right:2px;}
  .wtog.on{background:var(--accent-soft); border-color:var(--accent); color:var(--accent);}
  .setcell{display:flex; flex-direction:column; gap:1px;}
  .setcell label{font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--faint);}
  .setcell input{width:58px; text-align:left; padding:1px 0; font-size:18px; font-weight:800;
    background:transparent; border:none; border-radius:0;}
  .setrow2 .sp{flex:1;}
  .setmenu{width:30px; height:30px; font-size:16px;}
  /* F25 (2026-07-06): pills + the three icon buttons stay on ONE row that
     never wraps at 375px (owner's item-2 complaint was the icons wrapping
     BELOW the pills). nowrap + compact pills/icons keeps them in-bounds. */
  .exfoot{margin-top:12px; gap:2px; flex-wrap:nowrap; min-width:0;}
  .exfoot .pillbtn{white-space:nowrap; padding:6px 5px; font-size:11.5px; gap:3px;}
  .exi{width:32px; height:34px; flex:none; display:inline-flex; align-items:center; justify-content:center;
    border-radius:10px; color:var(--accent);}
  .exi:active{background:var(--card2);}
  .exi .ico{width:20px; height:20px;}
  /* F25: dense muted stats line under the footer; PR e1RM (its <b>) in accent */
  .cardstats{margin-top:8px; font-size:11.5px; color:var(--faint); font-weight:600;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .cardstats b{color:var(--accent); font-weight:800;}
  /* F36 (2026-07-06): a live set that beats the pre-workout record lights up —
     same accent-soft glow + border as the latched swipe state. Petite PR chip
     sits in the row; one accent line ("New e1RM record…") sits under the card. */
  .swipe.pr .swipe-fg{background:var(--accent-soft);}
  .swipe.pr{border-radius:12px; box-shadow:inset 0 0 0 1.5px color-mix(in srgb, var(--accent) 55%, transparent);}
  /* F36/F37: PR chip + beat-last-time hint share a micro-line under the set
     inputs (aligned left with the set number), so the input row never widens. */
  .setextra{display:flex; flex-wrap:wrap; gap:6px; margin:2px 0 4px 46px;}
  .prchip{display:inline-flex; align-items:center; padding:1px 7px; border-radius:99px;
    background:var(--accent); color:#18100a; font-size:10px; font-weight:800; letter-spacing:.04em;}
  .prline{margin-top:6px; font-size:11.5px; font-weight:700; color:var(--accent);
    white-space:normal; overflow-wrap:anywhere;}
  /* F37: petite beat-last-time suggestion chip — display-only */
  .hintchip{display:inline-flex; align-items:center; padding:1px 7px; border-radius:99px;
    background:var(--card2); color:var(--muted); font-size:10.5px; font-weight:700; white-space:nowrap;}
  /* F38: superset flow chip — "Next: <partner>" (accent-soft, chevron), taps to scroll */
  .ssflow{display:inline-flex; align-items:center; gap:4px; margin-top:8px; max-width:100%;
    padding:5px 10px; border-radius:99px; background:var(--accent-soft);
    border:1px solid color-mix(in srgb, var(--accent) 40%, transparent); color:var(--accent);
    font-size:11.5px; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .ssflow .ico{width:14px; height:14px; flex:none;}

  /* #3 rest button in the workout header corner */
  .hbtn{width:36px; height:36px; flex:none; display:inline-flex; align-items:center; justify-content:center;
    border-radius:10px; border:1px solid var(--line); background:var(--card2); color:var(--muted);}
  .hbtn:active{background:var(--line); color:var(--accent);}
  .hbtn .ico{width:19px; height:19px;}

  /* #5 swipe-to-reveal — OWNER SPEC, verbatim (2026-07-05): "when you swipe
     left, show the delete button on RIGHT SIDE, when you swipe right, show
     copy on the LEFT SIDE" — the row STOPS open and the button is TAPPED.
     Nothing ever fires from the swipe itself. */
  .swipe{position:relative; overflow:hidden;}
  .swipe .swipe-fg{position:relative; z-index:1; background:var(--card);
    transition:transform .2s cubic-bezier(.22,.61,.36,1);}
  .swipe.swiping .swipe-fg{transition:none;}

     seamless with the row, no solid slab. Reveal offset = button + margins. */
  .swipe.open-l .swipe-fg{transform:translateX(60px);}   /* swiped right → Copy shows left */
  .swipe.open-r .swipe-fg{transform:translateX(-60px);}  /* swiped left → Delete shows right */
  .swipe .swipe-act{position:absolute; top:5px; bottom:5px; width:48px;
    display:flex; align-items:center; justify-content:center; border-radius:12px;}
  .swipe .swipe-act.copy{left:6px; background:color-mix(in srgb, var(--accent) 16%, transparent);
    border:1px solid color-mix(in srgb, var(--accent) 40%, transparent); color:var(--accent);}
  .swipe .swipe-act.del{right:6px; background:color-mix(in srgb, var(--bad) 16%, transparent);
    border:1px solid color-mix(in srgb, var(--bad) 40%, transparent); color:var(--bad);}
  .swipe .swipe-act .ico{width:18px; height:18px;}
  .swipe:last-child .listrow{border-bottom:none;}

  @media(prefers-reduced-motion:reduce){*{animation:none!important; transition:none!important;}}
</style>

  let changed=false;const seen=new Set();

/* ============================== CSV import (RepCount export) ============================== */
function parseCsv(text){
  const rows=[];let field='',row=[],inQ=false;
  text=text.replace(/^﻿/,'');
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQ){
      if(c==='"'){if(text[i+1]==='"'){field+='"';i++;}else inQ=false;}
      else field+=c;
    }else if(c==='"')inQ=true;
    else if(c===';'){row.push(field);field='';}
    else if(c==='\n'){row.push(field);field='';if(row.some(f=>f!=='')||row.length>1)rows.push(row);row=[];}
    else if(c!=='\r')field+=c;
  }
  if(field!==''||row.length){row.push(field);if(row.some(f=>f!==''))rows.push(row);}
  return rows;
}
function importCsv(text){
  const rows=parseCsv(text);
  if(!rows.length||!/workout start/i.test(rows[0][0]||''))
    return {ok:false,msg:'Not a RepCount export — expected a header starting with "Workout Start".'};
  const existing=new Set(store.workouts.map(w=>w.start+'|'+w.end));
  const byKey=new Map();
  let sets=0;
  for(let i=1;i<rows.length;i++){
    const r=rows[i];if(r.length<12)continue;
    const [start,end,exRaw,weight,reps,note,kcal,dist,dur,cat,routine,bw]=r;
    const name=exRaw.trim();if(!name||!start)continue;
    const key=start+'|'+end;
    if(!byKey.has(key))byKey.set(key,{id:newWid(),start,end,
      routine:routine.trim(),bw:bw?parseFloat(bw):null,entries:[]});
    const w=byKey.get(key);
    if(routine.trim()&&!w.routine)w.routine=routine.trim();
    if(bw&&w.bw==null)w.bw=parseFloat(bw);
    ensureEx(name,cat.trim()||'Other');
    let entry=w.entries[w.entries.length-1];
    if(!entry||entry.name!==name){entry={name,ss:null,note:'',sets:[]};w.entries.push(entry);}
    entry.sets.push({
      w:weight===''?null:parseFloat(weight),
      r:reps===''?null:parseInt(reps,10),
      dur:dur===''?null:parseFloat(dur),
      dist:dist===''?null:parseFloat(dist),
      note:note.trim(),drop:false});
    sets++;
  }
  let added=0,skipped=0;
  for(const w of byKey.values()){
    if(existing.has(w.start+'|'+w.end)){skipped++;continue;}
    store.workouts.push(w);added++;
  }
  store.workouts.sort((a,b)=>a.start<b.start?1:-1);
  save();
  return {ok:true,added,skipped,sets,msg:'Imported '+added+' workouts ('+sets+' sets)'+(skipped?', skipped '+skipped+' already present':'')+'.'};
}

/* ============================== derived stats ============================== */
function allSetsOf(name,exclActive){
  const out=[];
  const ws=exclActive?((store&&store.workouts)||[]):statWorkouts();  // F24 + F26
  for(const w of ws)for(const e of w.entries)if(e.name===name)for(const s of e.sets)if(statSet(s))out.push({s,date:w.start});
  return out;
}
function exSessions(name){
  const out=[];
  for(const w of statWorkouts()){                                    // F24 + F26
    const sets=[];for(const e of w.entries)if(e.name===name)for(const s of e.sets)if(statSet(s))sets.push(s);
    if(!sets.length)continue;
    let best=null;for(const s of sets){const e1=epley(s.w,s.r);if(e1!=null&&(best==null||e1>best))best=e1;}
    out.push({date:w.start,sets,best,vol:sets.reduce((a,s)=>a+setVol(s),0)});
  }
  return out; // newest first (workouts sorted desc)
}
function prFor(name,exclActive){
  let maxW=null,maxWr=null,bestE1=null,bestSet=null,total=0,last=null;
  for(const {s,date} of allSetsOf(name,exclActive)){                 // F24: exclActive → history only (finishWorkout PR check)
    total++;if(!last||date>last)last=date;
    if(s.w!=null&&(maxW==null||s.w>maxW||(s.w===maxW&&(s.r||0)>(maxWr||0)))){maxW=s.w;maxWr=s.r;}
    const e1=epley(s.w,s.r);
    if(e1!=null&&(bestE1==null||e1>bestE1)){bestE1=e1;bestSet=s;}
  }
  return {maxW,maxWr,bestE1,bestSet,total,last,sessions:exSessions(name).length};
}
function latestBW(){for(const w of store.workouts)if(w.bw)return w.bw;return store.active&&store.active.bw||null;}

/* ============================== ranks ============================== */
function rankFor(name){
  const std=STD()[name];if(!std)return null;
  let value,unit,bw=null;
  if(std.t==='bw'){
    bw=latestBW();if(!bw)return {locked:'bw'};
    const pr=prFor(name);if(pr.bestE1==null||pr.bestE1<=0)return {locked:'data'};
    value=pr.bestE1/bw;unit='ratio';
  }else{
    let best=null;
    for(const {s} of allSetsOf(name))if((s.w==null||s.w===0)&&s.r&&(best==null||s.r>best))best=s.r;
    if(best==null)return {locked:'data'};
    value=best;unit='reps';
  }
  const s=std.s;
  let tier=0;while(tier<s.length&&value>=s[tier])tier++;
  const lo=tier===0?0:s[tier-1];
  const hi=tier<s.length?s[tier]:null;
  const prog=hi==null?1:Math.min(1,Math.max(0,(value-lo)/(hi-lo)));
  return {tier,value,unit,prog,bw,next:hi,e1:unit==='ratio'?value*bw:null};
}
function overallRank(){
  const parts=[];
  for(const name of Object.keys(STD())){
    const r=rankFor(name);
    if(r&&!r.locked)parts.push(r.tier+r.prog);
  }
  if(!parts.length)return null;
  const avg=parts.reduce((a,b)=>a+b,0)/parts.length;
  return {tier:Math.min(TIERS.length-1,Math.floor(avg)),prog:avg-Math.floor(avg),count:parts.length};
}
function rankBadge(tier,extra){
  const t=TIERS[tier];
  return '<span class="rankbadge" style="color:'+t.color+';border-color:'+t.color+'55;background:'+t.color+'14">'+t.name+(extra||'')+'</span>';
}
/* F40 (2026-07-06): what's left to rank up, from a rankFor() result. Weighted
   lifts → kg of e1RM to the next tier (next ratio × bodyweight − best e1RM,
   rounded to 0.5 kg); rep-based → reps to the next tier. Top tier (next==null)
   → a "Top tier" note with no gap. Returns {text, gap, frac, top} or null for a
   locked/absent rank. `frac` = progress fraction toward the next threshold, used
   by the Home "Closest to rank-up" card. */
function rankGap(rk){
  if(!rk||rk.locked)return null;
  const nextName=rk.tier<TIERS.length-1?TIERS[rk.tier+1].name:null;
  if(rk.next==null||!nextName)return {text:'Top tier',gap:0,frac:1,top:true};
  if(rk.unit==='reps'){
    const gap=Math.max(0,rk.next-rk.value);
    return {text:gap+' rep'+(gap===1?'':'s')+' to '+nextName,gap,frac:rk.prog,top:false};
  }
  // weighted: kg of e1RM to the next ratio at the current bodyweight
  const targetKg=rk.next*rk.bw;
  const gap=Math.max(0,Math.round((targetKg-rk.e1)*2)/2);
  return {text:fmtW(gap)+' kg of e1RM to '+nextName,gap,frac:rk.prog,top:false};
}
/* F40(b) (2026-07-06): the ranked lift closest to ranking up — highest progress
   fraction toward its next threshold, excluding top-tier lifts. Returns
   {name, rk, gap} or null (no ranked lifts, or all at top tier). Gated by the
   caller on showRanks(). */
function closestRankUp(){
  let best=null;
  for(const n of Object.keys(STD())){
    const rk=rankFor(n);if(!rk||rk.locked)continue;
    const gap=rankGap(rk);if(!gap||gap.top)continue;   // skip top-tier
    if(best==null||gap.frac>best.gap.frac)best={name:n,rk,gap};
  }
  return best;
}

/* F41 (2026-07-06): monthly recap. On Home, during any month where the PREVIOUS
   calendar month logged ≥1 workout and the recap for that month hasn't been
   dismissed, show a dismissable "Your <Month>" card. All figures come from
   store.workouts (finished history — the previous month is complete, so it
   never fluctuates with a live workout). Fork SETTLED: volume in tonnes.
   records = sets that month whose e1RM beat ALL prior history for that exercise
   (running PRs); top lift = exercise in the most sessions that month; delta =
   volume vs the month before. Warmups follow statSet (F26). */
function prevMonthKey(offset){
  const d=new Date();d.setDate(1);d.setMonth(d.getMonth()-(offset||1));
  return d.getFullYear()+'-'+pad2(d.getMonth()+1);
}
function monthAgg(mk){
  let sessions=0,vol=0;const topCount={};
  for(const w of store.workouts){
    if(monthKey(w.start)!==mk)continue;
    sessions++;
    const seen=new Set();
    for(const e of w.entries){
      if(!seen.has(e.name)){seen.add(e.name);topCount[e.name]=(topCount[e.name]||0)+1;}
      for(const s of e.sets)if(statSet(s))vol+=setVol(s);
    }
  }
  return {sessions,vol,topCount};
}
function monthRecords(mk){
  /* running PRs: a set counts if its e1RM beats every prior e1RM for that
     exercise across ALL history up to (and excluding) that set. Iterate oldest
     → newest so "prior" is well-defined. */
  const asc=[...store.workouts].sort((a,b)=>a.start<b.start?-1:1);
  const bestSoFar={};let records=0;
  for(const w of asc){
    const inMonth=monthKey(w.start)===mk;
    for(const e of w.entries)for(const s of e.sets){
      if(!statSet(s))continue;
      const e1=epley(s.w,s.r);if(e1==null||e1<=0)continue;
      const prev=bestSoFar[e.name];
      if(prev==null||e1>prev){if(inMonth)records++;bestSoFar[e.name]=e1;}
    }
  }
  return records;
}
function monthlyRecap(){
  const mk=prevMonthKey(1);
  if(store.settings&&store.settings.recapDismissed===mk)return null;   // dismissed
  const a=monthAgg(mk);
  if(!a.sessions)return null;                                          // no prior-month workouts
  const prev=monthAgg(prevMonthKey(2));
  const top=Object.entries(a.topCount).sort((x,y)=>y[1]-x[1])[0]||null;
  const records=monthRecords(mk);
  // delta vs the month before (volume)
  let delta=null;
  if(prev.vol>0){
    const pct=Math.round((a.vol-prev.vol)/prev.vol*100);
    const prevName=MONTHS[+prevMonthKey(2).slice(5)-1];
    delta={pct,up:pct>0,prevName};
  }
  return {mk,monthName:MONTHS[+mk.slice(5)-1],sessions:a.sessions,vol:a.vol,records,top,delta};
}
function recapCardHtml(){
  const r=monthlyRecap();if(!r)return '';
  const tonnes=(r.vol/1000).toFixed(1)+' t';
  let deltaHtml='';
  if(r.delta){
    const word=r.delta.pct>0?'up':r.delta.pct<0?'down':'flat';
    const col=r.delta.up?'var(--good)':'var(--muted)';
    deltaHtml='<div class="tiny" style="color:'+col+';margin-top:8px;font-weight:700">Volume '+word+
      (r.delta.pct!==0?' '+Math.abs(r.delta.pct)+'%':'')+' vs '+esc(r.delta.prevName)+'</div>';
  }
  return '<div class="card" style="background:var(--accent-soft);border-color:color-mix(in srgb, var(--accent) 35%, var(--line))">'+
    '<div class="row" style="align-items:flex-start"><h3 class="grow" style="margin:0">Your '+esc(r.monthName)+'</h3>'+
    '<button class="iconbtn" title="Dismiss" aria-label="Dismiss recap" data-mk="'+esc(r.mk)+'" onclick="dismissRecap(this.dataset.mk)" style="width:28px;height:28px;margin:-4px -4px 0 0">✕</button></div>'+
    '<div class="statgrid" style="margin-top:10px">'+
      '<div class="stat"><div class="v">'+r.sessions+'</div><div class="l">sessions</div></div>'+
      '<div class="stat"><div class="v">'+tonnes+'</div><div class="l">volume</div></div>'+
      '<div class="stat"><div class="v">'+r.records+'</div><div class="l">record'+(r.records===1?'':'s')+'</div></div>'+
    '</div>'+
    (r.top?'<div class="tiny muted" style="margin-top:10px">Top lift · <b style="color:var(--text)">'+esc(r.top[0])+'</b> ×'+r.top[1]+'</div>':'')+
    deltaHtml+
    '</div>';
}
function dismissRecap(mk){
  store.settings=store.settings||{};store.settings.recapDismissed=mk;save();render();
}

function renderLog(){
  if(store.active)return renderActive();

function historyList(){
  const perMonth={};
  for(const w of store.workouts)perMonth[monthKey(w.start)]=(perMonth[monthKey(w.start)]||0)+1;
  let h='',curMonth='';
  for(const w of store.workouts){
    const mk=monthKey(w.start);
    if(mk!==curMonth){if(curMonth)h+='</div>';curMonth=mk;
      h+='<div class="row" style="margin:18px 4px 4px"><h3 class="grow" style="font-size:14px;color:var(--muted)">'+fmtMonth(w.start)+'</h3>'+
         '<span class="tiny muted">'+perMonth[mk]+' workout'+(perMonth[mk]>1?'s':'')+'</span></div><div class="card" style="padding:4px 14px">';}
    const nsets=w.entries.reduce((t,e)=>t+e.sets.length,0);
    const vol=w.entries.reduce((t,e)=>t+e.sets.reduce((x,s)=>x+(statSet(s)?setVol(s):0),0),0);   // F26: warmups out of volume by default
    h+='<div class="swipe" data-swipe="wk">'+
      '<button class="swipe-act del" aria-label="Delete workout" title="Delete" data-id="'+esc(w.id)+'" onclick="swipeDeleteWorkout(this.dataset.id)">'+ico('trash')+'</button>'+
      '<div class="swipe-fg listrow" onclick="openWorkout(\''+esc(w.id)+'\')">'+dateBadge(w.start)+
      '<div class="grow"><div style="font-weight:700">'+esc(w.routine||'Workout')+'</div>'+
      '<div class="tiny muted">'+w.entries.length+' exercises · '+nsets+' sets · '+fmtDur(w.start,w.end)+'</div></div>'+
      '<div class="right small"><div style="font-weight:700">'+fmtNum(vol)+' kg</div></div></div></div>';
  }
  if(curMonth)h+='</div>';
  return h;
}

/* ---- saved routines (store.routines): editor + lifecycle ---- */
function newRoutine(){state.editRoutine={id:null,name:'',exercises:[]};render();playViewAnim('up');}
function editRoutineById(id){const r=store.routines.find(x=>x.id===id);if(!r)return;
  state.editRoutine=JSON.parse(JSON.stringify(r));render();playViewAnim('up');}
function cancelRoutineEdit(){state.editRoutine=null;render();playViewAnim('up');}
function deleteRoutine(id){const r=store.routines.find(x=>x.id===id);if(!r)return;
  if(!confirm('Delete routine “'+r.name+'”? This cannot be undone.'))return;
  store.routines=store.routines.filter(x=>x.id!==id);save();render();}
function addTgtSet(xi){const ex=state.editRoutine.exercises[xi];const p=ex.sets[ex.sets.length-1];
  ex.sets.push(p?{...p}:{tw:null,rlo:null,rhi:null});render();}
function removeTgtSet(xi,si){state.editRoutine.exercises[xi].sets.splice(si,1);render();}
function removeRoutineEx(xi){state.editRoutine.exercises.splice(xi,1);render();}
function moveRoutineEx(xi,dir){const es=state.editRoutine.exercises,j=xi+dir;if(j<0||j>=es.length)return;
  [es[xi],es[j]]=[es[j],es[xi]];render();}
function toggleRoutineSS(xi){
  const es=state.editRoutine.exercises,e=es[xi],prev=es[xi-1];if(!prev)return;
  if(e.ss!=null&&e.ss===prev.ss){e.ss=null;}
  else{if(prev.ss==null){let g=0;for(const x of es)if(x.ss!=null)g=Math.max(g,x.ss+1);prev.ss=g;}e.ss=prev.ss;}
  render();
}
function saveRoutine(){
  const d=state.editRoutine;const name=(d.name||'').trim();
  if(!name){toast('Name your routine first');return;}
  if(!d.exercises.length){toast('Add at least one exercise');return;}
  const clean={id:d.id||('r'+Date.now()),name,
    exercises:d.exercises.map(ex=>({name:ex.name,ss:ex.ss??null,
      sets:ex.sets.map(t=>({tw:t.tw??null,rlo:t.rlo??null,rhi:t.rhi??null}))}))};
  const idx=store.routines.findIndex(x=>x.id===clean.id);
  if(idx>=0)store.routines[idx]=clean;else store.routines.push(clean);
  state.editRoutine=null;save();toast('Routine saved');render();playViewAnim('up');
}

function startRoutine(id){
  const r=store.routines.find(x=>x.id===id);if(!r)return;
  if(store.active&&!store.active.editing){toast('Finish or discard the current workout first');return;}
  for(const ex of r.exercises)ensureEx(ex.name);
  store.active={start:nowStr(),routine:r.name,bw:latestBW(),fromRoutine:r.id||r.name||true,   /* F31: routine-started → no in-workout "Save as routine" */
    entries:r.exercises.map(ex=>({name:ex.name,ss:ex.ss??null,note:'',
      sets:ex.sets.map(t=>({w:null,r:null,dur:null,dist:null,note:'',drop:false,tgt:{tw:t.tw??null,rlo:t.rlo??null,rhi:t.rhi??null}}))}))};
  save();setView('log');toast('Started “'+r.name+'”');
}
function startPopular(i){
  if(store.active&&!store.active.editing){toast('Finish or discard the current workout first');return;}
  const r=POPULAR_ROUTINES[i];if(!r)return;
  for(const n of r.ex)ensureEx(n);
  store.active={start:nowStr(),routine:r.name,bw:latestBW(),fromRoutine:r.name||true,   /* F31: popular routine → no in-workout "Save as routine" */
    entries:r.ex.map(n=>({name:n,ss:null,note:'',sets:[{w:null,r:null,dur:null,dist:null,note:'',drop:false}]}))};
  save();setView('log');toast('Started “'+r.name+'”');
}
/* F33 (2026-07-06) OWNER SPEC, verbatim: "Pressing on a routine/previous
   workout shouldn't instantly start a new workout, let the user confirm if
   they want to start it." A petite confirm sheet — name + N exercises · M sets
   summary + a primary Start; normal sheet dismissals cancel. The existing
   "finish or discard current workout first" guard fires BEFORE the confirm
   (no point confirming what can't start). Dataset pattern keeps the
   apostrophe foot-gun out of the Start handler. */
function confirmStart(kind,arg){
  if(store.active&&!store.active.editing){toast('Finish or discard the current workout first');return;}
  let name='',nex=0,nsets=0;
  if(kind==='routine'){const r=store.routines.find(x=>x.id===arg);if(!r)return;
    name=r.name;nex=r.exercises.length;nsets=r.exercises.reduce((n,e)=>n+e.sets.length,0);}
  else if(kind==='popular'){const r=POPULAR_ROUTINES[arg];if(!r)return;
    name=r.name;nex=r.ex.length;nsets=r.ex.length;}
  else if(kind==='repeat'){const w=store.workouts.find(x=>x.id===arg);if(!w)return;
    name=w.routine||'Workout';nex=w.entries.length;nsets=w.entries.reduce((n,e)=>n+e.sets.length,0);}
  else return;
  openModal('<h2 style="word-break:break-word">'+esc(name)+'</h2>'+
    '<p class="muted small" style="margin:6px 0 14px">'+nex+' exercise'+(nex===1?'':'s')+' · '+nsets+' set'+(nsets===1?'':'s')+
      (kind==='repeat'?' · last time\'s numbers shown as hints':'')+'</p>'+
    '<button class="btn primary wide" data-cs-kind="'+kind+'" data-cs-arg="'+esc(String(arg))+'" onclick="doConfirmedStart(this.dataset.csKind,this.dataset.csArg)">Start workout</button>');
}
function doConfirmedStart(kind,arg){
  closeModal();
  if(kind==='routine')startRoutine(arg);
  else if(kind==='popular')startPopular(+arg);
  else if(kind==='repeat')repeatWorkout(arg);
}
/* Monday-start boundary of the current week — the app's single week definition,
   reused by weekSummary and the F39 muscle-group "This week" timeframe. */
function weekStart(){
  const now=new Date();const day=(now.getDay()+6)%7; // Monday start
  const mon=new Date(now);mon.setHours(0,0,0,0);mon.setDate(now.getDate()-day);
  return mon;
}
function weekSummary(){
  const mon=weekStart();
  let n=0;for(const w of statWorkouts()){if(toDate(w.start)>=mon)n++;else break;}   // F24: count the live workout too
  return n===0?'No workouts yet this week.':n+' workout'+(n>1?'s':'')+' this week.';
}
function startWorkout(){if(store.active&&!store.active.editing){toast('Finish or discard the current workout first');return;}store.active={start:nowStr(),routine:'',bw:latestBW(),entries:[]};save();setView('log');}
function repeatWorkout(wid){
  const src=store.workouts.find(w=>w.id===wid);if(!src)return;
  if(store.active&&!store.active.editing){toast('Finish or discard the current workout first');return;}
  for(const e of src.entries)ensureEx(e.name);
  store.active={start:nowStr(),routine:src.routine,bw:latestBW(),
    entries:src.entries.map(e=>({name:e.name,ss:e.ss??null,note:'',
      sets:e.sets.map(s=>({w:null,r:null,dur:null,dist:null,note:'',drop:false,
        tgt:{tw:s.w??null,rlo:s.r??null,rhi:s.r??null}}))}))};
  save();closeModal();setView('log');toast('Repeating “'+(src.routine||'workout')+'” — last time\'s numbers shown as hints');
}

/* F36 (2026-07-06): the PR moment. A live set that beats the PRE-WORKOUT record

   editing; warmups only trigger when the F26 setting counts them (statSet).

function histBestReps(name){

function prMoment(ei){

  const prevReps=histBestReps(e.name);            // history-only best bodyweight reps
  let bestE1=null,bestE1Si=-1,bestReps=null,bestRepsSi=-1;
  e.sets.forEach((s,si)=>{
    if(!statSet(s))return;                        // warmups excluded unless the setting counts them

      const v=epley(s.w,s.r);
      if(v!=null&&(bestE1==null||v>bestE1)){bestE1=v;bestE1Si=si;}
    }else if(s.r){                                // bodyweight/rep-based set
      if(bestReps==null||s.r>bestReps){bestReps=s.r;bestRepsSi=si;}
    }

  if(bestE1!=null&&bestE1>0&&(prevE1==null||bestE1>prevE1))
    return {si:bestE1Si,kind:'e1',val:bestE1,prev:prevE1};

function roDragEnd(){

  document.removeEventListener('pointermove',roDragMove);
  document.removeEventListener('pointerup',roDragEnd);
  document.removeEventListener('pointercancel',roDragEnd);
  const from=roDrag.from;let to=roDrag.target;if(to>from)to--;
  const row=roDrag.row;const allRows=roDrag.rows;roDrag=null;
  /* F32: strip the neighbor transitions/transforms before the DOM commit so
     the settle lands without a re-render fighting the eased transforms. */
  for(const r of allRows){r.style.transition='';r.style.transform='';}
  row.style.transform='';row.style.position='';row.style.zIndex='';row.style.background='';
  row.style.boxShadow='';row.style.borderRadius='';row.style.touchAction='pan-y';
  if(to!==from&&to>=0&&store.active){
    const es=store.active.entries;const[m]=es.splice(from,1);es.splice(to,0,m);cleanSS();save();
    /* F29 (2026-07-06): move the existing DOM row in place — NO openReorder()
       rebuild mid-gesture (the full-modal rebuild + scroll-restore hack bugged
       out the menu). Re-index data-ro on the surviving rows; the main Log
       re-renders quietly without touching the open sheet. */
    const list=$('rolist');
    if(list){
      const rows=[...list.querySelectorAll('[data-ro]')];
      const moved=rows[from];
      list.removeChild(moved);                       // drop it, then reinsert at the target slot
      const rest=[...list.querySelectorAll('[data-ro]')];
      if(to>=rest.length)list.appendChild(moved);
      else list.insertBefore(moved,rest[to]);
      [...list.querySelectorAll('[data-ro]')].forEach((r,i)=>{
        r.dataset.ro=i;const hd=r.querySelector('[data-rodrag]');if(hd)hd.dataset.rodrag=i;
      });
    }else{render();return;}
    renderQuietLog();   // keep the underlying workout view in sync, sheet untouched
  }
}

/* ============================== rest timer ============================== */
let restTimer=null, restEnd=0, restTotal=0, _actx=null;
function restDefault(){return (store.settings&&store.settings.restTime)||90;}
function restAutoOn(){return !(store.settings&&store.settings.restAuto===false);}
function setRestTime(sec){sec=Math.max(15,Math.min(600,sec));store.settings=store.settings||{};store.settings.restTime=sec;save();render();}
function setRestAuto(on){store.settings=store.settings||{};store.settings.restAuto=on;save();render();}
function primeBeep(){try{_actx=_actx||new (window.AudioContext||window.webkitAudioContext)();if(_actx.state==='suspended')_actx.resume();}catch(e){}}
function beep(){try{if(!_actx)return;const t=_actx.currentTime;const o=_actx.createOscillator(),g=_actx.createGain();
  o.frequency.value=880;o.connect(g);g.connect(_actx.destination);
  g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(.35,t+.02);g.gain.exponentialRampToValueAtTime(.0001,t+.45);
  o.start(t);o.stop(t+.5);}catch(e){}}
function startRest(sec){
  primeBeep();
  restTotal=sec||restDefault();restEnd=Date.now()+restTotal*1000;
  $('restbar').classList.add('show');
  clearInterval(restTimer);restTimer=setInterval(tickRest,200);tickRest();
}
function tickRest(){
  const leftMs=restEnd-Date.now();
  drawRestBar(Math.max(0,Math.ceil(leftMs/1000)),false);
  if(leftMs<=0)finishRest();
}
function drawRestBar(left,done){
  $('restbar').innerHTML='<div class="inner'+(done?' done':'')+'">'+
    '<div><div class="rlabel">'+(done?'Rest done':'Rest')+'</div>'+
    '<div class="rt">'+Math.floor(left/60)+':'+pad2(left%60)+'</div></div>'+
    '<span style="flex:1"></span>'+
    (done?'<button onclick="stopRest()">Dismiss</button>':
      '<button onclick="addRest(-15)">−15</button><button onclick="addRest(15)">+15</button>'+
      '<button onclick="stopRest()">Skip</button>')+'</div>';
}
function addRest(d){restEnd+=d*1000;const now=Date.now();if(restEnd<now+1000)restEnd=now+1000;
  if(restEnd-now>restTotal*1000)restTotal=Math.ceil((restEnd-now)/1000);tickRest();}
function finishRest(){
  clearInterval(restTimer);restTimer=null;
  drawRestBar(0,true);beep();if(navigator.vibrate)navigator.vibrate([120,60,120]);
  clearTimeout(finishRest._t);finishRest._t=setTimeout(stopRest,6000);
}
function stopRest(){clearInterval(restTimer);restTimer=null;clearTimeout(finishRest._t);
  const b=$('restbar');b.classList.remove('show');b.innerHTML='';}
/* ============================== drag-to-reorder (active workout) ============================== */
let drag=null;
function dragCards(){return [...document.querySelectorAll('#main .excard')];}
function startDrag(e,handle){
  if(!store.active)return;
  const card=handle.closest('.excard');if(!card)return;
  const cards=dragCards();
  drag={pid:e.pointerId,card,from:+card.dataset.ei,startY:e.clientY,
    centers:cards.map(c=>{const r=c.getBoundingClientRect();return r.top+r.height/2;}),target:+card.dataset.ei};
  try{handle.setPointerCapture(e.pointerId);}catch(_){}
  card.classList.add('dragging');
  document.addEventListener('pointermove',onDragMove,{passive:false});
  document.addEventListener('pointerup',onDragEnd);
  document.addEventListener('pointercancel',onDragEnd);
  e.preventDefault();
}
function onDragMove(e){
  if(!drag)return;e.preventDefault();
  drag.card.style.transition='none';
  drag.card.style.transform='translateY('+(e.clientY-drag.startY)+'px)';
  drag.card.style.position='relative';drag.card.style.zIndex='20';
  let ti=0;for(const c of drag.centers)if(e.clientY>c)ti++;
  ti=Math.max(0,Math.min(drag.centers.length,ti));drag.target=ti;
  const f=drag.from, slot=drag.card.offsetHeight+24; // card height + vertical margin
  dragCards().forEach((c,i)=>{
    if(i===f)return;
    let shift=0;
    if(f<ti){if(i>f&&i<ti)shift=-slot;}       // dragging down: cards above the gap slide up
    else if(ti<f){if(i>=ti&&i<f)shift=slot;}  // dragging up: cards below the gap slide down
    c.style.transition='transform .18s cubic-bezier(.22,.61,.36,1)';
    c.style.transform=shift?'translateY('+shift+'px)':'';
  });
}
function onDragEnd(){
  if(!drag)return;
  document.removeEventListener('pointermove',onDragMove);
  document.removeEventListener('pointerup',onDragEnd);
  document.removeEventListener('pointercancel',onDragEnd);
  const from=drag.from;let to=drag.target;if(to>from)to--;
  drag=null;
  dragCards().forEach(c=>{c.classList.remove('dragging');c.style.transition='';c.style.transform='';c.style.position='';c.style.zIndex='';});
  if(store.active&&to!==from&&to>=0){
    const es=store.active.entries;const [m]=es.splice(from,1);es.splice(to,0,m);save();render();
  }
}
function discardWorkout(){
  const editing=store.active&&store.active.editing;
  if(!confirm(editing?'Cancel editing? Your changes will be lost.':'Discard this workout? Nothing will be saved.'))return;
  store.active=null;save();clearInterval(tick);
  if(editing)render();else setView('routines');
}
function finishWorkout(){
  const a=store.active;
  const entries=a.entries.map(e=>({...e,sets:e.sets.filter(s=>s.w!=null||s.r!=null||s.dur!=null||s.dist!=null).map(({tgt,...s})=>s)})).filter(e=>e.sets.length);
  if(!entries.length){toast('Log at least one set first');return;}
  if(a.editing){
    const idx=store.workouts.findIndex(x=>x.id===a.editing);
    const w={id:a.editing,start:a.start,end:a.end||a.start,routine:a.routine.trim(),bw:a.bw||null,entries};
    for(const e of entries)ensureEx(e.name);
    if(idx>=0)store.workouts[idx]=w;else store.workouts.unshift(w);
    store.workouts.sort((x,y)=>x.start<y.start?1:-1);
    store.active=null;save();toast('Workout updated');setView('log');
    return;
  }
  // PR check against history before saving
  const prs=[];
  for(const e of entries){
    const before=prFor(e.name,true).bestE1;   // F24: compare against HISTORY only, not the workout being finished
    let best=null;for(const s of e.sets){if(!statSet(s))continue;const v=epley(s.w,s.r);if(v!=null&&(best==null||v>best))best=v;}
    if(best!=null&&best>0&&(before==null||best>before))prs.push({name:e.name,e1:best});
    ensureEx(e.name);
  }
  const w={id:newWid(),start:a.start,end:nowStr(),routine:a.routine.trim(),bw:a.bw||null,entries};
  store.workouts.unshift(w);store.workouts.sort((x,y)=>x.start<y.start?1:-1);
  store.active=null;save();clearInterval(tick);
  const vol=entries.reduce((t,e)=>t+e.sets.reduce((x,s)=>x+(statSet(s)?setVol(s):0),0),0);   // F26
  const nsets=entries.reduce((t,e)=>t+e.sets.length,0);
  openModal('<div style="text-align:center;margin-bottom:6px">'+badgerSVG(64)+'</div>'+
    '<h2 style="margin-bottom:4px;text-align:center">Workout saved</h2>'+
    '<p class="muted small" style="text-align:center">'+fmtDur(w.start,w.end)+' · '+nsets+' sets · '+fmtNum(vol)+' kg volume</p>'+
    (prs.length?'<div class="card"><h3>New records</h3>'+prs.map(p=>'<div class="listrow" style="cursor:default"><div class="grow">'+esc(p.name)+'</div><b style="color:var(--good)">e1RM '+fmtW(p.e1)+' kg</b></div>').join('')+'</div>':'')+
    '<button class="btn primary wide" onclick="closeModal();setView(\'log\')">Nice</button>');
  render();
}

/* line chart with axis labels; pts=[{t:label, y:number}] ascending in time */
function lineChart(pts,fmtY){
  fmtY=fmtY||(v=>fmtNum(v));
  if(!pts.length)return '<p class="muted small">No data in this range.</p>';
  const W=560,H=190,L=56,R=12,T=14,B=28;
  const ys=pts.map(p=>p.y);let min=Math.min(...ys),max=Math.max(...ys);
  if(min===max){min-=1;max+=1;}
  const nx=i=>pts.length===1?(L+(W-L-R)/2):L+i*(W-L-R)/(pts.length-1);
  const ny=v=>T+(H-T-B)*(1-(v-min)/(max-min));
  let s='<svg class="bigchart" viewBox="0 0 '+W+' '+H+'">';
  for(const v of [min,(min+max)/2,max]){
    s+='<line x1="'+L+'" y1="'+ny(v)+'" x2="'+(W-R)+'" y2="'+ny(v)+'" stroke="var(--line)" stroke-width="1"/>'+
       '<text x="'+(L-8)+'" y="'+(ny(v)+4)+'" font-size="11" fill="var(--muted)" text-anchor="end">'+fmtY(v)+'</text>';
  }
  const path=pts.map((p,i)=>(i?'L':'M')+nx(i).toFixed(1)+' '+ny(p.y).toFixed(1)).join(' ');
  s+='<path d="'+path+'" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';
  if(pts.length<=30)pts.forEach((p,i)=>{s+='<circle cx="'+nx(i)+'" cy="'+ny(p.y)+'" r="3" fill="var(--accent)"/>';});
  else s+='<circle cx="'+nx(pts.length-1)+'" cy="'+ny(pts[pts.length-1].y)+'" r="4" fill="var(--accent)"/>';
  s+='<text x="'+L+'" y="'+(H-8)+'" font-size="11" fill="var(--faint)">'+esc(pts[0].t)+'</text>'+
     '<text x="'+(W-R)+'" y="'+(H-8)+'" font-size="11" fill="var(--faint)" text-anchor="end">'+esc(pts[pts.length-1].t)+'</text></svg>';
  return s;
}

/* personal records incl. rep-max frontier */
function repRecords(name){
  const best={};
  for(const {s,date} of allSetsOf(name))
    if(s.w!=null&&s.w>0&&s.r&&s.r<=20&&(!best[s.r]||s.w>best[s.r].w))best[s.r]={w:s.w,date};
  const rs=Object.keys(best).map(Number).sort((a,b)=>b-a);
  const out=[];let maxW=-1;
  for(const r of rs){if(best[r].w>maxW){out.push({r,...best[r]});maxW=best[r].w;}}
  return out.reverse(); // ascending reps, strictly decreasing... increasing weight toward low reps
}

function sparkSvg(pts,cls){
  const w=560,h=56,min=Math.min(...pts),max=Math.max(...pts),pad=4;
  const nx=i=>pad+i*(w-2*pad)/(pts.length-1);
  const ny=v=>max===min?h/2:h-pad-(v-min)*(h-2*pad)/(max-min);
  const line=pts.map((v,i)=>(i?'L':'M')+nx(i).toFixed(1)+' '+ny(v).toFixed(1)).join(' ');
  return '<svg class="'+cls+'" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none">'+
    '<path d="'+line+'" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round"/>'+
    '<circle cx="'+nx(pts.length-1)+'" cy="'+ny(pts[pts.length-1])+'" r="4" fill="var(--accent)"/></svg>';
}

/* F39 (2026-07-06): muscle-group set counts within a timeframe. Routes through
   statWorkouts() (so the live workout counts, F24) and statSet() (warmup
   exclusion, F26). "This week" reuses weekStart() — the app's one week
   definition. Timeframe lives in transient state.mgFrame (never persisted). */
const MG_FRAMES={week:'This week',month:'This month','3m':'3 months','1y':'1 year',all:'All time'};
function mgCutoff(frame){
  if(frame==='week')return weekStart().getTime();
  const now=new Date();
  if(frame==='month'){const d=new Date(now);d.setHours(0,0,0,0);d.setDate(1);return d.getTime();}
  if(frame==='3m')return Date.now()-90*86400000;
  if(frame==='1y')return Date.now()-365*86400000;
  return 0;   // all time
}
function muscleCounts(frame){
  const cutoff=mgCutoff(frame);const catCount={};
  for(const w of statWorkouts()){                                    // F24: includes the live workout
    if(cutoff&&toDate(w.start).getTime()<cutoff)continue;
    for(const e of w.entries){
      const c=(store.ex[e.name]||{}).cat||'Other';
      let n=0;for(const s of e.sets)if(statSet(s))n++;               // F26: warmups excluded unless counted
      if(n)catCount[c]=(catCount[c]||0)+n;
    }
  }
  return catCount;
}
function muscleGroupCard(){
  const frame=state.mgFrame||'week';
  const catCount=muscleCounts(frame);
  const catList=Object.entries(catCount).sort((a,b)=>b[1]-a[1]);
  const maxC=catList.length?catList[0][1]:1;
  let h='<div class="card"><div class="row" style="margin-bottom:10px"><h3 class="grow" style="margin:0">Sets by muscle group</h3>'+
    '<select onchange="state.mgFrame=this.value;render()" style="padding:6px 8px;font-size:16px;max-width:150px">'+
    Object.entries(MG_FRAMES).map(([k,v])=>'<option value="'+k+'"'+(k===frame?' selected':'')+'>'+v+'</option>').join('')+
    '</select></div>';
  if(!catList.length){
    h+='<p class="muted small" style="margin:0">No sets logged in this timeframe.</p></div>';
    return h;
  }
  for(const [c,n] of catList){
    h+='<div class="row small" style="padding:5px 0"><span style="width:86px">'+esc(c)+'</span>'+
      '<div class="grow rankbar" style="margin:0"><i style="width:'+Math.round(n/maxC*100)+'%;background:'+(CAT_COLORS[c]||CAT_COLORS.Other)+'"></i></div>'+
      '<span class="tiny muted" style="width:44px;text-align:right">'+fmtNum(n)+'</span></div>';

/* monthly aggregation for the overall-stats drill-ins */
const STAT_DEFS={
  dur:{label:'Workout duration',unit:'min avg',fmt:v=>Math.round(v)},
  vol:{label:'Volume',unit:'kg per month',fmt:v=>fmtNum(v)},
  sets:{label:'Total sets',unit:'per month',fmt:v=>Math.round(v)},
  reps:{label:'Total reps',unit:'per month',fmt:v=>Math.round(v)},
  rps:{label:'Reps per set',unit:'avg',fmt:v=>v.toFixed(1)},
  bw:{label:'Bodyweight',unit:'kg (monthly avg)',fmt:v=>fmtW(v)},
  nw:{label:'Number of workouts',unit:'per month',fmt:v=>Math.round(v)},
};
function monthlyStat(key){
  const agg={};
  for(const w of statWorkouts()){                                    // F24 + F26
    const mk=monthKey(w.start);
    const a=agg[mk]||(agg[mk]={vol:0,sets:0,reps:0,durMin:0,durN:0,bwSum:0,bwN:0,n:0});
    a.n++;
    if(w.start&&w.end){const m=(toDate(w.end)-toDate(w.start))/60000;if(m>0&&m<360){a.durMin+=m;a.durN++;}}
    if(w.bw){a.bwSum+=w.bw;a.bwN++;}
    for(const e of w.entries)for(const s of e.sets)if(statSet(s)){a.sets++;a.vol+=setVol(s);a.reps+=s.r||0;}
  }
  return Object.keys(agg).sort().map(mk=>{
    const a=agg[mk];
    const y={dur:a.durN?a.durMin/a.durN:null,vol:a.vol,sets:a.sets,reps:a.reps,
      rps:a.sets?a.reps/a.sets:null,bw:a.bwN?a.bwSum/a.bwN:null,nw:a.n}[key];
    return {t:MONTHS[+mk.slice(5)-1].slice(0,3)+' '+mk.slice(2,4),y};
  }).filter(p=>p.y!=null);
}
function statCards(key,pts){
  const f=STAT_DEFS[key].fmt;
  const ys=pts.map(p=>p.y);
  const latest=ys[ys.length-1], avg=ys.reduce((a,b)=>a+b,0)/ys.length;
  const cards=[{v:f(latest),l:'latest month'},{v:f(avg),l:'monthly avg'}];
  if(key==='bw'){
    // bodyweight: a "biggest" number is meaningless — show range and net change
    const lo=Math.min(...ys), hi=Math.max(...ys), ch=latest-ys[0];
    cards.push({v:fmtW(lo)+'–'+fmtW(hi),l:'range'});
    cards.push({v:(ch>0?'+':ch<0?'−':'')+fmtW(Math.abs(ch)),l:'net change'});
  }else if(key==='rps'){
    cards.push({v:f(Math.max(...ys)),l:'highest'});
  }else if(key==='dur'){
    cards.push({v:f(Math.max(...ys)),l:'longest avg'});
  }else{
    cards.push({v:f(Math.max(...ys)),l:'best month'});
  }
  return cards;
}
function openStatChart(key){
  const def=STAT_DEFS[key];
  const pts=monthlyStat(key);
  openModal('<h2>'+def.label+'</h2><p class="tiny muted">'+def.unit+', whole history</p>'+
    '<div class="card">'+lineChart(pts,def.fmt)+'</div>'+
    (pts.length?'<div class="statgrid" style="margin-top:8px">'+
      statCards(key,pts).map(c=>'<div class="stat"><div class="v">'+c.v+'</div><div class="l">'+c.l+'</div></div>').join('')+
      '</div>':''));
}
