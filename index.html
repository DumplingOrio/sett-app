    '<span class="mgtxt"><span class="nm">'+esc(catName(c))+'</span><span class="ct">'+nPlur('u.exercise',counts[c]||0)+'</span>'+

/* F73: a sentinel row markup. data-sentinel names the list container so a fallback
   scroll listener can find it; the IntersectionObserver watches the element. */
function catalogSentinel(listId){
  return '<div class="listrow catsentinel" data-sentinel="'+esc(listId)+'" style="justify-content:center;color:var(--muted);font-size:12px">···</div>';
}
/* F73: attach an IntersectionObserver (root = the #overlay scroller) to the
   sentinel inside `listId`; onHit appends the next chunk. Falls back to a scroll
   listener where IntersectionObserver is unavailable. Idempotent per render — the
   previous observer is disconnected first so re-renders/restores never stack. */
let _catObs=null, _catScrollFb=null;
function armCatalogSentinel(listId,onHit){
  try{
    if(_catObs){_catObs.disconnect();_catObs=null;}
    if(_catScrollFb){const ov=$('overlay');if(ov&&ov.removeEventListener)ov.removeEventListener('scroll',_catScrollFb);_catScrollFb=null;}
    const list=$(listId);if(!list)return;
    const sen=list.querySelector?list.querySelector('.catsentinel'):null;
    if(!sen)return;   // no sentinel → all rows shown, nothing to arm
    if(typeof IntersectionObserver==='function'){
      const ov=$('overlay');
      _catObs=new IntersectionObserver(entries=>{
        for(const en of entries)if(en.isIntersecting){onHit();return;}
      },{root:ov||null,rootMargin:'200px'});
      _catObs.observe(sen);
    }else{
      const ov=$('overlay');if(!ov||!ov.addEventListener)return;
      _catScrollFb=()=>{
        const s=list.querySelector('.catsentinel');if(!s||!s.getBoundingClientRect)return;
        const r=s.getBoundingClientRect(),oh=(ov.getBoundingClientRect?ov.getBoundingClientRect().bottom:window.innerHeight);
        if(r.top<oh+200)onHit();
      };
      ov.addEventListener('scroll',_catScrollFb,{passive:true});
    }
  }catch(e){}
}

   list from its HTML snapshot (the restore re-inserts rows + sentinel but not the
   observer). Called from popModalFrame. The chunk counters are preserved across
   the push→pop (module state), so the restored HTML and the counter agree. */

  const sh=$('sheet');if(!sh||!sh.querySelector)return;

  }
}

/* ===================== F53: muscle-group review (data hygiene) =====================
   RepCount's CSV import trusts its Category column raw, so some own exercises carry
   a muscle group that disagrees with the linked catalog visual's group. A generic
   detector (no exercise names ever hardcoded — privacy law) finds those, and a
   review sheet lets the owner Accept (take the catalog's group), Keep (persist his
   own, never nag again) or Accept all. catRev:true marks a row reviewed so it's
   never surfaced again regardless of which choice was made. */
/* F57 REVIEW CHECK v2 (2026-07-07): the v1 rule (stored ≠ catalog's single .c)
   flagged Reverse Flyes stored as Back even though Back is one of its factual
   groups. New rule: an exercise disagrees ONLY when its stored primary matches
   NEITHER catalogPrimaryGroup(vid) NOR anything in catalogGroups(vid) — i.e. the
   stored group is nowhere in the exercise's factual muscle set. The suggestion is
   the factual PRIMARY; the full set rides along as context ("also: Back"). */
function groupDisagreements(){
  const out=[];
  for(const n of Object.keys(store.ex)){
    const m=store.ex[n];
    if(!m||!m.vid||m.catRev)continue;              // no visual linked, or already reviewed
    const c=CAT_BY_ID[m.vid];                       // catalog entry for the linked visual
    if(!c)continue;                                 // stale/invalid vid → nothing to compare
    const primary=catalogPrimaryGroup(m.vid);
    const set=catalogGroups(m.vid);
    if(!primary&&!set.length)continue;              // nothing factual to compare against
    if(m.cat===primary||set.includes(m.cat))continue;   // stored group IS factual → no flag
    out.push({name:n,stored:m.cat,catalog:primary,set});
  }
  return out.sort((a,b)=>a.name.localeCompare(b.name));
}
function acceptGroup(name){
  const m=store.ex[name];if(!m)return;
  const primary=m.vid?catalogPrimaryGroup(m.vid):null;
  if(primary&&CATS.includes(primary)){
    m.cat=primary;
    m.cats2=catalogGroups(m.vid).filter(g=>g!==primary);   // refresh secondaries around the new primary
  }
  m.catRev=true;save();renderReviewSheet();
}
function keepGroup(name){
  const m=store.ex[name];if(!m)return;
  m.catRev=true;save();renderReviewSheet();          // cat unchanged; never nags again
}
function acceptAllGroups(){
  for(const d of groupDisagreements()){
    const m=store.ex[d.name];if(!m)continue;
    if(d.catalog&&CATS.includes(d.catalog)){
      m.cat=d.catalog;
      m.cats2=catalogGroups(m.vid).filter(g=>g!==d.catalog);
    }
    m.catRev=true;
  }
  save();renderReviewSheet();
}

/* line chart with axis labels; pts=[{t:label, y:number}] ascending in time */
function lineChart(pts,fmtY){
  fmtY=fmtY||(v=>fmtNum(v));
  if(!pts.length)return '<p class="muted small">'+T('ch.noData')+'</p>';
  const W=560,H=190,L=56,R=12,T=14,B=28;
  const ys=pts.map(p=>p.y);let min=Math.min(...ys),max=Math.max(...ys);
  if(min===max){min-=1;max+=1;}
  const nx=i=>pts.length===1?(L+(W-L-R)/2):L+i*(W-L-R)/(pts.length-1);
  const ny=v=>T+(H-T-B)*(1-(v-min)/(max-min));
  let s='<svg class="bigchart" viewBox="0 0 '+W+' '+H+'">';
  for(const v of [min,(min+max)/2,max]){
    s+='<line x1="'+L+'" y1="'+ny(v)+'" x2="'+(W-R)+'" y2="'+ny(v)+'" stroke="var(--line)" stroke-width="1"/>'+
       '<text x="'+(L-8)+'" y="'+(ny(v)+4)+'" font-size="11" fill="var(--muted)" text-anchor="end">'+fmtY(v)+'</text>';
  }
  const path=pts.map((p,i)=>(i?'L':'M')+nx(i).toFixed(1)+' '+ny(p.y).toFixed(1)).join(' ');
  s+='<path d="'+path+'" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';
  if(pts.length<=30)pts.forEach((p,i)=>{s+='<circle cx="'+nx(i)+'" cy="'+ny(p.y)+'" r="3" fill="var(--accent)"/>';});
  else s+='<circle cx="'+nx(pts.length-1)+'" cy="'+ny(pts[pts.length-1].y)+'" r="4" fill="var(--accent)"/>';
  s+='<text x="'+L+'" y="'+(H-8)+'" font-size="11" fill="var(--faint)">'+esc(pts[0].t)+'</text>'+
     '<text x="'+(W-R)+'" y="'+(H-8)+'" font-size="11" fill="var(--faint)" text-anchor="end">'+esc(pts[pts.length-1].t)+'</text></svg>';
  return s;
}
/* F58 (2026-07-07): labeled BAR chart. bars=[{label, val, current}]; fmtV formats
   value labels. Real x-axis labels under the bars (sparse: first/middle/current so
   they never collide at 375px); value labels sit on the tallest bar and the current
   bar only. Current bar is accented; the rest are muted. SVG on palette vars,
   viewBox-scaled so it never overflows its card. The line-squiggle era is over. */
function barChart(bars,fmtV){
  fmtV=fmtV||(v=>fmtNum(v));
  if(!bars.length)return '<p class="muted small">'+T('ch.noData')+'</p>';
  const W=560,H=180,L=8,R=8,T=22,B=26;
  const max=Math.max(1,...bars.map(b=>b.val));
  const n=bars.length,gap=6;
  const bw=(W-L-R-gap*(n-1))/n;
  const bx=i=>L+i*(bw+gap);
  const bh=v=>Math.max(1,(H-T-B)*(v/max));
  const by=v=>H-B-bh(v);
  let maxI=0;bars.forEach((b,i)=>{if(b.val>bars[maxI].val)maxI=i;});
  const curI=bars.reduce((acc,b,i)=>b.current?i:acc,-1);
  let s='<svg class="barchart" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet">';
  bars.forEach((b,i)=>{
    const on=b.current;
    const col=on?'var(--accent)':'var(--card2)';
    const stroke=on?'var(--accent)':'var(--line)';
    s+='<rect x="'+bx(i).toFixed(1)+'" y="'+by(b.val).toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+bh(b.val).toFixed(1)+
      '" rx="3" fill="'+col+'" stroke="'+stroke+'" stroke-width="1"/>';
    if(i===maxI||i===curI){
      s+='<text x="'+(bx(i)+bw/2).toFixed(1)+'" y="'+(by(b.val)-6).toFixed(1)+'" font-size="12" font-weight="700" fill="'+(on?'var(--accent)':'var(--text)')+'" text-anchor="middle">'+esc(String(fmtV(b.val)))+'</text>';
    }
    // sparse x labels: first, middle, and the current bar
    if(i===0||i===curI||(curI<0&&i===n-1)||(i===Math.floor((n-1)/2)&&i!==0&&i!==curI))
      s+='<text x="'+(bx(i)+bw/2).toFixed(1)+'" y="'+(H-8)+'" font-size="11" fill="var(--faint)" text-anchor="middle">'+esc(b.label)+'</text>';
  });
  s+='</svg>';
  return s;
}

/* ============================== STATS: F58 pure math ==============================
   Dashboard modules + honest per-metric detail pages (option A). Every figure the
   Stats tab shows comes from one of these pure, exported-to-the-test-shim helpers,
   red-proven against synthetic stores. All route through statWorkouts() (live
   workout counts, F24) and statSet() (warmups excluded unless the setting counts
   them, F26). store.workouts is newest-first; these functions never re-sort it. */

/* Monday-start boundary of the week that contains a given ms timestamp. */
function weekStartOf(ms){const d=new Date(ms);const day=(d.getDay()+6)%7;d.setHours(0,0,0,0);d.setDate(d.getDate()-day);return d.getTime();}
/* "19 May" style short label for a week's Monday. */
function weekLabel(ms){const d=new Date(ms);return d.getDate()+' '+monthName(d.getMonth()).slice(0,3);}

/* n weekly volume buckets ending with THIS week, oldest→newest.
   Each: {ms, label, vol, current}. current flags the live week (last bucket). */
function weeklyVolumes(n){
  n=n||8;
  const thisMon=weekStart().getTime();
  const buckets=[];
  for(let i=n-1;i>=0;i--){
    const ms=thisMon-i*7*86400000;
    buckets.push({ms,label:weekLabel(ms),vol:0,current:i===0});
  }
  const byMs={};buckets.forEach(b=>byMs[b.ms]=b);
  for(const w of statWorkouts()){
    const wm=weekStartOf(toDate(w.start).getTime());
    const b=byMs[wm];if(!b)continue;
    for(const e of w.entries)for(const s of e.sets)if(statSet(s))b.vol+=setVol(s);
  }
  return buckets;
}

/* This-week strip: workouts count, total volume, records set this week. */
function thisWeekStats(){
  const mon=weekStart().getTime();
  let workouts=0,vol=0;
  for(const w of statWorkouts()){
    if(toDate(w.start).getTime()<mon)continue;
    workouts++;
    for(const e of w.entries)for(const s of e.sets)if(statSet(s))vol+=setVol(s);
  }
  return {workouts,vol,records:weekRecordCount()};
}

/* Record EVENTS across all lifts, oldest→newest. Walk every set in chronological
   order; a set is a record the first time it beats the standing best for its
   exercise — e1RM for weighted sets, reps for bodyweight/rep-based sets. Returns
   [{name, kind:'e1'|'reps', val, prev, date}] (prev = the beaten best, or null for
   the very first). Pure; the source of both recentRecords and weekRecordCount. */
function recordEvents(){
  const chron=statWorkouts().slice().sort((a,b)=>a.start<b.start?-1:a.start>b.start?1:0);
  const bestE1={},bestReps={};const out=[];
  for(const w of chron){
    for(const e of w.entries){
      const nm=e.name;
      for(const s of e.sets){
        if(!statSet(s))continue;
        if(s.w!=null&&s.w>0){
          const v=epley(s.w,s.r);
          if(v!=null&&v>0&&(bestE1[nm]==null||v>bestE1[nm])){
            out.push({name:nm,kind:'e1',val:v,prev:bestE1[nm]??null,date:w.start});bestE1[nm]=v;
          }
        }else if(s.r){
          if(bestReps[nm]==null||s.r>bestReps[nm]){
            out.push({name:nm,kind:'reps',val:s.r,prev:bestReps[nm]??null,date:w.start});bestReps[nm]=s.r;
          }
        }
      }
    }
  }
  return out;
}
/* The last n record events, newest-first. */
function recentRecords(n){n=n||5;return recordEvents().slice(-n).reverse();}
/* How many records were set this week (Monday-start). */
function weekRecordCount(){
  const mon=weekStart().getTime();
  return recordEvents().filter(r=>toDate(r.date).getTime()>=mon).length;
}

/* Per-session durations in minutes (0<m<360), chronological. */
function sessionDurations(){
  const out=[];
  for(const w of statWorkouts()){
    if(!w.start||!w.end)continue;
    const m=(toDate(w.end)-toDate(w.start))/60000;
    if(m>0&&m<360)out.push({m,start:w.start,routine:w.routine||''});
  }
  return out;
}
/* Typical session range = 25th–75th percentile of durations, plus the longest
   session (value, date, routine). {lo, hi, median, longest:{m,date,routine}} or null. */
function typicalDurationRange(){
  const ds=sessionDurations();if(!ds.length)return null;
  const mins=ds.map(d=>d.m).sort((a,b)=>a-b);
  const pct=p=>{const idx=(mins.length-1)*p;const lo=Math.floor(idx),hi=Math.ceil(idx);
    return mins[lo]+(mins[hi]-mins[lo])*(idx-lo);};
  let longest=ds[0];for(const d of ds)if(d.m>longest.m)longest=d;
  return {lo:pct(0.25),hi:pct(0.75),median:pct(0.5),
    longest:{m:longest.m,date:longest.start,routine:longest.routine}};
}

/* Best (highest-volume) calendar month. {mk, label, vol} or null. */
function bestMonth(){
  const agg={};
  for(const w of statWorkouts()){
    const mk=monthKey(w.start);let v=0;
    for(const e of w.entries)for(const s of e.sets)if(statSet(s))v+=setVol(s);
    agg[mk]=(agg[mk]||0)+v;
  }
  const keys=Object.keys(agg);if(!keys.length)return null;
  let best=keys[0];for(const k of keys)if(agg[k]>agg[best])best=k;
  return {mk:best,label:monthName(+best.slice(5)-1).slice(0,3)+' '+best.slice(2,4),vol:agg[best]};
}

/* Primary-group VOLUME split for a timeframe (reuses the F39 MG_FRAMES/mgCutoff).
   Returns [{group, vol, pct}] sorted desc; primary-group only (ex.cat), so it
   agrees with muscleCounts and never double-counts secondary groups. */
function groupSplit(frame){
  /* F67: the global Stats timeframe uses week/month/year/all (statFrameCutoff);
     older callers pass the F39 week/month/3m/1y/all keys (mgCutoff). Route by
     which key set the frame belongs to so both stay correct. */
  const cutoff=(frame in STAT_FRAMES)?statFrameCutoff(frame):mgCutoff(frame);
  const byGroup={};let total=0;
  for(const w of statWorkouts()){
    if(cutoff&&toDate(w.start).getTime()<cutoff)continue;
    for(const e of w.entries){
      const c=(store.ex[e.name]||{}).cat||'Other';
      let v=0;for(const s of e.sets)if(statSet(s))v+=setVol(s);
      if(v){byGroup[c]=(byGroup[c]||0)+v;total+=v;}
    }
  }
  return Object.entries(byGroup).map(([group,vol])=>({group,vol,pct:total?vol/total*100:0}))
    .sort((a,b)=>b.vol-a.vol);
}

/* ============================== STATS view ============================== */
/* F67 (2026-07-07) OWNER PICKS: one GLOBAL timeframe (Week / Month / Year / All,
   default Month) drives the summary strip, the volume chart's bucket granularity,
   the muscle balance card, and the recent-records list. The old F39 module-local
   MG_FRAMES select retires — muscleBalanceCard now reads state.statFrame.
   Timeframe lives in transient state.statFrame (never persisted). */
const STAT_FRAMES={week:'Week',month:'Month',year:'Year',all:'All'};
/* millisecond cutoff for a frame; 0 = all time. Week = Monday-start (weekStart),
   Month = 1st of this month, Year = Jan 1 of this year. */
function statFrameCutoff(frame){
  const now=new Date();
  if(frame==='week')return weekStart().getTime();
  if(frame==='month'){const d=new Date(now);d.setHours(0,0,0,0);d.setDate(1);return d.getTime();}
  if(frame==='year'){const d=new Date(now.getFullYear(),0,1,0,0,0,0);return d.getTime();}
  return 0;   // all time
}
/* Summary numbers for the frame: workouts, working volume (kg), records in-frame. */
function frameStats(frame){
  const cutoff=statFrameCutoff(frame);
  let workouts=0,vol=0;
  for(const w of statWorkouts()){
    if(cutoff&&toDate(w.start).getTime()<cutoff)continue;
    workouts++;
    for(const e of w.entries)for(const s of e.sets)if(statSet(s))vol+=setVol(s);
  }
  const records=recordEvents().filter(r=>!cutoff||toDate(r.date).getTime()>=cutoff).length;
  return {workouts,vol,records};
}
/* The header label for the summary strip per frame. */
const FRAME_STRIP_LABEL={week:'This week',month:'This month',year:'This year',all:'All time'};
/* Volume buckets for the chart, granularity by frame:
     week  → 7 daily bars (Mon–Sun of this week)
     month → last ~5 weekly bars (Monday-start)
     year  → 12 monthly bars (Jan–Dec of this year)
     all   → yearly bars (first logged year → this year)
   Each bucket {label, val, current}. current flags the live/latest bucket. */
function frameVolumeBuckets(frame){
  const setVolOf=e=>{let v=0;for(const s of e.sets)if(statSet(s))v+=setVol(s);return v;};
  if(frame==='week'){
    const mon=weekStart().getTime();const today=new Date();today.setHours(0,0,0,0);
    const buckets=[];
    for(let i=0;i<7;i++){const ms=mon+i*86400000;const d=new Date(ms);
      buckets.push({ms,label:dayName(d.getDay()),val:0,current:ms===today.getTime()});}
    const byDay={};buckets.forEach(b=>byDay[b.ms]=b);
    for(const w of statWorkouts()){const d=toDate(w.start);d.setHours(0,0,0,0);
      const b=byDay[d.getTime()];if(!b)continue;for(const e of w.entries)b.val+=setVolOf(e);}
    return buckets;
  }
  if(frame==='month'){
    return weeklyVolumes(5).map(b=>({label:b.label,val:b.vol,current:b.current}));
  }
  if(frame==='year'){
    const yr=new Date().getFullYear(),mNow=new Date().getMonth();
    const buckets=[];for(let m=0;m<12;m++)buckets.push({label:monthName(m).slice(0,3),val:0,current:m===mNow});
    for(const w of statWorkouts()){const d=toDate(w.start);if(d.getFullYear()!==yr)continue;
      for(const e of w.entries)buckets[d.getMonth()].val+=setVolOf(e);}
    return buckets;
  }
  // all → yearly
  let minYr=null;const thisYr=new Date().getFullYear();
  for(const w of statWorkouts()){const y=toDate(w.start).getFullYear();if(minYr==null||y<minYr)minYr=y;}
  if(minYr==null)minYr=thisYr;
  const buckets=[];for(let y=minYr;y<=thisYr;y++)buckets.push({y,label:String(y),val:0,current:y===thisYr});
  const byYr={};buckets.forEach(b=>byYr[b.y]=b);
  for(const w of statWorkouts()){const b=byYr[toDate(w.start).getFullYear()];if(!b)continue;
    for(const e of w.entries)b.val+=setVolOf(e);}
  return buckets;
}
/* F67 interactive volume chart: tapping a bar PINS it (its label+value show in the
   card header); tapping the SAME bar again opens the volume detail page. Pinned
   index lives in transient state (statBarPin), reset when the frame changes. Bars
   carry a transparent full-height hit-rect (>=24px touch area via padding) so they
   are real tap targets even when the bar itself is 1px tall. Inline-onclick. */
function setStatFrame(f){state.statFrame=f;state.statBarPin=null;render();}
function statBarTap(i){
  if(state.statBarPin===i){state.statBarPin=null;openStatChart('vol');return;}
  state.statBarPin=i;render();
}
function volBarChart(buckets,fmtV){
  fmtV=fmtV||(v=>v>=1000?(v/1000).toFixed(1)+'t':fmtNum(v));
  if(!buckets.length)return '<p class="muted small">'+T('ch.noVol')+'</p>';
  const W=560,H=180,L=8,R=8,T=22,B=26;
  const max=Math.max(1,...buckets.map(b=>b.val));
  const n=buckets.length,gap=6;
  const bw=(W-L-R-gap*(n-1))/n;
  const bx=i=>L+i*(bw+gap);
  const bh=v=>Math.max(1,(H-T-B)*(v/max));
  const by=v=>H-B-bh(v);
  let maxI=0;buckets.forEach((b,i)=>{if(b.val>buckets[maxI].val)maxI=i;});
  const curI=buckets.reduce((acc,b,i)=>b.current?i:acc,-1);
  const pin=state.statBarPin;
  let s='<svg class="barchart" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet">';
  buckets.forEach((b,i)=>{
    const on=i===pin?true:b.current;
    const col=(i===pin)?'var(--accent)':b.current?'var(--accent)':'var(--card2)';
    const stroke=(i===pin||b.current)?'var(--accent)':'var(--line)';
    s+='<rect x="'+bx(i).toFixed(1)+'" y="'+by(b.val).toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+bh(b.val).toFixed(1)+
      '" rx="3" fill="'+col+'" stroke="'+stroke+'" stroke-width="'+(i===pin?2:1)+'"/>';
    if(i===maxI||i===curI||i===pin){
      s+='<text x="'+(bx(i)+bw/2).toFixed(1)+'" y="'+(by(b.val)-6).toFixed(1)+'" font-size="12" font-weight="700" fill="'+((i===pin||on)?'var(--accent)':'var(--text)')+'" text-anchor="middle">'+esc(String(fmtV(b.val)))+'</text>';
    }
    if(i===0||i===curI||(curI<0&&i===n-1)||(i===Math.floor((n-1)/2)&&i!==0&&i!==curI))
      s+='<text x="'+(bx(i)+bw/2).toFixed(1)+'" y="'+(H-8)+'" font-size="11" fill="var(--faint)" text-anchor="middle">'+esc(b.label)+'</text>';
    /* transparent hit-rect: full height, min 24px touch width (padded), inline onclick */
    const hx=Math.max(0,bx(i)+bw/2-12);
    s+='<rect x="'+hx.toFixed(1)+'" y="0" width="'+Math.max(24,bw).toFixed(1)+'" height="'+H+'" fill="transparent" style="cursor:pointer" data-bar="'+i+'" onclick="statBarTap(+this.dataset.bar)"/>';
  });
  s+='</svg>';
  return s;
}

    '<div class="stat" onclick="openStatChart(\'sets\')" style="cursor:pointer"><div class="v">'+fmtNum(nsets)+'</div><div class="l">'+T('st.sets')+'</div></div>'+
    '<div class="stat" onclick="openStatChart(\'vol\')" style="cursor:pointer"><div class="v">'+(vol>=1e6?(vol/1e6).toFixed(1)+' M':fmtNum(vol))+'</div><div class="l">'+T('st.kgLifted')+'</div></div>'+

/* F39 (2026-07-06): muscle-group set counts within a timeframe. Routes through
   statWorkouts() (so the live workout counts, F24) and statSet() (warmup
   exclusion, F26). "This week" reuses weekStart() — the app's one week
   definition. Timeframe lives in transient state.mgFrame (never persisted). */
const MG_FRAMES={week:'This week',month:'This month','3m':'3 months','1y':'1 year',all:'All time'};
function mgCutoff(frame){
  if(frame==='week')return weekStart().getTime();
  const now=new Date();
  if(frame==='month'){const d=new Date(now);d.setHours(0,0,0,0);d.setDate(1);return d.getTime();}
  if(frame==='3m')return Date.now()-90*86400000;
  if(frame==='1y')return Date.now()-365*86400000;
  return 0;   // all time
}
function muscleCounts(frame){
  const cutoff=mgCutoff(frame);const catCount={};
  for(const w of statWorkouts()){                                    // F24: includes the live workout
    if(cutoff&&toDate(w.start).getTime()<cutoff)continue;
    for(const e of w.entries){
      const c=(store.ex[e.name]||{}).cat||'Other';
      let n=0;for(const s of e.sets)if(statSet(s))n++;               // F26: warmups excluded unless counted
      if(n)catCount[c]=(catCount[c]||0)+n;
    }
  }
  return catCount;
}
/* F58: the F39 "Sets by muscle group" card was replaced by muscleBalanceCard
   (volume share). muscleCounts stays — the fact box's "most-worked group" reads
   it, and it remains the primary-based set counter. */
/* monthly aggregation for the overall-stats drill-ins */
/* R23: label/unit are STRING KEYS resolved through T() at render time (openStatChart).
   fmt stays language-neutral (numbers + t/kg suffixes). */
const STAT_DEFS={
  dur:{label:'sd.dur',unit:'sd.durU',fmt:v=>Math.round(v)},
  vol:{label:'sd.vol',unit:'sd.volU',fmt:v=>v>=1000?(v/1000).toFixed(1)+'t':fmtNum(v)},
  sets:{label:'sd.sets',unit:'sd.setsU',fmt:v=>Math.round(v)},
  reps:{label:'sd.reps',unit:'sd.repsU',fmt:v=>Math.round(v)},
  rps:{label:'sd.rps',unit:'sd.rpsU',fmt:v=>v.toFixed(1)},
  bw:{label:'sd.bw',unit:'sd.bwU',fmt:v=>fmtW(v)},
  nw:{label:'sd.nw',unit:'sd.nwU',fmt:v=>Math.round(v)},
};
function monthlyStat(key){
  const agg={};
  for(const w of statWorkouts()){                                    // F24 + F26
    const mk=monthKey(w.start);
    const a=agg[mk]||(agg[mk]={vol:0,sets:0,reps:0,durMin:0,durN:0,bwSum:0,bwN:0,n:0});
    a.n++;
    if(w.start&&w.end){const m=(toDate(w.end)-toDate(w.start))/60000;if(m>0&&m<360){a.durMin+=m;a.durN++;}}
    if(w.bw){a.bwSum+=w.bw;a.bwN++;}
    for(const e of w.entries)for(const s of e.sets)if(statSet(s)){a.sets++;a.vol+=setVol(s);a.reps+=s.r||0;}
  }
  return Object.keys(agg).sort().map(mk=>{
    const a=agg[mk];
    const y={dur:a.durN?a.durMin/a.durN:null,vol:a.vol,sets:a.sets,reps:a.reps,
      rps:a.sets?a.reps/a.sets:null,bw:a.bwN?a.bwSum/a.bwN:null,nw:a.n}[key];
    return {t:monthName(+mk.slice(5)-1).slice(0,3)+' '+mk.slice(2,4),y};
  }).filter(p=>p.y!=null);
}
/* F58: per-metric FACT BOX — one card of plain, factual lines, each a real
   number tied to a name or date. The generic three-number summary the owner
   rejected is gone; these are specific facts. A fact row: {l:label, v:value}. */
function factRow(l,v){return '<div class="row small" style="padding:6px 0;border-bottom:1px solid var(--line)"><span class="grow muted">'+esc(l)+'</span><b style="text-align:right">'+v+'</b></div>';}
function statFactBox(key){
  let rows='';
  if(key==='dur'){
    const t=typicalDurationRange();
    if(!t)return '';
    rows+=factRow(T('fb.typical'),Math.round(t.lo)+'–'+Math.round(t.hi)+' '+T('fb.min'));
    rows+=factRow(T('fb.longest'),Math.round(t.longest.m)+' '+T('fb.min')+' · '+fmtDay(t.longest.date)+(t.longest.routine?' · '+esc(t.longest.routine):''));
    // this month vs last (avg duration), signed delta
    const ms=monthlyStat('dur');
    if(ms.length>=2){const d=ms[ms.length-1].y-ms[ms.length-2].y;
      rows+=factRow(T('fb.mvl'),(d>0?'+':d<0?'−':'±')+Math.round(Math.abs(d))+' '+T('fb.min'));}
  }else if(key==='vol'){
    const bm=bestMonth();
    if(bm)rows+=factRow(T('fb.bestMonth'),bm.label+' · '+fmtNum(bm.vol)+' kg');
    // average per workout
    let tv=0,nw=0;for(const w of statWorkouts()){nw++;for(const e of w.entries)for(const s of e.sets)if(statSet(s))tv+=setVol(s);}
    if(nw)rows+=factRow(T('fb.perWorkout'),fmtNum(tv/nw)+' kg');
    // top-3 group split (all time) — group names translate through catName()
    const gs=groupSplit('all').slice(0,3);
    if(gs.length)rows+=factRow(T('fb.topGroups'),gs.map(g=>esc(catName(g.group))+' '+Math.round(g.pct)+'%').join(' · '));
  }else if(key==='sets'||key==='reps'){
    // weekly average over the weeks that have data
    const wv=weeklyVolumes(8);   // not volume here — recompute weekly counts
    const mon=weekStart().getTime();
    // weekly average of the metric over all-time = total / #active-weeks
    const weeks={};let total=0;
    for(const w of statWorkouts()){
      const wm=weekStartOf(toDate(w.start).getTime());weeks[wm]=weeks[wm]||0;
      for(const e of w.entries)for(const s of e.sets)if(statSet(s)){
        if(key==='sets'){weeks[wm]++;total++;}else{const r=s.r||0;weeks[wm]+=r;total+=r;}}
    }
    const nWeeks=Object.keys(weeks).length;
    if(nWeeks)rows+=factRow(T('fb.weeklyAvg'),fmtNum(total/nWeeks)+' '+(key==='sets'?plur('u.set',2):T('u.rep')));
    // most-worked group (by sets, all time) — group key translates through catName()
    const mc=muscleCounts('all');const top=Object.entries(mc).sort((a,b)=>b[1]-a[1])[0];
    if(top)rows+=factRow(T('fb.mostWorked'),esc(catName(top[0]))+' · '+nPlur('u.set',top[1]));
    // trend vs previous period (this month vs last)
    const ms=monthlyStat(key);
    if(ms.length>=2){const d=ms[ms.length-1].y-ms[ms.length-2].y;
      rows+=factRow(T('fb.mvl'),(d>0?'+':d<0?'−':'±')+fmtNum(Math.abs(d)));}
  }else if(key==='nw'||key==='rps'){
    const ms=monthlyStat(key);
    if(ms.length){
      const ys=ms.map(p=>p.y);const best=Math.max(...ys);const bestIdx=ys.indexOf(best);
      rows+=factRow(key==='nw'?T('fb.bestMonth'):T('fb.highestMonth'),(key==='rps'?best.toFixed(1):Math.round(best))+' · '+ms[bestIdx].t);
      if(ms.length>=2){const d=ys[ys.length-1]-ys[ys.length-2];
        rows+=factRow(T('fb.mvl'),(d>0?'+':d<0?'−':'±')+(key==='rps'?Math.abs(d).toFixed(1):Math.round(Math.abs(d))));}
    }
  }
  if(!rows)return '';
  return '<div class="card"><h3 style="margin:0 0 2px">'+T('fb.facts')+'</h3>'+rows+'</div>';
}
function openStatChart(key){
  const def=STAT_DEFS[key];
  const pts=monthlyStat(key);
  /* Bodyweight KEEPS its existing chart treatment (the owner's cited good example
     — "we already implemented a sort of fix for the weight category"): the labeled
     line with axis values. Its fact box: range + net change. */
  if(key==='bw'){
    const ys=pts.map(p=>p.y);
    let fb='';
    if(ys.length){const lo=Math.min(...ys),hi=Math.max(...ys),ch=ys[ys.length-1]-ys[0];
      fb='<div class="card"><h3 style="margin:0 0 2px">'+T('fb.facts')+'</h3>'+
        factRow(T('fb.range'),fmtW(lo)+'–'+fmtW(hi)+' kg')+
        factRow(T('fb.netChange'),(ch>0?'+':ch<0?'−':'±')+fmtW(Math.abs(ch))+' kg')+
        factRow(T('fb.latest'),fmtW(ys[ys.length-1])+' kg · '+pts[pts.length-1].t)+'</div>';}
    openModal('<h2>'+T(def.label)+'</h2><p class="tiny muted">'+T('sd.bwSub')+'</p>'+
      '<div class="card">'+lineChart(pts,def.fmt)+'</div>'+fb);
    return;
  }
  /* Every other metric: a labeled BAR chart with real month names + a fact box. */
  const bars=pts.map((p,i)=>({label:p.t,val:p.y,current:i===pts.length-1}));
  openModal('<h2>'+T(def.label)+'</h2><p class="tiny muted">'+T('sd.byMonth',T(def.unit))+'</p>'+
    '<div class="card">'+barChart(bars,def.fmt)+'</div>'+
    statFactBox(key));
}

/* F60c: the diagnostics panel body. Recent errors (danger colour, wrapping),
   a 7-day counters summary, storage sizes, and the three action buttons. All

/* F72 (2026-07-07): the Diagnostics card header is now a collapse toggle. The

function devPanelOpen(){const s=store.settings||{};return s.devPanelOpen!==false;}   // undefined → open by default
function toggleDevPanel(){store.settings=store.settings||{};store.settings.devPanelOpen=!devPanelOpen();save();render();}

    '<div class="row" style="padding:2px 0"><span class="grow muted">sett:diag</span>'+

    '<button class="btn wide ghost" onclick="devHide()">Hide</button></div>';
  h+='</div>';

/* F72: compact key-number string for an event/warn entry (navPin/tabbarDrift and
   their offsets), skipping the common stamp fields already shown on the line. */
function diagEventNums(e){
  const skip={type:1,name:1,v:1,os:1,sa:1,t:1};
  const parts=[];
  for(const k in e){if(skip[k])continue;const val=e[k];
    if(val==null||typeof val==='object')continue;
    parts.push(k+'='+val);}
  return parts.join(' ');

/* Sum every counter across the last n local days. */

/* ============================== modal & wiring ============================== */
let closeAnimTimer=null;
/* F55 (2026-07-07) OWNER SPEC, verbatim: "Trying to edit stuff and exiting out
   to choose a new thing causes it to completely exit out of everything, making
   editing something an absolute drag." Root cause: openModal REPLACED the sheet
   and closeModal tore the overlay down — there was NO history, so every
   sheet-opened-from-a-sheet flow could only fully exit.
   The fix is a modal back-stack. When openModal runs while a sheet is already
   showing (and it's not an in-place re-render — opts.replace), the current
   sheet's HTML + scroll (and an optional rewire callback for sheets whose live
   listeners can't survive an innerHTML restore, e.g. the reorder drag) are
   PUSHED. The ✕ / grab / swipe-right-exit / drag-down-dismiss POP one level
   (restore + rewire). Backdrop tap and explicit completing actions (Start, Save,
   Delete confirmed, finishWorkout…) still call closeModal(), which clears the
   whole stack. Dialogs (openDialog) never participate — they sit ABOVE whatever
   is open and, on close, restore the sheet beneath if one was showing. */
let modalStack=[];
const MODAL_STACK_CAP=8;
let _reopenHook=null;   /* a sheet sets this to a fn that re-runs its live wiring after a pop */
function overlayShown(){const ov=$('overlay');return ov&&ov.classList.contains('show')&&!ov.classList.contains('dialogmode');}
/* F64 (2026-07-07): typed field values (input/textarea/select) never enter the
   innerHTML snapshot, so a push→pop restore wiped every live value — unsaved
   how-to notes destroyed by a visual-picker round-trip, search boxes reset. Fix
   at the mechanism: on push, serialize the sheet's current field values; on pop,
   reapply them after the HTML restore (by id first, index fallback). try/catch so
   an odd DOM never breaks the back-stack. Covers dialogs too (openDialog pushes). */
function snapshotFields(sh){
  const out=[];
  try{
    const els=sh.querySelectorAll('input,textarea,select');
    els.forEach((el,idx)=>{
      if(el.type==='file')return;   // file inputs can't be re-applied
      out.push({id:el.id||null,idx,value:el.value,checked:!!el.checked});
    });
  }catch(e){}
  return out;
}
function restoreFields(sh,fields){
  if(!fields||!fields.length)return;
  try{
    const els=sh.querySelectorAll('input,textarea,select');
    for(const f of fields){
      let el=f.id?sh.querySelector('#'+CSS_ID(f.id)):null;   // by id first
      if(!el)el=els[f.idx]||null;                            // index fallback
      if(!el||el.type==='file')continue;
      if(el.type==='checkbox'||el.type==='radio')el.checked=f.checked;
      else el.value=f.value;
    }
  }catch(e){}
}

function CSS_ID(id){return String(id).replace(/([^\w-])/g,'\\$1');}

   linger as a duplicate back-step. */

/* F30 (2026-07-06): body{overflow:hidden} does NOT stop iOS Safari from
   scrolling the page behind the sheet — the scroll chains through the overlay.
   The reliable lock is position:fixed with top:-scrollY, restored on close.
   Guarded so a rapid re-open mid-dismissal (F23) doesn't re-capture 0.
   F70 (2026-07-07): pin MAIN, never body. iOS WebKit misplaces position:fixed
   DESCENDANTS of a fixed body — with F30 pinning <body>, the tabbar/#restbar/
   #toast/#overlay (all fixed) rode UP by ~scrollY on every sheet open from a
   scrolled page (owner's "x kg" repro). Pinning <main> instead takes the fixed
   chrome OUT of the locked subtree entirely, so iOS has nothing to misplace.

   left:0;right:0;margin:0 auto preserves the centered max-width box. body keeps
   overflow:hidden as belt-and-braces. F65's vv pin is UNCHANGED — it handles the

/* F55: closeModal fully tears the overlay down AND clears the back-stack — it's

function wireSheetDrag(head){

  else if(s.dirs.r&&(flickR||(s.dx>=SWLATCH&&!flickL))){s.el.classList.add('open-l');_swOpen=s.el;}   // Copy on the left
  else if(_swOpen===s.el)_swOpen=null;
  /* Items 1&2 instrument: a completed horizontal swipe — dx/vx vs SWLATCH/SWVEL,
     whether it latched, and page overflow. "Sticks/hard to delete" shows as
     latched:0 on big dx, or a recurring hOver>0 stealing the gesture. */
  swipeDiag('swipe',{dx:Math.round(s.dx),vx:+s.vx.toFixed(2),latched:_swOpen===s.el?1:0,base:0,hOver:s.hOver});
}
/* after a swipe (or an outside-tap that closed an open row), swallow the
   click the browser synthesises so it can't open the workout / focus an input */
function swipeClickGuard(ev){
  if(_swMoved||_swClosedTap){
    /* Items 1&2 instrument (2026-07-08): the v0.9.26 export showed swipes LATCHING
       fine (no page-pan steal), so a "delete sticks" is most likely the guard
       eating the delete TAP after a swipe. Log ONLY when the swallowed click landed
       on a Copy/Delete action button (eating the row's own click is intended, so we
       skip that to keep the noise down). swipeClickEaten act:del right after a
       latched swipe = the bug. */
    const act=ev.target.closest&&ev.target.closest('.swipe-act');
    if(act){try{diagLog('event',{name:'swipeClickEaten',act:act.classList.contains('del')?'del':act.classList.contains('copy')?'copy':'act'});}catch(_){}}
    _swMoved=false;_swClosedTap=false;ev.stopPropagation();ev.preventDefault();
  }
}
function wireSwipe(){
  const m=$('main');if(!m||m._swWired)return;m._swWired=true;
  m.addEventListener('touchstart',swipeStart,{passive:true});
  m.addEventListener('touchmove',swipeMove,{passive:false});
  m.addEventListener('touchend',swipeEnd);
  m.addEventListener('touchcancel',swipeEnd);
  m.addEventListener('click',swipeClickGuard,true);
  // touching anywhere outside the open row (header, tab bar, other cards) closes it
  document.addEventListener('touchstart',e=>{if(_swOpen&&!_swOpen.contains(e.target))closeSwipe();},{passive:true});
}
/* F17 (2026-07-06): editing a past workout is a main VIEW (store.active.editing),
   not a sheet — the sheet swipe-exit never covered it. A clearly-rightward swipe
   on the editor that starts OUTSIDE any set-row/input/handle cancels editing
   (discardWorkout already confirms). Axis detection mirrors wireSheetExit so it
   won't fight row swipes or vertical scroll. */
function wireEditorExit(){
  const m=$('main');if(!m||m._edWired)return;m._edWired=true;
  let x0=null,y0=null,axis=0,armed=false;
  m.addEventListener('touchstart',e=>{
    armed=false;x0=null;
    if(e.touches.length!==1)return;
    if(!(store.active&&store.active.editing))return;
    // must start on empty editor space — not a set row, input, button, or drag handle
    if(e.target.closest('.swipe,input,textarea,select,button,[data-drag],[data-rodrag],.pillbtn'))return;
    x0=e.touches[0].clientX;y0=e.touches[0].clientY;axis=0;armed=true;
  },{passive:true});
  m.addEventListener('touchmove',e=>{
    if(!armed||x0==null)return;
    const x=e.touches[0].clientX,y=e.touches[0].clientY;
    if(!axis){
      const ax=Math.abs(x-x0),ay=Math.abs(y-y0);
      if(ax<12&&ay<12)return;
      axis=(ax>ay*1.6&&x>x0)?'x':'other';   // only a clearly rightward swipe exits
    }
  },{passive:true});
  m.addEventListener('touchend',()=>{
    if(armed&&axis==='x'&&store.active&&store.active.editing)discardWorkout();
    armed=false;x0=null;axis=0;
  });
  m.addEventListener('touchcancel',()=>{armed=false;x0=null;axis=0;});
}

/* F34's spec ("a little bungee animation when you scroll all the way up or down
   app wide") is now satisfied NATIVELY (R7/F46, owner pick 2026-07-07). The JS
   rubber-band (a passive:false touchmove that preventDefaulted at the scroll
   edges) fought Safari's own scroller and read as choppy on-device, so it was
   deleted and iOS's native rubber-band restored — `overscroll-behavior-y:none`
   removed from html/body. Sheets keep `overscroll-behavior:contain` (F30) so
   the page behind doesn't scroll-chain; their local bounce still works. */

/* F2 auto-stop — OWNER SPEC, verbatim (2026-07-06): "Workouts should have an
   auto stop and also not put you back in it when you leave." A closed PWA
   can't run timers, so this runs on open and on returning to the foreground:
   a live workout idle past AUTOSTOP_MS (owner picked 1 h after the last
   touch) is finalized retroactively with end = that last touch; one with no
   logged sets is discarded. `store.active.touch` is bumped by save() on
   every change while a workout is live. */
const AUTOSTOP_MS=3600000;
function autoStopStale(){
  const a=store.active;
  if(!a||a.editing)return false;
  const t=a.touch||toDate(a.start).getTime();
  if(Date.now()-t<AUTOSTOP_MS)return false;
  const entries=a.entries.map(e=>({...e,sets:e.sets.filter(s=>s.w!=null||s.r!=null||s.dur!=null||s.dist!=null).map(({tgt,done,...s})=>s)})).filter(e=>e.sets.length);
  if(!entries.length){store.active=null;save();toast(T('toast.autoDiscard'));return true;}
  for(const e of entries)ensureEx(e.name);
  const w={id:newWid(),start:a.start,end:nowStr(new Date(t)),routine:(a.routine||'').trim(),bw:a.bw||null,entries};
  store.workouts.unshift(w);store.workouts.sort((x,y)=>x.start<y.start?1:-1);
  store.active=null;save();
  toast(T('toast.autoStop',fmtClock(w.end)));
  return true;
}
document.addEventListener('visibilitychange',()=>{if(!document.hidden&&autoStopStale())render();});

/* ============================== init ============================== */
if(firstRun){
  if(window.SETT_LOCAL_CSV){const r=importCsv(window.SETT_LOCAL_CSV);console.log('[sett] auto-import:',r.msg);}
  save();
}
migrateVisuals();
migrateGroups();
applyTheme((store.settings&&store.settings.theme)||'ember');
autoStopStale();
render();
wireSwipe();
wireEditorExit();
startTabbarWatch();   // F70(b): slow ~10s watchdog on the rendered tabbar
if(firstRun&&!window.SETT_LOCAL_CSV)startOnboarding();

/* service worker: offline + auto-update on entering, plus a manual check */
let swReg=null, swRefreshing=false, swManualCheck=false, swRegStarted=false;
function autoUpdateOn(){return !(store.settings&&store.settings.autoUpdate===false);}
function checkForUpdates(manual){
  /* R21 (audit 2026-07-08 F5): swReg is also null for the first ~second after
     open while register() is still resolving — inside the installed app the old
     blanket "Updates need the installed app" message was simply wrong there.
     R23: both messages translated. */
  if(!swReg){if(manual)toast(swRegStarted?T('toast.updStarting'):T('toast.updNeedInstall'));return;}
  if(manual)swManualCheck=true;
  swReg.update().then(()=>{
    // if a new worker is already waiting, activate it now
    if(swReg.waiting){swReg.waiting.postMessage('skipWaiting');}
    else if(manual&&!swReg.installing){toast(T('toast.updLatest'));swManualCheck=false;}
  }).catch(()=>{if(manual)toast(T('toast.updOffline'));});
}
if('serviceWorker' in navigator&&location.protocol!=='file:'){
  const hadCtrl=!!navigator.serviceWorker.controller;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(swRefreshing)return;
    // a new version took over: reload if auto-update (or a manual check) asked for it
    if(hadCtrl&&(autoUpdateOn()||swManualCheck)){swRefreshing=true;location.reload();}
    else if(hadCtrl){toast(T('toast.updReady'));}
  });
  swRegStarted=true;   /* R21 (F5): registration is underway — a manual check before it resolves gets "still starting", not the misleading install nag */
  navigator.serviceWorker.register('sw.js').then(reg=>{
    swReg=reg;
    reg.addEventListener('updatefound',()=>{
      const nw=reg.installing;if(!nw)return;
      nw.addEventListener('statechange',()=>{
        if(nw.state==='installed'&&navigator.serviceWorker.controller){
          // new version downloaded; skipWaiting -> activate -> controllerchange (handled above)
          if(autoUpdateOn()||swManualCheck)reg.waiting&&reg.waiting.postMessage('skipWaiting');
          else toast(T('toast.updReady'));
        }
      });
    });
    /* (2026-07-08) reg.update() rejects with "Script sw.js load failed" when the
       GitHub Pages edge briefly can't serve a freshly-deployed sw.js — the outer
       .catch only covers register(), so this fire-and-forget update leaked an
       unhandledrejection the diag log flagged as an error minutes after a deploy.
       Swallow it: a failed auto-check is a no-op, the next entry retries. */
    if(autoUpdateOn())reg.update().catch(()=>{});      // auto-check on every entry
  }).catch(e=>console.warn('sw failed',e));
}
</script>
