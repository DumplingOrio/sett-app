/* ============================== modal & wiring ============================== */
let closeAnimTimer=null;
function openModal(html){
  /* F23: a rapid re-open mid-dismissal must land clean — cancel any pending
     animated close and reset the closing state before showing the new sheet. */
  if(closeAnimTimer){clearTimeout(closeAnimTimer);closeAnimTimer=null;}
  const ov=$('overlay'),sh=$('sheet');
  ov.classList.remove('closing');sh.classList.remove('closing');sh.style.transform='';
  sh.innerHTML='<div class="sheethead"><div class="grab" onclick="closeModalAnimated(\'y\')"></div>'+
    '<button class="sheetclose" onclick="closeModalAnimated(\'y\')" aria-label="Close">✕</button></div>'+html;
  wireSheetDrag(sh.querySelector('.sheethead'));
  wireSheetExit();
  ov.classList.add('show');ov.scrollTop=0;lockBodyScroll();}
/* F30 (2026-07-06): body{overflow:hidden} does NOT stop iOS Safari from
   scrolling the page behind the sheet — the scroll chains through the overlay.
   The reliable lock is position:fixed with top:-scrollY, restored on close.
   Guarded so a rapid re-open mid-dismissal (F23) doesn't re-capture 0. */
let _scrollLockY=null;
function lockBodyScroll(){
  if(_scrollLockY!=null)return;                 // already locked (re-open mid-close)
  _scrollLockY=window.scrollY||window.pageYOffset||0;
  const b=document.body;
  b.style.position='fixed';b.style.top=(-_scrollLockY)+'px';
  b.style.left='0';b.style.right='0';b.style.width='100%';b.style.overflow='hidden';
}
function unlockBodyScroll(){
  if(_scrollLockY==null)return;
  const y=_scrollLockY;_scrollLockY=null;
  const b=document.body;
  b.style.position='';b.style.top='';b.style.left='';b.style.right='';b.style.width='';b.style.overflow='';
  window.scrollTo(0,y);                          // return to the exact prior position
}
function closeModal(){const ov=$('overlay'),sh=$('sheet');
  ov.classList.remove('show','closing');sh.classList.remove('closing');
  sh.style.transform='';unlockBodyScroll();clearInterval(visTimer);}
/* F23 (2026-07-06): smooth, consistent dismissal everywhere. The sheet slides
   off-screen (right for a swipe-right, down for drag-down / taps) while the
   overlay fades, THEN the real closeModal() lands. Programmatic closes after an
   action keep calling closeModal() directly — instant is correct there. */
function closeModalAnimated(dir){
  const ov=$('overlay'),sh=$('sheet');
  if(sh.classList.contains('closing'))return;   // already dismissing
  sh.classList.remove('dragging');
  sh.classList.add('closing');ov.classList.add('closing');
  sh.style.transform=(dir==='x'?'translateX(110%)':'translateY(110%)');
  if(closeAnimTimer)clearTimeout(closeAnimTimer);
  closeAnimTimer=setTimeout(()=>{closeAnimTimer=null;closeModal();},240);
}
/* F7 OWNER SPEC, verbatim (2026-07-06): "Add a swipe to exit feature in some
   of the menus where it makes sense. For example when a menu doesn't have an
   explicit X to close button." — every sheet: drag the header/grab area down
   to dismiss. The sheethead is sticky, so it's always reachable. */
function wireSheetDrag(head){
  if(!head)return;
  const sheet=$('sheet');
  let y0=null,x0=null,dy=0,ly=0,lt=0,vy=0,axis=0;
  head.addEventListener('touchstart',e=>{
    if(e.touches.length!==1)return;
    y0=e.touches[0].clientY;x0=e.touches[0].clientX;dy=0;vy=0;axis=0;ly=y0;lt=e.timeStamp;
  },{passive:true});
  head.addEventListener('touchmove',e=>{
    if(y0==null)return;
    const y=e.touches[0].clientY,x=e.touches[0].clientX;
    if(!axis){
      const ax=Math.abs(x-x0),ay=Math.abs(y-y0);
      if(ax<10&&ay<10)return;
      axis=ay>=ax?'y':'x';   // horizontal moves belong to swipe-right-to-exit
      if(axis==='y')sheet.classList.add('dragging');
    }
    if(axis!=='y')return;
    dy=Math.max(0,y-y0);
    const dt=e.timeStamp-lt;
    if(dt>0){vy=0.8*((y-ly)/dt)+0.2*vy;ly=y;lt=e.timeStamp;}
    sheet.style.transform='translateY('+dy+'px)';
    if(dy>0)e.preventDefault();
  },{passive:false});
  const end=e=>{
    if(y0==null)return;
    const wasY=axis==='y';y0=null;
    if(!wasY)return;
    sheet.classList.remove('dragging');
    if(dy>8){   // a real drag happened — don't let the release also count as a grab-tap
      const swallow=ev=>{ev.stopPropagation();ev.preventDefault();};
      head.addEventListener('click',swallow,true);
      setTimeout(()=>head.removeEventListener('click',swallow,true),400);
    }
    if(e&&e.timeStamp-lt>100)vy=0;   // finger paused before release — not a flick
    if(dy>120||(vy>0.5&&dy>30)){closeModalAnimated('y');}
    else sheet.style.transform='';
  };
  head.addEventListener('touchend',end);
  head.addEventListener('touchcancel',end);
}
/* F10 OWNER SPEC, verbatim (2026-07-06): "I want it to be swipe right to
   exit … Should be able to swipe out of most menus like these, the ones
   that have a delete option should still prompt this on swipe." His
   clarified pick: sheets containing a destructive action confirm before
   closing. Wired ONCE on the persistent #sheet element; drag-down stays. */
function wireSheetExit(){
  const sheet=$('sheet');if(!sheet||sheet._exitWired)return;sheet._exitWired=true;
  let x0=null,y0=null,dx=0,axis=0,lx=0,lt=0,vx=0;
  sheet.addEventListener('touchstart',e=>{
    if(e.touches.length!==1){x0=null;return;}
    x0=e.touches[0].clientX;y0=e.touches[0].clientY;dx=0;axis=0;vx=0;lx=x0;lt=e.timeStamp;
  },{passive:true});
  sheet.addEventListener('touchmove',e=>{
    if(x0==null)return;
    const x=e.touches[0].clientX,y=e.touches[0].clientY;
    if(!axis){
      const ax=Math.abs(x-x0),ay=Math.abs(y-y0);
      if(ax<14&&ay<14)return;
      axis=(ax>ay*1.6&&x>x0)?'x':'other';   // only a clearly rightward swipe exits
      if(axis==='x')sheet.classList.add('dragging');
    }
    if(axis!=='x')return;
    if(e.target.closest('input,textarea,select'))return;   // don't fight text selection
    dx=Math.max(0,x-x0);
    const dt=e.timeStamp-lt;
    if(dt>0){vx=0.8*((x-lx)/dt)+0.2*vx;lx=x;lt=e.timeStamp;}
    sheet.style.transform='translateX('+dx+'px)';
    e.preventDefault();
  },{passive:false});
  const end=e=>{
    if(x0==null)return;
    const wasX=axis==='x';x0=null;
    if(!wasX)return;
    sheet.classList.remove('dragging');
    if(e&&e.timeStamp-lt>100)vx=0;
    if(dx>110||(vx>0.5&&dx>40)){
      /* F18 (2026-07-06, owner revised F10): swipe-right always closes. A
         delete button's mere presence is NOT a reason to confirm — destructive
         actions confirm themselves; closing loses no unsaved input here. */
      closeModalAnimated('x');
    }else sheet.style.transform='';
  };
  sheet.addEventListener('touchend',end);
  sheet.addEventListener('touchcancel',end);
}
/* F12: keep list bottoms reachable while the iOS keyboard is up — mirror the
   keyboard height into --kb (body + sheet bottom padding use it).
   F28 (2026-07-06): the old formula subtracted vv.offsetTop, which SWINGS
   during scroll → kb flipped to 0 mid-scroll → .kb-open dropped (tab bar
   reappeared) and --kb flapped (page bounced). Fix: (1) keyboard height =
   layout viewport minus visual viewport height ONLY (no offsetTop); (2) the
   .kb-open class is driven by INPUT FOCUS (focusin/focusout), not by the
   flapping height, so scrolling can never toggle the tab bar; (3) hysteresis
   — --kb only drops to 0 when it's genuinely near 0, and the class holds as
   long as a text-capable field keeps focus AND the viewport is shrunk. */
function isTextInput(el){
  if(!el)return false;
  if(el.tagName==='TEXTAREA')return true;
  if(el.tagName!=='INPUT')return false;
  return !['button','submit','checkbox','radio','range','file','color','reset','image'].includes((el.type||'text').toLowerCase());
}
if(window.visualViewport){
  let kbFocused=false;
  const kbAdj=()=>{
    const raw=Math.max(0,window.innerHeight-window.visualViewport.height);   // F28: no offsetTop
    const kb=raw>40?Math.round(raw):0;
    document.documentElement.style.setProperty('--kb',kb+'px');
    /* F28: keyboard is "up" while a text field holds focus and the viewport is
       actually shrunk — scroll-driven offsetTop noise can't flip this off. */
    document.body.classList.toggle('kb-open',kbFocused&&kb>0);
  };
  document.addEventListener('focusin',e=>{if(isTextInput(e.target)){kbFocused=true;kbAdj();}});
  document.addEventListener('focusout',e=>{if(isTextInput(e.target)){kbFocused=false;
    /* let the blur settle before deciding the keyboard is really gone */
    setTimeout(()=>{if(!isTextInput(document.activeElement)){kbFocused=false;kbAdj();}},120);}});
  window.visualViewport.addEventListener('resize',kbAdj);
  window.visualViewport.addEventListener('scroll',kbAdj);
}
function wireInputs(){
  /* [data-f] filter is load-bearing: .excard/.swipe containers also carry
     data-ei (for updateLiveCues + gestures) and input events bubble to
     them — an unfiltered selector writes a junk s[undefined] key per
     keystroke (shipped v0.9.6–0.9.7; found in R6 verification) */
  document.querySelectorAll('#main [data-ei][data-f]').forEach(el=>{
    el.addEventListener('input',()=>{
      const e=store.active.entries[+el.dataset.ei];
      if(el.dataset.f==='note'){e.note=el.value;}
      else{const s=e.sets[+el.dataset.si];
        s[el.dataset.f]=el.value===''?null:(el.dataset.f==='r'?parseInt(el.value,10):parseFloat(el.value));}
      save();
      /* F25/F36/F37/F38: live cues under this exercise card, no full re-render */
      updateLiveCues(+el.dataset.ei);
    });
  });
  document.querySelectorAll('#main [data-act]').forEach(el=>{
    el.addEventListener('input',()=>{
      if(el.dataset.act==='routine'){store.active.routine=el.value;save();}
      else if(el.dataset.act==='bw'){store.active.bw=el.value===''?null:parseFloat(el.value);save();}
      else if(el.dataset.act==='wstart'){if(el.value)store.active.start=el.value.replace('T',' ');save();}
      else if(el.dataset.act==='wend'){if(el.value)store.active.end=el.value.replace('T',' ');save();}
      else if(el.dataset.act==='exq'){state.exQuery=el.value;
        clearTimeout(wireInputs._t);wireInputs._t=setTimeout(()=>{const el2=document.querySelector('[data-act=exq]');if(!el2)return;const pos=el2.selectionStart;render();const el3=document.querySelector('[data-act=exq]');if(el3){el3.focus();el3.setSelectionRange(pos,pos);}},250);}
    });
  });
  document.querySelectorAll('#main [data-rname]').forEach(el=>el.addEventListener('input',()=>{if(state.editRoutine)state.editRoutine.name=el.value;}));
  document.querySelectorAll('#main [data-rx]').forEach(el=>el.addEventListener('input',()=>{
    if(!state.editRoutine)return;
    const ex=state.editRoutine.exercises[+el.dataset.rx];if(!ex)return;
    const s=ex.sets[+el.dataset.rs];if(!s)return;
    const f=el.dataset.rf;
    s[f]=el.value===''?null:(f==='tw'?parseFloat(el.value):parseInt(el.value,10));
  }));
  document.querySelectorAll('#main .draghandle').forEach(h=>h.addEventListener('pointerdown',e=>startDrag(e,h)));
  document.querySelectorAll('#main [data-ex]').forEach(el=>el.onclick=()=>openExercise(el.dataset.ex));
  const csv=$('csvfile');if(csv)csv.onchange=()=>{
    const f=csv.files[0];if(!f)return;
    f.text().then(t=>{const res=importCsv(t);toast(res.msg);render();if(res.ok&&res.added)askSexIfUnset();});
  };
  const js=$('jsonfile');if(js)js.onchange=()=>{
    const f=js.files[0];if(!f)return;
    f.text().then(t=>{
      try{const s=JSON.parse(t);
        if(!s||s.schema!==1||!Array.isArray(s.workouts))throw new Error('bad shape');
        store=s;normalizeStore();migrateVisuals();save();toast('Backup restored — '+store.workouts.length+' workouts');render();
      }catch(e){toast('That file is not a Sett backup.');}
    });
  };
}

/* #5 swipe-to-reveal — OWNER SPEC, verbatim: "when you swipe left, show the
   delete button on RIGHT SIDE, when you swipe right, show copy on the LEFT
   SIDE." The row latches open past halfway and the button is TAPPED; nothing
   fires from the swipe itself. One row open at a time; tapping elsewhere
   closes it. Sets: Copy (right-swipe) + Remove (left-swipe). Exercises and
   workouts: left-swipe → Remove/Delete only. */
/* F8 OWNER SPEC, verbatim (2026-07-06): "too sensitive right now … if i
   swipe to delete and then swipe back it should stop in the middle, same
   story for the copy swipe." An open row drags from its OPEN position and
   a release settles at the nearest stop (open ↔ middle) — one gesture can
   never latch the opposite action. Flick thresholds raised. */
const SWW=60, SWLATCH=SWW*0.55, SWVEL=0.5;   // latch: 33px slow drag OR a genuinely fast flick
const SWDIRS={set:{l:1,r:1}, ex:{l:1}, wk:{l:1}};   // l = left-swipe allowed (del), r = right-swipe (copy)
let _sw=null, _swOpen=null, _swMoved=false, _swClosedTap=false;
function closeSwipe(){if(_swOpen){_swOpen.classList.remove('open-l','open-r');_swOpen=null;}}
function swipeCopy(ei,si){closeSwipe();copySet(ei,si);toast('Set copied');}
function swipeRemoveSet(ei,si){closeSwipe();removeSet(ei,si);}
function swipeRemoveEx(ei){closeSwipe();removeEntry(ei);}
function swipeDeleteWorkout(id){closeSwipe();deleteWorkout(id);}
function swipeStart(ev){
  _swMoved=false;_swClosedTap=false;
  if(ev.touches.length!==1){_sw=null;return;}
  const el=ev.target.closest('.swipe');
  /* touching anything OTHER than the open row closes it (that tap is
     swallowed); touching the open row keeps it latched so it can be
     dragged back from its open position (or tap-closed on release) */
  if(_swOpen&&el!==_swOpen){closeSwipe();_swClosedTap=true;}
  if(!el||!el.dataset.swipe){_sw=null;return;}
  if(ev.target.closest('[data-drag],button,input,textarea,select,a')){_sw=null;return;}
  const dirs=SWDIRS[el.dataset.swipe]||{};
  _sw={el,fg:el.querySelector('.swipe-fg'),x0:ev.touches[0].clientX,y0:ev.touches[0].clientY,
    dx:0,axis:0,dirs,
    base:el.classList.contains('open-r')?-SWW:el.classList.contains('open-l')?SWW:0,
    vx:0,lx:ev.touches[0].clientX,lt:ev.timeStamp};
}
function swipeMove(ev){
  if(!_sw)return;
  const t=ev.touches[0],dx=t.clientX-_sw.x0,dy=t.clientY-_sw.y0;
  if(!_sw.axis){
    const ax=Math.abs(dx),ay=Math.abs(dy);
    if(ax<12&&ay<12)return;
    /* only clearly horizontal gestures swipe; anything diagonal scrolls */
    if(ax>ay*1.6){_sw.axis='x';_sw.el.classList.add('swiping');_sw.el.classList.remove('open-l','open-r');}
    else{_sw=null;return;}
  }
  ev.preventDefault();
  const dt=ev.timeStamp-_sw.lt;
  if(dt>0){_sw.vx=0.8*((t.clientX-_sw.lx)/dt)+0.2*_sw.vx;_sw.lx=t.clientX;_sw.lt=ev.timeStamp;}
  /* from an open row the travel is capped at neutral — swiping back can
     never continue into the opposite action */
  let min,max;
  if(_sw.base<0){min=-SWW;max=0;}
  else if(_sw.base>0){min=0;max=SWW;}
  else{min=_sw.dirs.l?-SWW:0;max=_sw.dirs.r?SWW:0;}
  let d=_sw.base+dx;
  if(d<min)d=min+(d-min)*0.22; else if(d>max)d=max+(d-max)*0.22;   // rubber-band past the end
  _sw.dx=d;_swMoved=true;_sw.fg.style.transform='translateX('+d+'px)';
}
function swipeEnd(ev){
  if(!_sw)return;
  const s=_sw;_sw=null;s.el.classList.remove('swiping');s.fg.style.transform='';
  if(s.axis!=='x'){
    /* a plain tap on the open row closes it; the click is swallowed */
    if(_swOpen===s.el){closeSwipe();_swClosedTap=true;}
    return;
  }
  if(ev&&ev.timeStamp-s.lt>100)s.vx=0;   // finger paused before release — not a flick
  if(s.base!==0){
    /* released from an open row: nearest stop wins — re-open or neutral */
    const back=Math.sign(s.vx)!==Math.sign(s.base)&&Math.abs(s.vx)>SWVEL;   // flick toward neutral closes
    const stayOpen=!back&&Math.abs(s.dx)>=SWW/2&&Math.sign(s.dx)===Math.sign(s.base);
    if(stayOpen){s.el.classList.add(s.base<0?'open-r':'open-l');_swOpen=s.el;}
    else if(_swOpen===s.el)_swOpen=null;
    return;
  }
  const flickL=s.vx<-SWVEL&&s.dx<-28, flickR=s.vx>SWVEL&&s.dx>28;   // a quick flick latches too
  if(s.dirs.l&&(flickL||(s.dx<=-SWLATCH&&!flickR))){s.el.classList.add('open-r');_swOpen=s.el;}   // Delete/Remove on the right
  else if(s.dirs.r&&(flickR||(s.dx>=SWLATCH&&!flickL))){s.el.classList.add('open-l');_swOpen=s.el;}   // Copy on the left
  else if(_swOpen===s.el)_swOpen=null;
}
/* after a swipe (or an outside-tap that closed an open row), swallow the
   click the browser synthesises so it can't open the workout / focus an input */
function swipeClickGuard(ev){
  if(_swMoved||_swClosedTap){_swMoved=false;_swClosedTap=false;ev.stopPropagation();ev.preventDefault();}
}
function wireSwipe(){
  const m=$('main');if(!m||m._swWired)return;m._swWired=true;
  m.addEventListener('touchstart',swipeStart,{passive:true});
  m.addEventListener('touchmove',swipeMove,{passive:false});
  m.addEventListener('touchend',swipeEnd);
  m.addEventListener('touchcancel',swipeEnd);
  m.addEventListener('click',swipeClickGuard,true);
  // touching anywhere outside the open row (header, tab bar, other cards) closes it
  document.addEventListener('touchstart',e=>{if(_swOpen&&!_swOpen.contains(e.target))closeSwipe();},{passive:true});
}
/* F17 (2026-07-06): editing a past workout is a main VIEW (store.active.editing),
   not a sheet — the sheet swipe-exit never covered it. A clearly-rightward swipe
   on the editor that starts OUTSIDE any set-row/input/handle cancels editing
   (discardWorkout already confirms). Axis detection mirrors wireSheetExit so it
   won't fight row swipes or vertical scroll. */
function wireEditorExit(){
  const m=$('main');if(!m||m._edWired)return;m._edWired=true;
  let x0=null,y0=null,axis=0,armed=false;
  m.addEventListener('touchstart',e=>{
    armed=false;x0=null;
    if(e.touches.length!==1)return;
    if(!(store.active&&store.active.editing))return;
    // must start on empty editor space — not a set row, input, button, or drag handle
    if(e.target.closest('.swipe,input,textarea,select,button,[data-drag],[data-rodrag],.pillbtn'))return;
    x0=e.touches[0].clientX;y0=e.touches[0].clientY;axis=0;armed=true;
  },{passive:true});
  m.addEventListener('touchmove',e=>{
    if(!armed||x0==null)return;
    const x=e.touches[0].clientX,y=e.touches[0].clientY;
    if(!axis){
      const ax=Math.abs(x-x0),ay=Math.abs(y-y0);
      if(ax<12&&ay<12)return;
      axis=(ax>ay*1.6&&x>x0)?'x':'other';   // only a clearly rightward swipe exits
    }
  },{passive:true});
  m.addEventListener('touchend',()=>{
    if(armed&&axis==='x'&&store.active&&store.active.editing)discardWorkout();
    armed=false;x0=null;axis=0;
  });
  m.addEventListener('touchcancel',()=>{armed=false;x0=null;axis=0;});
}

/* F34 (2026-07-06) OWNER SPEC, verbatim: "Add a little bungee animation when
   you scroll all the way up or down app wide." Rubber-band on VERTICAL
   overscroll — drag past the top/bottom of a scroller with resistance
   (translateY of the content, ~0.35 damping, capped ~80px) and spring back on
   release. Touch-only (no wheel). Engages ONLY on a clearly-vertical drag that
   is already at the scroll edge and pulling further outward, so it can't fight
   row swipes (horizontal, F1/F8), the sheet's own drag-down (owned by the
   sheethead) or swipe-right exit (horizontal). Applied to the main page
   (window scroll → translate #main) and to open-sheet content (#overlay scroll
   → translate #sheet). Does NOT touch --kb / .kb-open (F28) or the body scroll
   lock (F30 sets position:fixed, which suspends main-page bungee while a sheet
   is open — correct, the sheet's own bungee takes over). */
const BUNGEE_DAMP=0.35, BUNGEE_MAX=80;
function wireBungee(scroller,content,scrollTopOf){
  if(!content||content._bungeeWired)return;content._bungeeWired=true;
  let y0=null,x0=null,active=0,axis=0,dy=0;
  const top=()=>scrollTopOf();
  const bottom=()=>{
    const el=scroller===window?document.scrollingElement||document.documentElement:scroller;
    return el.scrollHeight-el.clientHeight-scrollTopOf();
  };
  const busy=()=>content.classList.contains('closing')||content.classList.contains('dragging');
  content.addEventListener('touchstart',e=>{
    if(e.touches.length!==1||busy()){y0=null;return;}
    y0=e.touches[0].clientY;x0=e.touches[0].clientX;active=0;axis=0;dy=0;
    if(!active)content.style.transition='';
  },{passive:true});
  content.addEventListener('touchmove',e=>{
    if(y0==null||busy())return;
    const y=e.touches[0].clientY,x=e.touches[0].clientX;
    const ddy=y-y0,ddx=x-x0;
    if(!axis){
      const ax=Math.abs(ddx),ay=Math.abs(ddy);
      if(ax<8&&ay<8)return;
      if(ay<=ax*1.4){axis='x';return;}   // horizontal — leave it to swipe gestures / do nothing
      axis='y';
    }
    if(axis!=='y')return;
    if(!active){
      // only engage at the matching edge, pulling further past it (~2px slack)
      if(ddy>0&&top()<=1)active=1;         // pulling down at the top
      else if(ddy<0&&bottom()<=1)active=-1;// pulling up at the bottom
      else return;
    }
    const raw=(y-y0);                       // signed overshoot from where the pull began
    let d=raw*BUNGEE_DAMP;
    if(active>0)d=Math.max(0,Math.min(BUNGEE_MAX,d));
    else d=Math.min(0,Math.max(-BUNGEE_MAX,d));
    dy=d;content.style.transform='translateY('+d+'px)';
    e.preventDefault();                     // we own this gesture now
  },{passive:false});
  const end=()=>{
    if(y0==null)return;y0=null;
    if(!active){content.style.transform='';return;}
    active=0;
    content.style.transition='transform .3s cubic-bezier(.22,.61,.36,1)';
    content.style.transform='';
    setTimeout(()=>{if(content.style.transform==='')content.style.transition='';},320);
  };
  content.addEventListener('touchend',end);
  content.addEventListener('touchcancel',end);
}

/* F2 auto-stop — OWNER SPEC, verbatim (2026-07-06): "Workouts should have an
   auto stop and also not put you back in it when you leave." A closed PWA
   can't run timers, so this runs on open and on returning to the foreground:
   a live workout idle past AUTOSTOP_MS (owner picked 1 h after the last
   touch) is finalized retroactively with end = that last touch; one with no
   logged sets is discarded. `store.active.touch` is bumped by save() on
   every change while a workout is live. */
const AUTOSTOP_MS=3600000;
function autoStopStale(){
  const a=store.active;
  if(!a||a.editing)return false;
  const t=a.touch||toDate(a.start).getTime();
  if(Date.now()-t<AUTOSTOP_MS)return false;
  const entries=a.entries.map(e=>({...e,sets:e.sets.filter(s=>s.w!=null||s.r!=null||s.dur!=null||s.dist!=null).map(({tgt,...s})=>s)})).filter(e=>e.sets.length);
  if(!entries.length){store.active=null;save();toast('Forgotten empty workout discarded');return true;}
  for(const e of entries)ensureEx(e.name);
  const w={id:newWid(),start:a.start,end:nowStr(new Date(t)),routine:(a.routine||'').trim(),bw:a.bw||null,entries};
  store.workouts.unshift(w);store.workouts.sort((x,y)=>x.start<y.start?1:-1);
  store.active=null;save();
  toast('Workout auto-stopped and saved (ended '+fmtClock(w.end)+')');
  return true;
}
document.addEventListener('visibilitychange',()=>{if(!document.hidden&&autoStopStale())render();});

/* ============================== init ============================== */
if(firstRun){
  if(window.SETT_LOCAL_CSV){const r=importCsv(window.SETT_LOCAL_CSV);console.log('[sett] auto-import:',r.msg);}
  save();
}
migrateVisuals();
applyTheme((store.settings&&store.settings.theme)||'ember');
autoStopStale();
render();
wireSwipe();
wireEditorExit();
/* F34: main-page bungee (window scroll → translate #main) and sheet-content
   bungee (#overlay scroll → translate #sheet). Both wire-once and idempotent. */
wireBungee(window,$('main'),()=>window.scrollY||window.pageYOffset||0);
wireBungee($('overlay'),$('sheet'),()=>$('overlay').scrollTop);
if(firstRun&&!window.SETT_LOCAL_CSV)startOnboarding();

/* service worker: offline + auto-update on entering, plus a manual check */
let swReg=null, swRefreshing=false, swManualCheck=false;
function autoUpdateOn(){return !(store.settings&&store.settings.autoUpdate===false);}
function checkForUpdates(manual){
  if(!swReg){if(manual)toast('Updates need the installed app (add to Home Screen).');return;}
  if(manual)swManualCheck=true;
  swReg.update().then(()=>{
    // if a new worker is already waiting, activate it now
    if(swReg.waiting){swReg.waiting.postMessage('skipWaiting');}
    else if(manual&&!swReg.installing){toast('You’re on the latest version');swManualCheck=false;}
  }).catch(()=>{if(manual)toast('Could not check — are you online?');});
}
if('serviceWorker' in navigator&&location.protocol!=='file:'){
  const hadCtrl=!!navigator.serviceWorker.controller;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(swRefreshing)return;
    // a new version took over: reload if auto-update (or a manual check) asked for it
    if(hadCtrl&&(autoUpdateOn()||swManualCheck)){swRefreshing=true;location.reload();}
    else if(hadCtrl){toast('Update ready — reopen Sett to apply');}
  });
  navigator.serviceWorker.register('sw.js').then(reg=>{
    swReg=reg;
    reg.addEventListener('updatefound',()=>{
      const nw=reg.installing;if(!nw)return;
      nw.addEventListener('statechange',()=>{
        if(nw.state==='installed'&&navigator.serviceWorker.controller){
          // new version downloaded; skipWaiting -> activate -> controllerchange (handled above)
          if(autoUpdateOn()||swManualCheck)reg.waiting&&reg.waiting.postMessage('skipWaiting');
          else toast('Update ready — reopen Sett to apply');
        }
      });
    });
    if(autoUpdateOn())reg.update();      // auto-check on every entry
  }).catch(e=>console.warn('sw failed',e));
}
</script>
