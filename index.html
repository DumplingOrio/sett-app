<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0e1013">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sett">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<title>Sett — workout log</title>
<style>
  :root{
    --bg:#0e1013; --card:#171a20; --card2:#1f242d; --line:#272d38;
    --text:#eceff4; --muted:#8b93a3; --faint:#5b6270;
    --accent:#ff7a3c; --accent-soft:rgba(255,122,60,.14);
    --good:#7ee081; --bad:#ff5c5c;
    --r:16px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--text);
    font:16px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    overscroll-behavior-y:none;}
  body{padding-bottom:calc(76px + env(safe-area-inset-bottom));}
  h1,h2,h3{margin:0; letter-spacing:-.02em;}
  button{font:inherit; color:inherit; background:none; border:none; cursor:pointer; padding:0;}
  input,textarea,select{font:inherit; color:var(--text); background:var(--card2);
    border:1px solid var(--line); border-radius:10px; padding:10px 12px; outline:none;
    min-width:0; max-width:100%;}
  input:focus,textarea:focus,select:focus{border-color:var(--accent);}
  ::placeholder{color:var(--faint);}

  .topbar{position:sticky; top:0; z-index:20; display:flex; align-items:center; gap:10px;
    padding:calc(10px + env(safe-area-inset-top)) 18px 10px;
    background:color-mix(in srgb, var(--bg) 88%, transparent); backdrop-filter:blur(12px);}
  .wordmark{font-weight:800; font-size:20px; letter-spacing:-.03em;}
  .wordmark span{color:var(--accent);}
  .topbar .vtitle{margin-left:auto; color:var(--muted); font-size:14px; font-weight:600;}
  .gearbtn{margin-left:14px; color:var(--muted); width:30px; height:30px; display:flex; align-items:center; justify-content:center;}
  .gearbtn svg{width:22px; height:22px;}
  .gearbtn.on{color:var(--accent);}

  main{max-width:640px; margin:0 auto; padding:6px 16px 24px;}

  .tabbar{position:fixed; left:0; right:0; bottom:0; z-index:30; display:flex;
    justify-content:space-around; padding:8px 8px calc(8px + env(safe-area-inset-bottom));
    background:color-mix(in srgb, var(--card) 92%, transparent); backdrop-filter:blur(14px);
    border-top:1px solid var(--line);}
  .tab{display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--faint);
    font-size:11px; font-weight:600; min-width:56px; padding:4px 6px; border-radius:12px;}
  .tab svg{width:24px; height:24px;}
  .tab.on{color:var(--accent);}

  .card{background:var(--card); border:1px solid var(--line); border-radius:var(--r);
    padding:16px; margin:12px 0;}
  .card h3{font-size:15px; margin-bottom:10px;}
  .row{display:flex; align-items:center; gap:10px;}
  .grow{flex:1; min-width:0;}
  .muted{color:var(--muted);} .small{font-size:13px;} .tiny{font-size:11px;}
  .right{text-align:right;}

  .btn{display:inline-flex; align-items:center; justify-content:center; gap:8px;
    background:var(--card2); border:1px solid var(--line); border-radius:12px;
    padding:12px 16px; font-weight:700; font-size:15px;}
  .btn.primary{background:var(--accent); border-color:var(--accent); color:#18100a;}
  .btn.danger{color:var(--bad); border-color:color-mix(in srgb, var(--bad) 40%, var(--line));}
  .btn.wide{width:100%;}
  .btn.ghost{background:none;}
  .iconbtn{width:38px; height:38px; display:inline-flex; align-items:center; justify-content:center;
    border-radius:10px; color:var(--muted); font-size:18px; flex:none;}
  .iconbtn:active{background:var(--card2);}

  .chip{display:inline-flex; align-items:center; gap:6px; padding:3px 10px; border-radius:99px;
    font-size:12px; font-weight:700; background:var(--card2); color:var(--muted); white-space:nowrap;}
  .chip .dot{width:8px; height:8px; border-radius:50%;}
  .chiprow{display:flex; gap:8px; overflow-x:auto; padding:4px 2px 8px; scrollbar-width:none;}
  .chiprow::-webkit-scrollbar{display:none;}
  .chiprow .chip.on{background:var(--accent-soft); color:var(--accent);}

  .hero{padding:26px 18px; text-align:center;}
  .hero .big{font-size:26px; font-weight:800; letter-spacing:-.03em;}

  .statgrid{display:grid; grid-template-columns:repeat(3,1fr); gap:10px;}
  .statgrid.two{grid-template-columns:1fr 1fr;}
  .stat{background:var(--card2); border-radius:12px; padding:12px;}
  .stat .v{font-size:20px; font-weight:800; letter-spacing:-.02em;}
  .stat .l{font-size:11px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.05em;}

  .listrow{display:flex; align-items:center; gap:12px; padding:13px 4px;
    border-bottom:1px solid var(--line); cursor:pointer;}
  .listrow:last-child{border-bottom:none;}

  /* logger */
  .setgrid{display:grid; grid-template-columns:30px 1fr 1fr 52px 34px; gap:8px; align-items:center; margin-top:8px;}
  .setgrid input{text-align:center; padding:11px 6px; font-weight:700; font-size:16px;}
  .setidx{color:var(--faint); font-weight:800; text-align:center; font-size:14px;}
  .setidx.drop{color:var(--accent);}
  .sethead{color:var(--faint); font-size:10px; font-weight:700; text-transform:uppercase;
    letter-spacing:.06em; text-align:center;}
  .ssbadge{font-size:10px; font-weight:800; letter-spacing:.04em; padding:2px 8px;
    border-radius:99px; background:var(--accent-soft); color:var(--accent);}
  .elapsed{font-variant-numeric:tabular-nums; font-weight:800; color:var(--accent);}
  /* drop-set toggle per row: labelled, obvious, tap again to undo */
  .droptog{display:flex; align-items:center; justify-content:center; height:38px; border-radius:10px;
    border:1px solid var(--line); background:var(--card2); color:var(--muted);
    font-size:10px; font-weight:800; letter-spacing:.04em; text-transform:uppercase;}
  .droptog.on{background:var(--accent-soft); border-color:var(--accent); color:var(--accent);}
  /* exercise control row (reorder / superset / delete) — labelled, own line */
  .exctrl{display:flex; gap:6px; flex-wrap:wrap; margin-top:10px;}
  .exctrl button{display:flex; align-items:center; gap:5px; padding:7px 11px; border-radius:10px;
    border:1px solid var(--line); background:var(--card2); color:var(--muted); font-size:12px; font-weight:700;}
  .exctrl button.on{background:var(--accent-soft); border-color:var(--accent); color:var(--accent);}
  .exctrl button.del{color:var(--bad); border-color:color-mix(in srgb, var(--bad) 35%, var(--line));}
  .exctrl .sp{flex:1;}
  .noteline{width:100%; margin-top:10px;}
  .legend{display:flex; gap:14px; flex-wrap:wrap; margin-top:6px; font-size:11px; color:var(--faint);}
  .legend b{color:var(--accent);}

  /* ranks */
  .rankbadge{display:inline-flex; align-items:center; gap:7px; padding:4px 12px; border-radius:99px;
    font-weight:800; font-size:13px; border:1px solid;}
  .rankbar{height:6px; border-radius:99px; background:var(--card2); overflow:hidden; margin-top:6px;}
  .rankbar i{display:block; height:100%; border-radius:99px;}

  .spark{width:100%; height:56px;}
  .barchart{width:100%; height:120px;}
  .bigchart{width:100%; height:190px;}
  .datebadge{width:48px; flex:none; text-align:center; background:var(--card2);
    border-radius:10px; padding:5px 0 6px;}
  .datebadge .dow{font-size:10px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:.04em;}
  .datebadge .d{font-size:18px; font-weight:800; line-height:1.15;}
  .exicons{display:flex; gap:0; margin-left:auto;}
  .exicons .iconbtn{color:var(--accent); width:34px;}
  .exicons .iconbtn svg{width:19px; height:19px;}
  .seg{display:flex; gap:6px; flex-wrap:wrap; margin:10px 0;}
  .seg button{padding:7px 13px; border-radius:99px; background:var(--card2); border:1px solid var(--line);
    font-size:13px; font-weight:700; color:var(--muted);}
  .seg button.on{background:var(--accent-soft); color:var(--accent); border-color:transparent;}
  .toggle{width:50px; height:30px; border-radius:99px; background:var(--card2); border:1px solid var(--line);
    position:relative; flex:none; transition:background .15s;}
  .toggle .knob{position:absolute; top:3px; left:3px; width:22px; height:22px; border-radius:50%;
    background:var(--faint); transition:transform .15s, background .15s;}
  .toggle.on{background:var(--accent-soft); border-color:var(--accent);}
  .toggle.on .knob{transform:translateX(20px); background:var(--accent);}

  /* modal */
  #overlay{position:fixed; inset:0; z-index:50; display:none; background:rgba(5,6,8,.72);
    backdrop-filter:blur(4px); overflow-y:auto;}
  #overlay.show{display:block;}
  .sheet{max-width:640px; margin:8vh auto 0; background:var(--card); border:1px solid var(--line);
    border-radius:20px 20px 0 0; min-height:60vh; padding:0 18px calc(30px + env(safe-area-inset-bottom));
    animation:up .18s ease-out;}
  @keyframes up{from{transform:translateY(30px); opacity:.4;} to{transform:none; opacity:1;}}
  .sheethead{position:sticky; top:0; z-index:3; display:flex; align-items:center; justify-content:flex-end;
    height:52px; margin:0 -18px 4px; padding:0 14px;
    background:color-mix(in srgb, var(--card) 94%, transparent); backdrop-filter:blur(8px);
    border-radius:20px 20px 0 0;}
  .sheethead .grab{position:absolute; left:50%; top:9px; transform:translateX(-50%);
    width:44px; height:5px; border-radius:99px; background:var(--line);}
  .sheetclose{width:38px; height:38px; border-radius:50%; background:var(--card2); color:var(--text);
    font-size:17px; display:flex; align-items:center; justify-content:center; flex:none;}
  .sheetclose:active{background:var(--line);}

  #toast{position:fixed; left:50%; bottom:calc(90px + env(safe-area-inset-bottom)); transform:translateX(-50%);
    z-index:60; background:var(--card2); border:1px solid var(--line); color:var(--text);
    padding:10px 18px; border-radius:12px; font-weight:600; font-size:14px; display:none;
    max-width:88vw; text-align:center;}

  textarea.howto{width:100%; min-height:90px; resize:vertical;}
  .visual{background:#fff; border-radius:14px; overflow:hidden; margin:12px 0; text-align:center;}
  .visual img{display:block; width:100%; max-width:440px; margin:0 auto;}
  .thumb{width:52px; height:52px; border-radius:10px; background:#fff; object-fit:cover; flex:none;}
  .musclegrid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:12px 0;}
  .musclegrid .l{font-size:11px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.05em;}
  .musclegrid .v{font-weight:700; text-transform:capitalize;}
  ol.instructions{margin:0; padding-left:20px;}
  ol.instructions li{margin:7px 0; color:var(--text); font-size:14px;}
  .banner{background:var(--accent-soft); border:1px solid color-mix(in srgb, var(--accent) 35%, var(--line));
    color:var(--accent); border-radius:12px; padding:10px 14px; font-size:13px; font-weight:600; margin:12px 0;}
  @media(prefers-reduced-motion:reduce){*{animation:none!important; transition:none!important;}}
</style>
</head>
<body>
<header class="topbar">
  <div class="wordmark">Sett<span>.</span></div>
  <div class="vtitle" id="vtitle"></div>
  <button class="gearbtn" id="gear" onclick="setView('settings')" aria-label="Settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3.2"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-1.8-.3 1.6 1.6 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.6 1.6 0 0 0-1-1.5 1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0 .3-1.8 1.6 1.6 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.6 1.6 0 0 0 1.5-1 1.6 1.6 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.8.3H9a1.6 1.6 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.6 1.6 0 0 0 1 1.5 1.6 1.6 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8V9a1.6 1.6 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1z"/></svg>
  </button>
</header>
<main id="main"></main>
<nav class="tabbar" id="tabbar"></nav>
<div id="overlay" onclick="if(event.target===this)closeModal()"><div class="sheet" id="sheet"></div></div>
<div id="toast"></div>

<script src="exercises.js" onerror="window.SETT_CATALOG=[];window.SETT_ALIAS={}"></script>
<script src="data.local.js" onerror="window.SETT_LOCAL_CSV=null"></script>
<script>
'use strict';
/* ============================== constants ============================== */
const APP_VERSION='0.5.0';
const CHANGELOG=[
  {v:'0.5.0', date:'2026-07-05', desc:'Reorganised: Log is now your workout history, and Routines is its own tab with your own routines plus popular splits like Push/Pull/Legs, Upper/Lower and Full Body. A new Settings screen (gear, top right) holds themes, strength ranks, data import/export and updates. Strength ranks can be turned off entirely (asked once after your first import). The app now updates itself when you open it, with a manual "Check for updates" button too. Fresh installs start empty — no demo data to clear.'},
  {v:'0.4.0', date:'2026-07-05', desc:'Easier to use: sheets now have a clear close button, the drop-set and superset controls are labelled and obvious (and tap again to undo a misclick), and the notes field sits on its own line so nothing is cut off. New colour themes live under Appearance in More. Strength ranks can now use male, female or unisex standards — pick yours in More or right after importing a CSV — so the app works for more than one person. The changelog is tucked away so it no longer fills the screen.'},
  {v:'0.3.0', date:'2026-07-05', desc:'Statistics reworked RepCount-style: tap any overall stat (duration, volume, sets, reps, reps per set, bodyweight, workouts) to see its trend over time. Every exercise gained quick buttons for History, Charts (pick a metric and time range) and Personal Records including rep-max records. Past workouts can now be edited — sets, exercises, and start/end times. History shows calendar-style date badges, and narrow-screen layout issues on the log view were fixed.'},
  {v:'0.2.0', date:'2026-07-05', desc:'Every exercise now has an animated visual showing how it is performed, with primary and secondary muscles, equipment and step-by-step instructions — including a browsable catalog of 873 exercises to add from. You can link any visual to your own custom exercises. More lifts are ranked (dumbbell lifts by weight, pull-ups/dips/push-ups by reps), stats gained total reps, reps per set and average duration, workouts can be reordered while logging, and your data can be exported as a RepCount-style CSV for Excel.'},
  {v:'0.1.0', date:'2026-07-05', desc:'First version. Log workouts with supersets and drop sets, browse your full history, exercise library with editable form notes, records and estimated 1RM per exercise, Liftoff-style strength ranks, stats, and import of RepCount CSV exports. Installable on iPhone as a home-screen app that works offline.'},
];
const KEY='sett:store';
/* Colour themes — all dark (gym-friendly), only accent + surface shades vary,
   so light text stays legible everywhere. Applied by setting CSS variables. */
const THEMES={
  ember:  {name:'Ember',  accent:'#ff7a3c', bg:'#0e1013', card:'#171a20', card2:'#1f242d', line:'#272d38'},
  ocean:  {name:'Ocean',  accent:'#4cc2ff', bg:'#0a0f16', card:'#121926', card2:'#1a2432', line:'#25303f'},
  forest: {name:'Forest', accent:'#5fd07a', bg:'#0b1210', card:'#131b18', card2:'#1b2621', line:'#26332c'},
  grape:  {name:'Grape',  accent:'#c792ea', bg:'#100d16', card:'#191522', card2:'#221d2e', line:'#2e2839'},
  rose:   {name:'Rose',   accent:'#ff6f9c', bg:'#140d11', card:'#1e151a', card2:'#291d23', line:'#372730'},
  slate:  {name:'Slate',  accent:'#9fb2c9', bg:'#0d0f11', card:'#161a1e', card2:'#1e242a', line:'#2a3138'},
};
const THEME_ORDER=['ember','ocean','forest','grape','rose','slate'];
function applyTheme(id){
  const t=THEMES[id]||THEMES.ember;const r=document.documentElement.style;
  r.setProperty('--accent',t.accent);
  r.setProperty('--accent-soft',t.accent+'24');
  r.setProperty('--bg',t.bg);r.setProperty('--card',t.card);
  r.setProperty('--card2',t.card2);r.setProperty('--line',t.line);
  const meta=document.querySelector('meta[name=theme-color]');if(meta)meta.content=t.bg;
}
const CATS=['Chest','Back','Legs','Shoulders','Biceps','Triceps','Abs','Cardio','Other'];
const CAT_COLORS={Chest:'#ff7a3c',Back:'#4cc2ff',Legs:'#7ee081',Shoulders:'#ffd166',
  Biceps:'#c792ea',Triceps:'#f47fb2',Abs:'#6ee7d8',Cardio:'#ff5c5c',Other:'#8b93a3'};

/* Liftoff-style tiers. Thresholds are estimated-1RM : bodyweight ratios needed
   to REACH each tier (Iron is where everyone starts). Male standards, roughly
   aligned with strengthlevel.com beginner→elite bands. */
const TIERS=[
  {name:'Iron',     color:'#9aa0a8'},
  {name:'Bronze',   color:'#cd8a4b'},
  {name:'Silver',   color:'#c8ccd4'},
  {name:'Gold',     color:'#f5c542'},
  {name:'Platinum', color:'#54e0c7'},
  {name:'Diamond',  color:'#6ab7ff'},
  {name:'Master',   color:'#b06af0'},
];
/* Two kinds of standards:
   type 'bw'   — thresholds are e1RM ÷ bodyweight ratios (dumbbell lifts: per hand)
   type 'reps' — thresholds are max reps in one bodyweight set
   Only lifts with published strength standards are ranked. Machine and cable
   exercises are deliberately unranked: stack numbers aren't comparable
   between gyms (different brands, pulleys and lever ratios). */
const STANDARDS_MALE={
  'Bench Press':            {t:'bw', s:[0.50,0.75,1.00,1.50,2.00,2.30]},
  'Incline Bench Press':    {t:'bw', s:[0.40,0.65,0.90,1.30,1.75,2.00]},
  'Close Grip Bench Press': {t:'bw', s:[0.45,0.70,0.95,1.40,1.85,2.10]},
  'Squat':                  {t:'bw', s:[0.75,1.25,1.50,2.25,2.75,3.15]},
  'Deadlift':               {t:'bw', s:[1.00,1.50,2.00,2.50,3.00,3.45]},
  'Romanian Deadlift':      {t:'bw', s:[0.80,1.20,1.60,2.10,2.60,3.00]},
  'Military Press':         {t:'bw', s:[0.35,0.55,0.80,1.05,1.40,1.60]},
  'Barbell Row':            {t:'bw', s:[0.50,0.75,1.00,1.50,1.75,2.00]},
  'Hip thrust':             {t:'bw', s:[0.85,1.35,1.90,2.60,3.30,3.80]},
  'EZ Bar Curl':            {t:'bw', s:[0.25,0.40,0.60,0.85,1.15,1.30]},
  'Dumbbell Press':         {t:'bw', s:[0.15,0.30,0.45,0.65,0.85,1.00]},
  'Incline Dumbbell Press': {t:'bw', s:[0.13,0.27,0.42,0.60,0.80,0.95]},
  'Shoulder Dumbbell Press':{t:'bw', s:[0.10,0.22,0.35,0.50,0.66,0.75]},
  'Dumbbell Row':           {t:'bw', s:[0.20,0.40,0.60,0.80,1.05,1.20]},
  'Dumbbell Bicep Curl':    {t:'bw', s:[0.06,0.12,0.21,0.32,0.44,0.50]},
  'Seated Bicep Curl':      {t:'bw', s:[0.06,0.12,0.21,0.32,0.44,0.50]},
  'Hammer Curl':            {t:'bw', s:[0.06,0.13,0.22,0.33,0.45,0.52]},
  'Leg Press':              {t:'bw', s:[1.00,1.75,2.50,3.50,4.50,5.20]},
  'Pull Up':                {t:'reps', s:[1,6,13,22,33,40]},
  'Chin Up':                {t:'reps', s:[2,8,16,26,38,45]},
  'Dips':                   {t:'reps', s:[4,12,22,35,50,60]},
  'Push-ups':               {t:'reps', s:[10,25,45,70,100,120]},
};
/* Female standards are derived from the male table by movement-group factors
   (women lift a smaller multiple of bodyweight, most so on upper-body pressing,
   least on lower body). Approximate, aligned with strengthlevel.com's separate
   male/female bands. "Neutral" (unisex) sits halfway between the two. */
const MOVEMENT_GROUP={
  'Bench Press':'press','Incline Bench Press':'press','Close Grip Bench Press':'press',
  'Military Press':'press','Dumbbell Press':'press','Incline Dumbbell Press':'press','Shoulder Dumbbell Press':'press',
  'Barbell Row':'pull','Dumbbell Row':'pull',
  'EZ Bar Curl':'arms','Dumbbell Bicep Curl':'arms','Seated Bicep Curl':'arms','Hammer Curl':'arms',
  'Squat':'legs','Deadlift':'legs','Romanian Deadlift':'legs','Hip thrust':'legs','Leg Press':'legs',
  'Pull Up':'body','Chin Up':'body','Dips':'body','Push-ups':'body',
};
const FEMALE_FACTOR={press:0.62,pull:0.65,arms:0.58,legs:0.72,body:0.50};
function deriveStandards(kind){
  if(kind==='male')return STANDARDS_MALE;
  const out={};
  for(const [name,def] of Object.entries(STANDARDS_MALE)){
    let f=FEMALE_FACTOR[MOVEMENT_GROUP[name]||'press'];
    if(kind==='neutral')f=(1+f)/2;
    out[name]={t:def.t,s:def.s.map(v=>def.t==='reps'?Math.max(1,Math.round(v*f)):Math.round(v*f*100)/100)};
  }
  return out;
}

/* ============================== CSV import (RepCount export) ============================== */
function parseCsv(text){
  const rows=[];let field='',row=[],inQ=false;
  text=text.replace(/^﻿/,'');
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQ){
      if(c==='"'){if(text[i+1]==='"'){field+='"';i++;}else inQ=false;}
      else field+=c;
    }else if(c==='"')inQ=true;
    else if(c===';'){row.push(field);field='';}
    else if(c==='\n'){row.push(field);field='';if(row.some(f=>f!=='')||row.length>1)rows.push(row);row=[];}
    else if(c!=='\r')field+=c;
  }
  if(field!==''||row.length){row.push(field);if(row.some(f=>f!==''))rows.push(row);}
  return rows;
}
function importCsv(text){
  const rows=parseCsv(text);
  if(!rows.length||!/workout start/i.test(rows[0][0]||''))
    return {ok:false,msg:'Not a RepCount export — expected a header starting with "Workout Start".'};
  const existing=new Set(store.workouts.map(w=>w.start+'|'+w.end));
  const byKey=new Map();
  let sets=0;
  for(let i=1;i<rows.length;i++){
    const r=rows[i];if(r.length<12)continue;
    const [start,end,exRaw,weight,reps,note,kcal,dist,dur,cat,routine,bw]=r;
    const name=exRaw.trim();if(!name||!start)continue;
    const key=start+'|'+end;
    if(!byKey.has(key))byKey.set(key,{id:'w'+start.replace(/\D/g,''),start,end,
      routine:routine.trim(),bw:bw?parseFloat(bw):null,entries:[]});
    const w=byKey.get(key);
    if(routine.trim()&&!w.routine)w.routine=routine.trim();
    if(bw&&w.bw==null)w.bw=parseFloat(bw);
    ensureEx(name,cat.trim()||'Other');
    let entry=w.entries[w.entries.length-1];
    if(!entry||entry.name!==name){entry={name,ss:null,note:'',sets:[]};w.entries.push(entry);}
    entry.sets.push({
      w:weight===''?null:parseFloat(weight),
      r:reps===''?null:parseInt(reps,10),
      dur:dur===''?null:parseFloat(dur),
      dist:dist===''?null:parseFloat(dist),
      note:note.trim(),drop:false});
    sets++;
  }
  let added=0,skipped=0;
  for(const w of byKey.values()){
    if(existing.has(w.start+'|'+w.end)){skipped++;continue;}
    store.workouts.push(w);added++;
  }
  store.workouts.sort((a,b)=>a.start<b.start?1:-1);
  save();
  return {ok:true,added,skipped,sets,msg:'Imported '+added+' workouts ('+sets+' sets)'+(skipped?', skipped '+skipped+' already present':'')+'.'};
}

/* ============================== derived stats ============================== */
function allSetsOf(name,exclActive){
  const out=[];
  for(const w of store.workouts)for(const e of w.entries)if(e.name===name)for(const s of e.sets)out.push({s,date:w.start});
  return out;
}
function exSessions(name){
  const out=[];
  for(const w of store.workouts){
    const sets=[];for(const e of w.entries)if(e.name===name)sets.push(...e.sets);
    if(!sets.length)continue;
    let best=null;for(const s of sets){const e1=epley(s.w,s.r);if(e1!=null&&(best==null||e1>best))best=e1;}
    out.push({date:w.start,sets,best,vol:sets.reduce((a,s)=>a+setVol(s),0)});
  }
  return out; // newest first (workouts sorted desc)
}
function prFor(name){
  let maxW=null,maxWr=null,bestE1=null,bestSet=null,total=0,last=null;
  for(const {s,date} of allSetsOf(name)){
    total++;if(!last||date>last)last=date;
    if(s.w!=null&&(maxW==null||s.w>maxW||(s.w===maxW&&(s.r||0)>(maxWr||0)))){maxW=s.w;maxWr=s.r;}
    const e1=epley(s.w,s.r);
    if(e1!=null&&(bestE1==null||e1>bestE1)){bestE1=e1;bestSet=s;}
  }
  return {maxW,maxWr,bestE1,bestSet,total,last,sessions:exSessions(name).length};
}
function latestBW(){for(const w of store.workouts)if(w.bw)return w.bw;return store.active&&store.active.bw||null;}

/* ============================== ranks ============================== */
function rankFor(name){
  const std=STD()[name];if(!std)return null;
  let value,unit,bw=null;
  if(std.t==='bw'){
    bw=latestBW();if(!bw)return {locked:'bw'};
    const pr=prFor(name);if(pr.bestE1==null||pr.bestE1<=0)return {locked:'data'};
    value=pr.bestE1/bw;unit='ratio';
  }else{
    let best=null;
    for(const {s} of allSetsOf(name))if((s.w==null||s.w===0)&&s.r&&(best==null||s.r>best))best=s.r;
    if(best==null)return {locked:'data'};
    value=best;unit='reps';
  }
  const s=std.s;
  let tier=0;while(tier<s.length&&value>=s[tier])tier++;
  const lo=tier===0?0:s[tier-1];
  const hi=tier<s.length?s[tier]:null;
  const prog=hi==null?1:Math.min(1,Math.max(0,(value-lo)/(hi-lo)));
  return {tier,value,unit,prog,bw,next:hi,e1:unit==='ratio'?value*bw:null};
}
function overallRank(){
  const parts=[];
  for(const name of Object.keys(STD())){
    const r=rankFor(name);
    if(r&&!r.locked)parts.push(r.tier+r.prog);
  }
  if(!parts.length)return null;
  const avg=parts.reduce((a,b)=>a+b,0)/parts.length;
  return {tier:Math.min(TIERS.length-1,Math.floor(avg)),prog:avg-Math.floor(avg),count:parts.length};
}
function rankBadge(tier,extra){
  const t=TIERS[tier];
  return '<span class="rankbadge" style="color:'+t.color+';border-color:'+t.color+'55;background:'+t.color+'14">'+t.name+(extra||'')+'</span>';
}

    const top=e.sets.reduce((a,s)=>setVol(s)>setVol(a)?s:a,e.sets[0]);
    if(top&&top.w!=null)return ' · last: '+fmtW(top.w)+' kg × '+(top.r||'—');
    return '';
  }
  return '';
}
function addSet(ei){const e=store.active.entries[ei];const p=e.sets[e.sets.length-1];
  e.sets.push({w:p?p.w:null,r:p?p.r:null,dur:null,dist:null,note:'',drop:false});save();render();}
function removeSet(ei,si){store.active.entries[ei].sets.splice(si,1);save();render();}
function toggleDrop(ei,si){const s=store.active.entries[ei].sets[si];s.drop=!s.drop;save();render();}
function removeEntry(ei){store.active.entries.splice(ei,1);save();render();}
function moveEntry(ei,dir){const es=store.active.entries;const j=ei+dir;if(j<0||j>=es.length)return;
  [es[ei],es[j]]=[es[j],es[ei]];save();render();}
function toggleSS(ei){
  const es=store.active.entries,e=es[ei],prev=es[ei-1];if(!prev)return;
  if(e.ss!=null&&e.ss===prev.ss){e.ss=null;}
  else{if(prev.ss==null){let g=0;for(const x of es)if(x.ss!=null)g=Math.max(g,x.ss+1);prev.ss=g;}e.ss=prev.ss;}
  save();render();
}
function discardWorkout(){
  const editing=store.active&&store.active.editing;
  if(!confirm(editing?'Cancel editing? Your changes will be lost.':'Discard this workout? Nothing will be saved.'))return;
  store.active=null;save();clearInterval(tick);render();}
function finishWorkout(){
  const a=store.active;
  const entries=a.entries.map(e=>({...e,sets:e.sets.filter(s=>s.w!=null||s.r!=null||s.dur!=null)})).filter(e=>e.sets.length);
  if(!entries.length){toast('Log at least one set first');return;}
  if(a.editing){
    const idx=store.workouts.findIndex(x=>x.id===a.editing);
    const w={id:a.editing,start:a.start,end:a.end||a.start,routine:a.routine.trim(),bw:a.bw||null,entries};
    for(const e of entries)ensureEx(e.name);
    if(idx>=0)store.workouts[idx]=w;else store.workouts.unshift(w);
    store.workouts.sort((x,y)=>x.start<y.start?1:-1);
    store.active=null;save();toast('Workout updated');setView('log');
    return;
  }
  // PR check against history before saving
  const prs=[];
  for(const e of entries){
    const before=prFor(e.name).bestE1;
    let best=null;for(const s of e.sets){const v=epley(s.w,s.r);if(v!=null&&(best==null||v>best))best=v;}
    if(best!=null&&best>0&&(before==null||best>before))prs.push({name:e.name,e1:best});
    ensureEx(e.name);
  }
  const w={id:'w'+a.start.replace(/\D/g,''),start:a.start,end:nowStr(),routine:a.routine.trim(),bw:a.bw||null,entries};
  store.workouts.unshift(w);store.workouts.sort((x,y)=>x.start<y.start?1:-1);
  store.active=null;save();clearInterval(tick);
  const vol=entries.reduce((t,e)=>t+e.sets.reduce((x,s)=>x+setVol(s),0),0);
  const nsets=entries.reduce((t,e)=>t+e.sets.length,0);
  openModal('<h2 style="margin-bottom:4px">Workout saved 💪</h2>'+
    '<p class="muted small">'+fmtDur(w.start,w.end)+' · '+nsets+' sets · '+fmtNum(vol)+' kg volume</p>'+
    (prs.length?'<div class="card"><h3>New records</h3>'+prs.map(p=>'<div class="listrow" style="cursor:default"><div class="grow">'+esc(p.name)+'</div><b style="color:var(--good)">e1RM '+fmtW(p.e1)+' kg</b></div>').join('')+'</div>':'')+
    '<button class="btn primary wide" onclick="closeModal();setView(\'log\')">Nice</button>');
  render();
}

/* line chart with axis labels; pts=[{t:label, y:number}] ascending in time */
function lineChart(pts,fmtY){
  fmtY=fmtY||(v=>fmtNum(v));
  if(!pts.length)return '<p class="muted small">No data in this range.</p>';
  const W=560,H=190,L=56,R=12,T=14,B=28;
  const ys=pts.map(p=>p.y);let min=Math.min(...ys),max=Math.max(...ys);
  if(min===max){min-=1;max+=1;}
  const nx=i=>pts.length===1?(L+(W-L-R)/2):L+i*(W-L-R)/(pts.length-1);
  const ny=v=>T+(H-T-B)*(1-(v-min)/(max-min));
  let s='<svg class="bigchart" viewBox="0 0 '+W+' '+H+'">';
  for(const v of [min,(min+max)/2,max]){
    s+='<line x1="'+L+'" y1="'+ny(v)+'" x2="'+(W-R)+'" y2="'+ny(v)+'" stroke="var(--line)" stroke-width="1"/>'+
       '<text x="'+(L-8)+'" y="'+(ny(v)+4)+'" font-size="11" fill="var(--muted)" text-anchor="end">'+fmtY(v)+'</text>';
  }
  const path=pts.map((p,i)=>(i?'L':'M')+nx(i).toFixed(1)+' '+ny(p.y).toFixed(1)).join(' ');
  s+='<path d="'+path+'" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';
  if(pts.length<=30)pts.forEach((p,i)=>{s+='<circle cx="'+nx(i)+'" cy="'+ny(p.y)+'" r="3" fill="var(--accent)"/>';});
  else s+='<circle cx="'+nx(pts.length-1)+'" cy="'+ny(pts[pts.length-1].y)+'" r="4" fill="var(--accent)"/>';
  s+='<text x="'+L+'" y="'+(H-8)+'" font-size="11" fill="var(--faint)">'+esc(pts[0].t)+'</text>'+
     '<text x="'+(W-R)+'" y="'+(H-8)+'" font-size="11" fill="var(--faint)" text-anchor="end">'+esc(pts[pts.length-1].t)+'</text></svg>';
  return s;
}

const exChart={metric:'e1',range:'all'};

const CHART_RANGES={'3m':'3M','6m':'6M','1y':'1Y',all:'All'};

/* personal records incl. rep-max frontier */
function repRecords(name){
  const best={};
  for(const {s,date} of allSetsOf(name))
    if(s.w!=null&&s.w>0&&s.r&&s.r<=20&&(!best[s.r]||s.w>best[s.r].w))best[s.r]={w:s.w,date};
  const rs=Object.keys(best).map(Number).sort((a,b)=>b-a);
  const out=[];let maxW=-1;
  for(const r of rs){if(best[r].w>maxW){out.push({r,...best[r]});maxW=best[r].w;}}
  return out.reverse(); // ascending reps, strictly decreasing... increasing weight toward low reps
}
function openExPRs(name){
  const rr=repRecords(name);
  const sessions=exSessions(name);
  const bestBy=(fn)=>{let b=null;for(const s of sessions){const v=fn(s);if(v!=null&&(!b||v>b.v))b={v,date:s.date};}return b;};
  const volR=bestBy(s=>s.vol||null), e1R=bestBy(s=>s.best), repsR=bestBy(s=>s.sets.reduce((a,x)=>a+(x.r||0),0)||null),
        setsR=bestBy(s=>s.sets.length), maxwR=bestBy(s=>Math.max(0,...s.sets.map(x=>x.w||0))||null),
        maxrR=bestBy(s=>Math.max(0,...s.sets.map(x=>x.r||0))||null);
  const tile=(l,v,d)=>'<div class="stat"><div class="l" style="color:var(--accent)">'+l+'</div><div class="v">'+v+'</div>'+
    (d?'<div class="tiny muted">'+fmtDay(d)+'</div>':'')+'</div>';
  let h='<h2>Personal records</h2><p class="tiny muted">'+esc(name)+'</p>';
  if(rr.length){
    h+='<div class="card"><h3>🏆 Rep records</h3>';
    for(const x of rr)h+='<div class="row small" style="padding:6px 0;border-bottom:1px solid var(--line)">'+
      '<span style="width:90px" class="muted">'+x.r+' rep max</span><b class="grow">'+fmtW(x.w)+' kg</b>'+
      '<span class="tiny muted">'+fmtDay(x.date)+'</span></div>';
    h+='</div>';
  }
  h+='<div class="statgrid two" style="margin:12px 0">'+
    (volR?tile('Volume',fmtNum(volR.v)+' kg',volR.date):'')+
    (e1R?tile('Est. 1RM',fmtW(e1R.v)+' kg',e1R.date):'')+
    (repsR?tile('Total reps',repsR.v,repsR.date):'')+
    (setsR?tile('Total sets',setsR.v,setsR.date):'')+
    (maxwR?tile('Max weight',fmtW(maxwR.v)+' kg',maxwR.date):'')+
    (maxrR?tile('Max reps',maxrR.v,maxrR.date):'')+'</div>'+
    '<p class="tiny muted">Volume, reps and sets records are per single workout.</p>';
  openModal(h);
}
function sparkSvg(pts,cls){
  const w=560,h=56,min=Math.min(...pts),max=Math.max(...pts),pad=4;
  const nx=i=>pad+i*(w-2*pad)/(pts.length-1);
  const ny=v=>max===min?h/2:h-pad-(v-min)*(h-2*pad)/(max-min);
  const line=pts.map((v,i)=>(i?'L':'M')+nx(i).toFixed(1)+' '+ny(v).toFixed(1)).join(' ');
  return '<svg class="'+cls+'" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none">'+
    '<path d="'+line+'" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round"/>'+
    '<circle cx="'+nx(pts.length-1)+'" cy="'+ny(pts[pts.length-1])+'" r="4" fill="var(--accent)"/></svg>';
}

/* monthly aggregation for the overall-stats drill-ins */
const STAT_DEFS={
  dur:{label:'Workout duration',unit:'min avg',fmt:v=>Math.round(v)},
  vol:{label:'Volume',unit:'kg per month',fmt:v=>fmtNum(v)},
  sets:{label:'Total sets',unit:'per month',fmt:v=>Math.round(v)},
  reps:{label:'Total reps',unit:'per month',fmt:v=>Math.round(v)},
  rps:{label:'Reps per set',unit:'avg',fmt:v=>v.toFixed(1)},
  bw:{label:'Bodyweight',unit:'kg (monthly avg)',fmt:v=>fmtW(v)},
  nw:{label:'Number of workouts',unit:'per month',fmt:v=>Math.round(v)},
};
function monthlyStat(key){
  const agg={};
  for(const w of store.workouts){
    const mk=monthKey(w.start);
    const a=agg[mk]||(agg[mk]={vol:0,sets:0,reps:0,durMin:0,durN:0,bwSum:0,bwN:0,n:0});
    a.n++;
    if(w.start&&w.end){const m=(toDate(w.end)-toDate(w.start))/60000;if(m>0&&m<360){a.durMin+=m;a.durN++;}}
    if(w.bw){a.bwSum+=w.bw;a.bwN++;}
    for(const e of w.entries)for(const s of e.sets){a.sets++;a.vol+=setVol(s);a.reps+=s.r||0;}
  }
  return Object.keys(agg).sort().map(mk=>{
    const a=agg[mk];
    const y={dur:a.durN?a.durMin/a.durN:null,vol:a.vol,sets:a.sets,reps:a.reps,
      rps:a.sets?a.reps/a.sets:null,bw:a.bwN?a.bwSum/a.bwN:null,nw:a.n}[key];
    return {t:MONTHS[+mk.slice(5)-1].slice(0,3)+' '+mk.slice(2,4),y};
  }).filter(p=>p.y!=null);
}
function openStatChart(key){
  const def=STAT_DEFS[key];
  const pts=monthlyStat(key);
  openModal('<h2>'+def.label+'</h2><p class="tiny muted">'+def.unit+', whole history</p>'+
    '<div class="card">'+lineChart(pts,def.fmt)+'</div>'+

}

function exportCsv(){

    for(const e of w.entries)for(const s of e.sets)
      rows.push([w.start,w.end,q(e.name),s.w??'',s.r??'',q(s.note||e.note||''),'',s.dist??'',s.dur??'',

      if(el.dataset.f==='note'){e.note=el.value;}
      else{const s=e.sets[+el.dataset.si];
        s[el.dataset.f]=el.value===''?null:(el.dataset.f==='r'?parseInt(el.value,10):parseFloat(el.value));}
      save();
    });
  });
  document.querySelectorAll('#main [data-act]').forEach(el=>{
    el.addEventListener('input',()=>{
      if(el.dataset.act==='routine'){store.active.routine=el.value;save();}
      else if(el.dataset.act==='bw'){store.active.bw=el.value===''?null:parseFloat(el.value);save();}
      else if(el.dataset.act==='wstart'){if(el.value)store.active.start=el.value.replace('T',' ');save();}
      else if(el.dataset.act==='wend'){if(el.value)store.active.end=el.value.replace('T',' ');save();}
      else if(el.dataset.act==='exq'){state.exQuery=el.value;
        clearTimeout(wireInputs._t);wireInputs._t=setTimeout(()=>{const el2=document.querySelector('[data-act=exq]');const pos=el2.selectionStart;render();const el3=document.querySelector('[data-act=exq]');el3.focus();el3.setSelectionRange(pos,pos);},250);}
    });
  });
  document.querySelectorAll('#main [data-ex]').forEach(el=>el.onclick=()=>openExercise(el.dataset.ex));
  const csv=$('csvfile');if(csv)csv.onchange=()=>{
    const f=csv.files[0];if(!f)return;
    f.text().then(t=>{const res=importCsv(t);toast(res.msg);render();if(res.ok&&res.added)askSexIfUnset();});
  };
  const js=$('jsonfile');if(js)js.onchange=()=>{
    const f=js.files[0];if(!f)return;
    f.text().then(t=>{
      try{const s=JSON.parse(t);
        if(!s||s.schema!==1||!Array.isArray(s.workouts))throw new Error('bad shape');
        store=s;save();toast('Backup restored — '+store.workouts.length+' workouts');render();
      }catch(e){toast('That file is not a Sett backup.');}
    });
  };
}

/* ============================== init ============================== */
if(firstRun){
  if(window.SETT_LOCAL_CSV){const r=importCsv(window.SETT_LOCAL_CSV);console.log('[sett] auto-import:',r.msg);}
  save();
}
migrateVisuals();
applyTheme((store.settings&&store.settings.theme)||'ember');
if(store.active)state.view='log';
render();

/* service worker: offline + auto-update on entering, plus a manual check */
let swReg=null, swRefreshing=false, swManualCheck=false;
function autoUpdateOn(){return !(store.settings&&store.settings.autoUpdate===false);}
function checkForUpdates(manual){
  if(!swReg){if(manual)toast('Updates need the installed app (add to Home Screen).');return;}
  if(manual)swManualCheck=true;
  swReg.update().then(()=>{
    // if a new worker is already waiting, activate it now
    if(swReg.waiting){swReg.waiting.postMessage('skipWaiting');}
    else if(manual&&!swReg.installing){toast('You’re on the latest version');swManualCheck=false;}
  }).catch(()=>{if(manual)toast('Could not check — are you online?');});
}
if('serviceWorker' in navigator&&location.protocol!=='file:'){
  const hadCtrl=!!navigator.serviceWorker.controller;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(swRefreshing)return;
    // a new version took over: reload if auto-update (or a manual check) asked for it
    if(hadCtrl&&(autoUpdateOn()||swManualCheck)){swRefreshing=true;location.reload();}
    else if(hadCtrl){toast('Update ready — reopen Sett to apply');}
  });
  navigator.serviceWorker.register('sw.js').then(reg=>{
    swReg=reg;
    reg.addEventListener('updatefound',()=>{
      const nw=reg.installing;if(!nw)return;
      nw.addEventListener('statechange',()=>{
        if(nw.state==='installed'&&navigator.serviceWorker.controller){
          // new version downloaded; skipWaiting -> activate -> controllerchange (handled above)
          if(autoUpdateOn()||swManualCheck)reg.waiting&&reg.waiting.postMessage('skipWaiting');
          else toast('Update ready — reopen Sett to apply');
        }
      });
    });
    if(autoUpdateOn())reg.update();      // auto-check on every entry
  }).catch(e=>console.warn('sw failed',e));
}
</script>
