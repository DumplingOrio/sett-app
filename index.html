<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0e1013">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sett">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<title>Sett — workout log</title>
<style>
  :root{
    --bg:#0e1013; --card:#171a20; --card2:#1f242d; --line:#272d38;
    --text:#eceff4; --muted:#8b93a3; --faint:#5b6270;
    --accent:#ff7a3c; --accent-soft:rgba(255,122,60,.14);
    --good:#7ee081; --bad:#ff5c5c;
    --r:16px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--text);
    font:16px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    /* F46: overscroll-behavior-y:none removed — iOS's native rubber-band returns
       app-wide (F34 now satisfied by the platform, not JS). */
    /* F16: nothing may create horizontal page scroll — an off-screen sheet
       (translateX/Y 110vw) or an overflowing pill row would let iOS pan the app */
    overflow-x:clip;}
  /* --kb = live keyboard height (F12, set via visualViewport) so lists can
     scroll past the iOS keyboard instead of hiding their last entries */
  body{padding-bottom:calc(76px + env(safe-area-inset-bottom) + var(--kb,0px));}
  h1,h2,h3{margin:0; letter-spacing:-.02em;}
  button{font:inherit; color:inherit; background:none; border:none; cursor:pointer; padding:0;}
  input,textarea,select{font:inherit; color:var(--text); background:var(--card2);
    border:1px solid var(--line); border-radius:10px; padding:10px 12px; outline:none;
    min-width:0; max-width:100%;}
  input:focus,textarea:focus,select:focus{border-color:var(--accent);}
  ::placeholder{color:var(--faint);}

  .topbar{position:sticky; top:0; z-index:20; display:flex; align-items:center; gap:10px;
    padding:calc(10px + env(safe-area-inset-top)) 18px 10px;
    background:color-mix(in srgb, var(--bg) 88%, transparent); backdrop-filter:blur(12px);}
  .wordmark{font-weight:800; font-size:20px; letter-spacing:-.03em;}
  .wordmark span{color:var(--accent);}
  .topbar .vtitle{margin-left:auto; color:var(--muted); font-size:14px; font-weight:600;}
  .gearbtn{margin-left:14px; color:var(--muted); width:30px; height:30px; display:flex; align-items:center; justify-content:center;}
  .gearbtn svg{width:22px; height:22px;}
  .gearbtn.on{color:var(--accent);}

  /* min-height fills the viewport minus topbar (~50px + safe-top) and the
     body's tab-bar padding (76px + safe-bottom) WITHOUT exceeding it — a
     short view (More) must not overflow by a few px, or scrolling hits a
     dead edge instantly and feels broken (owner feedback 2026-07-06) */
  main{max-width:640px; margin:0 auto; padding:6px 16px 24px;
    min-height:70vh;
    min-height:calc(100dvh - 126px - env(safe-area-inset-top) - env(safe-area-inset-bottom));}

  .tabbar{position:fixed; left:0; right:0; bottom:0; z-index:30; display:flex;
    justify-content:space-around; padding:8px 8px calc(8px + env(safe-area-inset-bottom));
    background:color-mix(in srgb, var(--card) 92%, transparent); backdrop-filter:blur(14px);
    border-top:1px solid var(--line);
    /* F76 (2026-07-07): the F65 --vvpin translate is GONE. The owner's diag
       export proved it was the remaining mover: every navPin entry was a top
       rubber-band bounce (negative vvOffsetTop) that the pin converted into a
       12-33px lift of the bar. position:fixed is correct now that the scroll
       lock pins main, not body (F70); the tabbarDrift watchdog stands guard. */
    /* F51: the RE-SHOW (un-hide) direction carries a transition-delay so a
       transient .kb-open flap during iOS's scroll-driven keyboard dismissal
       never repaints the bar mid-thrash; the hide direction below zeroes it. */
    transition:transform .2s cubic-bezier(.22,.61,.36,1) .28s;}
  /* F20: with the iOS keyboard up (--kb>0) iOS floats the fixed tabbar above it;
     slide it away while typing, restore on close.
     F51: hide stays INSTANT — no delay when the class is ON.
     F65: the visualViewport pin is dropped while hidden (translateY 120% wins). */
  .kb-open .tabbar{transform:translateY(120%); transition-delay:0s;}
  .tab{display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--faint);
    font-size:11px; font-weight:600; min-width:56px; padding:4px 6px; border-radius:12px;}
  .tab svg{width:24px; height:24px;}
  .tab.on{color:var(--accent);}

  .card{background:var(--card); border:1px solid var(--line); border-radius:var(--r);
    padding:16px; margin:12px 0;}
  .card.resume{display:flex; align-items:center; gap:10px; cursor:pointer;
    background:var(--accent-soft); border-color:color-mix(in srgb, var(--accent) 35%, transparent);}
  .card.resume>.ico{color:var(--accent); flex:none;}
  .prlabel{color:var(--faint); text-transform:uppercase; letter-spacing:.05em; font-weight:700;}
  .pillbtn{display:inline-flex; align-items:center; gap:5px; padding:6px 10px; border-radius:9px;
    border:1px solid var(--line); background:var(--card2); color:var(--muted);
    font-size:12px; font-weight:700; flex:none;}
  .pillbtn .ico{width:13px; height:13px;}
  .pillbtn.on{background:var(--accent-soft); border-color:var(--accent); color:var(--accent);}
  .prbar{height:20px; background:var(--accent-soft); border-radius:6px; display:flex; align-items:center;
    padding:0 8px; font-size:11.5px; font-weight:700; color:var(--accent); white-space:nowrap;}
  .card h3{font-size:15px; margin-bottom:10px;}
  .row{display:flex; align-items:center; gap:10px;}
  .grow{flex:1; min-width:0;}
  .muted{color:var(--muted);} .small{font-size:13px;} .tiny{font-size:11px;}
  .right{text-align:right;}

  .btn{display:inline-flex; align-items:center; justify-content:center; gap:8px;
    background:var(--card2); border:1px solid var(--line); border-radius:12px;
    padding:12px 16px; font-weight:700; font-size:15px;}
  .btn.primary{background:var(--accent); border-color:var(--accent); color:#18100a;}
  .btn.danger{color:var(--bad); border-color:color-mix(in srgb, var(--bad) 40%, var(--line));}
  .btn.wide{width:100%;}
  .btn.ghost{background:none;}
  .iconbtn{width:38px; height:38px; display:inline-flex; align-items:center; justify-content:center;
    border-radius:10px; color:var(--muted); font-size:18px; flex:none;}
  .iconbtn:active{background:var(--card2);}

  .chip{display:inline-flex; align-items:center; gap:6px; padding:3px 10px; border-radius:99px;
    font-size:12px; font-weight:700; background:var(--card2); color:var(--muted); white-space:nowrap;}
  .chip .dot{width:8px; height:8px; border-radius:50%;}
  .chiprow{display:flex; gap:8px; overflow-x:auto; padding:4px 2px 8px; scrollbar-width:none;}
  .chiprow::-webkit-scrollbar{display:none;}
  .chiprow .chip.on{background:var(--accent-soft); color:var(--accent);}

  /* F52: muscle-group tiles landing for the Exercises tab. 2-up at 375px, card
     language. The colored dot is the group's CAT_COLORS accent. */
  .mgrid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:10px 0 4px;}
  .mgtile{display:flex; align-items:center; gap:10px; background:var(--card); border:1px solid var(--line);
    border-radius:var(--r); padding:14px 14px; cursor:pointer; text-align:left;}
  .mgtile:active{background:var(--card2);}
  .mgtile .dot{width:12px; height:12px; border-radius:50%; flex:none;}
  /* F56: stacked name/count, each on its own line; both truncate rather than
     overflow the tile at 375px. */
  .mgtile .mgtxt{display:flex; flex-direction:column; min-width:0;}
  .mgtile .nm{font-weight:700; font-size:15px; letter-spacing:-.01em; line-height:1.15;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .mgtile .ct{font-size:12px; color:var(--muted); font-weight:600; margin-top:2px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  /* F57: the muted "+N secondary" line under a tile's primary count */
  .mgtile .ct2{font-size:11px; color:var(--faint); font-weight:600; margin-top:1px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  /* F52: back-to-tiles header row above a selected group's list */
  .mgback{display:flex; align-items:center; gap:8px; padding:8px 2px 2px; cursor:pointer; color:var(--text);}
  .mgback .ico{width:20px; height:20px; color:var(--muted);}
  .mgback h3{margin:0; font-size:17px;}
  /* F54: review-sheet row — name on its own line; chips + Keep/Accept on a
     second line that wraps the buttons below the chips when tight (375px). */
  .mgrev{padding:8px 0; border-bottom:1px solid var(--line);}
  .mgrev:last-child{border-bottom:0;}
  .mgrev-name{font-weight:600; margin-bottom:6px;}
  .mgrev-line{display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
  .mgrev-chips{display:flex; align-items:center; gap:6px; min-width:0; flex-wrap:wrap;}
  .mgrev-acts{display:flex; gap:6px; flex:none; margin-left:auto;}
  .mgrev-also{margin-top:5px;}
  /* F57: editable secondary-group row on the exercise sheet + the "2nd" marker
     on secondary drill-in rows. All wrap; nothing bleeds at 375px. */
  .cats2row{display:flex; flex-wrap:wrap; gap:6px; align-items:center;}
  .cat2chip{display:inline-flex; align-items:center; gap:5px; cursor:pointer;}
  .cat2chip .x{color:var(--faint); font-weight:700; margin-left:1px;}
  .cat2chip:active{background:var(--card);}
  .cat2add{padding:6px 8px; font-size:16px; border-radius:999px; max-width:130px;}
  .chip.sec2{background:transparent; border:1px solid var(--line); color:var(--faint);
    font-size:10px; padding:1px 6px; vertical-align:middle;}

  /* F66 (2026-07-07): Settings accordion — one page, four collapsible section
     cards (owner pick over hub/subpages). Header = icon + title + live one-line
     summary + chevron; one open at a time; open state in transient state (never
     store). Header uses the inline-onclick pattern (rule 7). */
  .acc{margin:12px 0; background:var(--card); border:1px solid var(--line); border-radius:var(--r);
    overflow:hidden;}
  .acchead{display:flex; align-items:center; gap:12px; width:100%; text-align:left;
    padding:15px 16px; cursor:pointer; color:var(--text);}
  .acchead .ico{width:20px; height:20px; color:var(--muted); flex:none;}
  .acchead .acctitle{font-weight:800; font-size:16px; letter-spacing:-.02em; flex:none;}
  .acchead .accsum{flex:1; min-width:0; color:var(--muted); font-size:12px; font-weight:600;
    text-align:right; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .acchead .accchev{flex:none; color:var(--faint); transition:transform .2s ease;}
  .acchead .accchev .ico{width:18px; height:18px;}
  .acc.open .acchead .accchev{transform:rotate(180deg);}
  .acc.open .acchead{border-bottom:1px solid var(--line);}
  .accbody{padding:6px 16px 16px;}
  /* F66: the review-groups pending chip riding the "Your data" header */
  .acchead .accchip{flex:none; padding:2px 9px; border-radius:99px; font-size:11px; font-weight:800;
    background:var(--accent-soft); color:var(--accent);}

  /* F68 (2026-07-07) OWNER PICK A: Home reorganised around today.
     Day header — big weekday over the muted week-summary line. */
  .dayhead{margin:2px 4px 12px;}
  .dayhead .dow{font-size:28px; font-weight:800; letter-spacing:-.03em; line-height:1.05;}
  .dayhead .wk{font-size:12px; color:var(--muted); font-weight:600; margin-top:3px;}
  /* Glance strip — three equal mini tiles (week workouts / records / closest rank-up). */
  .glance{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:2px 0 4px;}
  .gtile{background:var(--card); border:1px solid var(--line); border-radius:var(--r);
    padding:12px 10px; text-align:left; min-width:0; cursor:pointer;}
  .gtile:active{background:var(--card2);}
  .gtile .gv{font-size:20px; font-weight:800; letter-spacing:-.02em; line-height:1.1;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .gtile .gl{font-size:10.5px; color:var(--muted); font-weight:700; text-transform:uppercase;
    letter-spacing:.04em; margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  /* F71 — petite one-line rank-up cue directly below the glance strip. Muted,
     single line, ellipsis if long. Absent when ranks off / nothing close. */
  .rankline{display:block; width:100%; text-align:left; font-size:12px; color:var(--muted);
    margin:0 0 6px; padding:2px 2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .rankline b{color:var(--text); font-weight:700;}
  /* Routines as a horizontally scrollable chip row — must NOT widen the page. */
  .routerow{display:flex; gap:8px; overflow-x:auto; padding:2px 2px 6px; scrollbar-width:none;
    scroll-snap-type:x proximity;}
  .routerow::-webkit-scrollbar{display:none;}
  .routechip{flex:none; scroll-snap-align:start; max-width:180px; text-align:left;
    background:var(--card); border:1px solid var(--line); border-radius:14px; padding:10px 13px;}
  .routechip:active{background:var(--card2);}
  .routechip .rn{font-weight:700; font-size:13.5px; white-space:nowrap; overflow:hidden;
    text-overflow:ellipsis; max-width:154px;}
  .routechip .rc{font-size:11px; color:var(--muted); font-weight:600; margin-top:2px;}
  /* Slim nudge banner — one line + chevron, above Routines. */
  .nudge{display:flex; align-items:center; gap:10px; margin:10px 0; padding:11px 14px;
    background:var(--accent-soft); border:1px solid color-mix(in srgb, var(--accent) 35%, var(--line));
    border-radius:12px; cursor:pointer;}
  .nudge .grow{min-width:0; font-size:13px; font-weight:600; color:var(--text);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .nudge .ico{width:18px; height:18px; color:var(--accent); flex:none;}

  .hero{padding:26px 18px; text-align:center;}
  .hero .big{font-size:26px; font-weight:800; letter-spacing:-.03em;}
  /* F42: badger empty-state block — the mono badger over house copy, centered */
  .empty{text-align:center; padding:22px 18px;}
  .empty .badger{display:block; margin:0 auto 10px; opacity:.9;}
  .empty .big{font-size:20px; font-weight:800; letter-spacing:-.02em;}
  .empty p{margin:6px auto 0; max-width:32ch;}
  .badger{display:inline-block; vertical-align:middle;}

  .statgrid{display:grid; grid-template-columns:repeat(3,1fr); gap:10px;}
  .statgrid.two{grid-template-columns:1fr 1fr;}
  .stat{background:var(--card2); border-radius:12px; padding:12px;}
  .stat .v{font-size:20px; font-weight:800; letter-spacing:-.02em;}
  .stat .l{font-size:11px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.05em;}

  .listrow{display:flex; align-items:center; gap:12px; padding:13px 4px;
    border-bottom:1px solid var(--line); cursor:pointer;}
  .listrow:last-child{border-bottom:none;}

  /* logger */
  .setmenu{width:34px; height:34px; display:inline-flex; align-items:center; justify-content:center;
    color:var(--faint); font-size:18px; border-radius:9px;}
  .setmenu:active{background:var(--card2);}
  .menu{display:flex; flex-direction:column; margin-top:4px;}
  .menu button{display:flex; align-items:center; gap:10px; width:100%; text-align:left;
    padding:10px 4px; border:none; border-bottom:1px solid var(--line); background:none;
    color:var(--text); font-size:14px; font-weight:600;}
  .menu button .ico{width:16px; height:16px; flex:none;}   /* F19: icons never squash the label */
  .menu button:last-child{border-bottom:none;}
  .menu button.del{color:var(--bad);}
  .menu button:active{background:var(--card2);}
  /* F22: petite ⓘ affordance + collapsible explainer in the exercise ⋯ menu */
  .infobtn{width:30px; height:30px; flex:none; display:inline-flex; align-items:center; justify-content:center;
    border-radius:50%; color:var(--faint); border:1px solid var(--line);}
  .infobtn .ico{width:16px; height:16px;}
  .infobtn.on{color:var(--accent); border-color:var(--accent);}
  .exinfo{background:var(--card2); border:1px solid var(--line); border-radius:12px;
    padding:8px 12px; margin-bottom:10px;}
  .exinfo p{margin:4px 0; font-size:13px; line-height:1.4; color:var(--muted);}
  .exinfo b{color:var(--text);}
  .tgtgrid{display:grid; grid-template-columns:30px 1fr 1fr 1fr 34px; gap:8px; align-items:center; margin-top:8px;}
  .tgtgrid input{text-align:center; padding:11px 6px; font-weight:700; font-size:16px;}
  .setidx{color:var(--faint); font-weight:800; text-align:center; font-size:14px;}
  .setidx.drop{color:var(--accent);}
  .sethead{color:var(--faint); font-size:10px; font-weight:700; text-transform:uppercase;
    letter-spacing:.06em; text-align:center;}
  .ssbadge{font-size:10px; font-weight:800; letter-spacing:.04em; padding:2px 8px;
    border-radius:99px; background:var(--accent-soft); color:var(--accent);}
  .elapsed{font-variant-numeric:tabular-nums; font-weight:800; color:var(--accent);}
  /* drop-set toggle per row: labelled, obvious, tap again to undo */
  /* exercise control row (reorder / superset / delete) — labelled, own line */
  .exctrl{display:flex; gap:6px; flex-wrap:wrap; margin-top:10px;}
  .exctrl button{display:flex; align-items:center; gap:5px; padding:7px 11px; border-radius:10px;
    border:1px solid var(--line); background:var(--card2); color:var(--muted); font-size:12px; font-weight:700;}
  .exctrl button.on{background:var(--accent-soft); border-color:var(--accent); color:var(--accent);}
  .exctrl button.del{color:var(--bad); border-color:color-mix(in srgb, var(--bad) 35%, var(--line));}
  .exctrl .sp{flex:1;}
  .legend{display:flex; gap:14px; flex-wrap:wrap; margin-top:6px; font-size:11px; color:var(--faint);}
  .legend b{color:var(--accent);}

  /* ranks */
  .rankbadge{display:inline-flex; align-items:center; gap:7px; padding:4px 12px; border-radius:99px;
    font-weight:800; font-size:13px; border:1px solid;}
  .rankbar{height:6px; border-radius:99px; background:var(--card2); overflow:hidden; margin-top:6px;}
  .rankbar i{display:block; height:100%; border-radius:99px;}
  /* F67 (2026-07-07): lift ranks as a 2-column chip GRID — all ranks at a glance,
     no scrolling for ~12 lifts. Each chip: name (ellipsis, never wraps) + tier name
     in the tier colour. Bordered card-style chip; the whole chip taps to the lift. */
  .rankgrid{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px;}
  .rankchip{display:flex; align-items:center; justify-content:space-between; gap:8px;
    min-width:0; text-align:left; padding:9px 11px; border-radius:12px;
    background:var(--card2); border:1px solid var(--line);}
  .rankchip:active{background:var(--line);}
  .rankchip .rc-name{min-width:0; font-size:12.5px; font-weight:700;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .rankchip .rc-tier{flex:none; font-size:11px; font-weight:800;}

  .spark{width:100%; height:56px;}
  .bigchart{width:100%; height:190px;}
  .barchart{width:100%; height:180px; display:block;}
  .datebadge{width:48px; flex:none; text-align:center; background:var(--card2);
    border-radius:10px; padding:5px 0 6px;}
  .datebadge .dow{font-size:10px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:.04em;}
  .datebadge .d{font-size:18px; font-weight:800; line-height:1.15;}
  .seg{display:flex; gap:6px; flex-wrap:wrap; margin:10px 0;}
  .seg button{padding:7px 13px; border-radius:99px; background:var(--card2); border:1px solid var(--line);
    font-size:13px; font-weight:700; color:var(--muted);}
  .seg button.on{background:var(--accent-soft); color:var(--accent); border-color:transparent;}
  .toggle{width:50px; height:30px; border-radius:99px; background:var(--card2); border:1px solid var(--line);
    position:relative; flex:none; transition:background .15s;}
  .toggle .knob{position:absolute; top:3px; left:3px; width:22px; height:22px; border-radius:50%;
    background:var(--faint); transition:transform .15s, background .15s;}
  .toggle.on{background:var(--accent-soft); border-color:var(--accent);}
  .toggle.on .knob{transform:translateX(20px); background:var(--accent);}

  /* modal */
  #overlay{position:fixed; inset:0; z-index:50; display:none; background:rgba(5,6,8,.72);
    backdrop-filter:blur(4px); overflow-y:auto; overflow-x:clip;
    overscroll-behavior:contain;}   /* F30: don't chain scroll to the page behind */
  #overlay.show{display:block; animation:ovl .2s ease-out;}
  @keyframes ovl{from{opacity:0;} to{opacity:1;}}
  /* F23: one animated dismissal for every close path — overlay fades while the
     sheet slides off; .closing suppresses the entrance animation. */
  #overlay.closing{animation:none; opacity:0; transition:opacity .22s cubic-bezier(.22,.61,.36,1);}
  .sheet.closing{animation:none; transition:transform .22s cubic-bezier(.22,.61,.36,1);}
  /* F77 (2026-07-07): stepping BACK one sheet is a light step, not a full
     close-and-reopen. .stepback dips the outgoing sheet briefly (backdrop
     stays); .noanim keeps the restored sheet from replaying its entrance —
     openModal removes it so genuinely new sheets still animate in. */
  .sheet.stepback{animation:none; transition:transform .14s ease, opacity .14s ease;}
  .sheet.noanim{animation:none;}
  .sheet{max-width:640px; margin:8vh auto 0; background:var(--card); border:1px solid var(--line);
    border-radius:20px 20px 20px 20px; min-height:120px; padding:0 18px calc(30px + env(safe-area-inset-bottom) + var(--kb,0px));
    animation:up .28s cubic-bezier(.22,.61,.36,1);
    transition:transform .22s cubic-bezier(.22,.61,.36,1);
    /* F65 (2026-07-07): sheet scrolling never chains to the page behind the F30
       body lock — belt-and-braces with #overlay's own containment. */
    overscroll-behavior:contain;}
  .sheet.dragging{transition:none;}
  @keyframes up{from{transform:translateY(30px); opacity:.4;} to{transform:none; opacity:1;}}
  /* F48 (2026-07-07) OWNER SPEC, verbatim: "The discard popup has a lot of dead
     space… have a it popup in the middle of the screen without all the extra
     space at the bottom" + "dead space below cancel, let's address that as
     well." A second modal variant beside the sheet: a small centered card that
     hugs its content — nothing below the button row but normal padding. No
     sheethead/grab, no drag-to-dismiss, no swipe-exit; closes via its buttons or
     a backdrop tap (like the sheet). Shares #overlay + the F23 .closing path. */
  #overlay.dialogmode .sheet{display:none;}
  #overlay:not(.dialogmode) .dialog{display:none;}
  .dialog{position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:85%; max-width:340px; background:var(--card); border:1px solid var(--line);
    border-radius:20px; padding:22px 20px calc(20px + env(safe-area-inset-bottom));
    box-shadow:0 20px 60px rgba(0,0,0,.55);
    animation:dlgIn .2s cubic-bezier(.22,.61,.36,1);}
  @keyframes dlgIn{from{transform:translate(-50%,-50%) scale(.92); opacity:0;}
    to{transform:translate(-50%,-50%) scale(1); opacity:1;}}
  .dialog.closing{animation:none; opacity:0; transform:translate(-50%,-50%) scale(.94);
    transition:opacity .2s cubic-bezier(.22,.61,.36,1), transform .2s cubic-bezier(.22,.61,.36,1);}
  #main.slide-up{animation:sUp .34s cubic-bezier(.22,.61,.36,1);}
  #main.slide-left{animation:sLeft .42s cubic-bezier(.22,.61,.36,1);}
  #main.slide-right{animation:sRight .42s cubic-bezier(.22,.61,.36,1);}
  @keyframes sUp{from{opacity:0; transform:translateY(12px);} to{opacity:1; transform:none;}}
  @keyframes sLeft{from{opacity:0; transform:translateX(-26px);} to{opacity:1; transform:none;}}
  @keyframes sRight{from{opacity:0; transform:translateX(26px);} to{opacity:1; transform:none;}}
  .tab{transition:color .15s ease, transform .1s ease;}
  .tab:active{transform:scale(.9);}
  .sheethead{position:sticky; top:0; z-index:3; display:flex; align-items:center; justify-content:flex-end;
    height:52px; margin:0 -18px 4px; padding:0 14px;
    background:color-mix(in srgb, var(--card) 94%, transparent); backdrop-filter:blur(8px);
    border-radius:20px 20px 0 0;}
  .sheethead .grab{position:absolute; left:50%; top:9px; transform:translateX(-50%);
    width:44px; height:5px; border-radius:99px; background:var(--line);}
  .sheetclose{width:38px; height:38px; border-radius:50%; background:var(--card2); color:var(--text);
    font-size:17px; display:flex; align-items:center; justify-content:center; flex:none;}
  .sheetclose:active{background:var(--line);}
  /* F43: compact exercise list inside the confirm-start sheet — dense rows, name
     left, muscle group + set count right (muted); long lists scroll in the sheet */
  .csrows{border-top:1px solid var(--line);}
  .csrow{display:flex; align-items:baseline; gap:12px; padding:7px 2px;
    border-bottom:1px solid var(--line);}
  .csname{flex:1 1 auto; min-width:0; font-weight:600; overflow-wrap:anywhere;}
  .cscat{flex:0 0 auto; text-align:right; white-space:nowrap;}

  #toast{position:fixed; left:50%; bottom:calc(90px + env(safe-area-inset-bottom)); transform:translateX(-50%);
    z-index:60; background:var(--card2); border:1px solid var(--line); color:var(--text);
    padding:10px 18px; border-radius:12px; font-weight:600; font-size:14px; display:none;
    max-width:88vw; text-align:center; pointer-events:none;}   /* F61: toasts are plain text — never eat taps on what they cover */
  .undo-btn{pointer-events:auto; background:none; border:none; color:var(--accent);
    font-weight:800; font-size:14px; margin-left:8px; padding:4px 8px; cursor:pointer;}

  textarea.howto{width:100%; min-height:90px; resize:vertical;}
  .visual{background:#fff; border-radius:14px; overflow:hidden; margin:12px 0; text-align:center;}
  .visual img{display:block; width:100%; max-width:440px; margin:0 auto;}
  .thumb{width:52px; height:52px; border-radius:10px; background:#fff; object-fit:cover; flex:none;}
  .musclegrid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:12px 0;}
  .musclegrid .l{font-size:11px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.05em;}
  .musclegrid .v{font-weight:700; text-transform:capitalize;}
  ol.instructions{margin:0; padding-left:20px;}
  ol.instructions li{margin:7px 0; color:var(--text); font-size:14px;}
  .banner{background:var(--accent-soft); border:1px solid color-mix(in srgb, var(--accent) 35%, var(--line));
    color:var(--accent); border-radius:12px; padding:10px 14px; font-size:13px; font-weight:600; margin:12px 0;}
  #restbar{position:fixed; left:0; right:0; z-index:31; display:none; padding:0 12px;
    bottom:calc(84px + env(safe-area-inset-bottom)); pointer-events:none;}
  /* F76: the F65 vv pin translate is gone here too — see .tabbar note. */
  #restbar.show{display:block; animation:up .18s ease-out;}
  #restbar .inner{max-width:616px; margin:0 auto; pointer-events:auto; display:flex; align-items:center; gap:8px;
    background:var(--card2); border:1px solid var(--accent); border-radius:14px;
    box-shadow:0 10px 30px rgba(0,0,0,.45); padding:9px 12px;}
  #restbar .rlabel{font-size:10px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:.05em;}
  #restbar .rt{font-weight:800; font-size:22px; line-height:1.05; font-variant-numeric:tabular-nums; color:var(--accent);}
  #restbar .inner.done{border-color:var(--good);}
  #restbar .inner.done .rt{color:var(--good);}
  #restbar button{border:1px solid var(--line); background:var(--card); color:var(--text);
    border-radius:10px; padding:9px 11px; font-weight:700; font-size:13px; min-width:44px;}
  /* F29 (2026-07-06): the iOS long-press-to-reorder was selecting the row text
     mid-hold and firing the callout. Kill selection/callout on the reorder rows. */
  #rolist .listrow{user-select:none; -webkit-user-select:none; -webkit-touch-callout:none;}
  .draghandle{touch-action:none; cursor:grab; color:var(--faint); font-size:20px; line-height:1;
    padding:2px 8px 2px 0; margin-right:2px; align-self:center; user-select:none;}
  .draghandle:active{cursor:grabbing; color:var(--accent);}
  .excard.dragging{opacity:.92; box-shadow:0 14px 34px rgba(0,0,0,.55);}
  /* inline icons */
  .ico{width:18px; height:18px; flex:none; vertical-align:-3px;}
  .menu button .ico{width:20px; height:20px; color:var(--muted);}
  .menu button.del .ico{color:var(--bad);}
  .exctrl button .ico{width:15px; height:15px;}
  .btn .ico{width:17px; height:17px;}

  /* #1 RepCount-style set rows: circled number + compact left-packed Kg/Reps,
     values hug the left so the row no longer fills the whole bar */
  .excard{padding:14px 16px;}
  .setrow2{display:flex; align-items:center; gap:20px; padding:8px 0;}
  /* Item 3 (2026-07-08): the right-side ✓/W/⋯ cluster — tight 8px gaps so the
     three controls fit inside the card at 375px (the row's own 20px gap between
     each was clipping the ⋯ off the card edge once R24 added the ✓). */
  .setctrls{display:flex; align-items:center; gap:8px; flex:none;}
  .setnum{width:26px; height:26px; flex:none; border:1.6px solid var(--line); border-radius:50%;
    display:grid; place-items:center; font-size:13px; font-weight:700; color:var(--muted);}
  .setnum.drop{border-color:var(--accent); color:var(--accent);}
  /* F26: warmup circle — distinct from drop's D (dashed border, warm accent) */
  .setnum.warm{border-style:dashed; border-color:var(--accent); color:var(--accent);}
  /* F26: petite warmup toggle — muted when off, accent when on; non-invading */
  .wtog{width:26px; height:26px; flex:none; border:1px solid var(--line); border-radius:8px;
    background:var(--card2); color:var(--faint); font-size:12px; font-weight:800; margin-right:2px;}
  .wtog.on{background:var(--accent-soft); border-color:var(--accent); color:var(--accent);}
  .wtog{position:relative;}
  .wtog::after{content:''; position:absolute; inset:-9px;}
  .checkbtn{width:26px; height:26px; flex:none; border:1.6px solid var(--line); border-radius:50%;
    display:grid; place-items:center; font-size:14px; font-weight:700; color:var(--faint);
    background:none; position:relative;}
  .checkbtn.on{background:var(--accent); border-color:var(--accent); color:#18100a;}
  .checkbtn::after{content:''; position:absolute; inset:-9px;}
  /* F85 (2026-07-08): OPAQUE tint — var(--accent-soft) is .14-alpha, so the
     always-present Copy/Delete swipe buttons behind .swipe-fg bled through (a
     red Delete box sat permanently at a done row's edge). color-mix over
     var(--card) is the same hue, opaque, buttons stay hidden until swiped. */
  /* Item 6 (2026-07-08): owner wants the done highlight KEPT but subtler — 8%
     accent over card is a quiet confirmation, not a strong fill. Still opaque
     (F85), so the swipe buttons stay hidden.
     SPECIFICITY FIX (the item-6 "is it even supposed to highlight?" bug): the
     base `.swipe .swipe-fg{background:var(--card)}` (below) has equal specificity
     and sits LATER in source, so a bare `.swipe-fg.done` lost the cascade — a
     PLAIN done set never tinted while a done+PR set did (its `.swipe.pr .swipe-fg`
     rule outranks the base). Scoping this to `.swipe .swipe-fg.done` (0,3,0)
     beats the base override; the .pr rule (same specificity, later) still wins on
     a PR row, so PRs keep their stronger pop. */
  .swipe .swipe-fg.done{background:color-mix(in srgb, var(--accent) 11%, var(--card));}
  .setcell{display:flex; flex-direction:column; gap:1px; position:relative;}
  .setcell label{font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--faint);}
  .setcell input{width:58px; text-align:left; padding:1px 0; font-size:18px; font-weight:800;
    background:transparent; border:none; border-radius:0;}
  .setcell .steppers{display:none; flex-direction:row; gap:4px; margin-top:2px;}
  .setcell.focus .steppers{display:flex;}
  .steppers button{width:28px; height:28px; padding:0; border:1px solid var(--line); border-radius:8px;
    background:var(--card2); color:var(--text); font-size:16px; font-weight:800;
    display:grid; place-items:center; position:relative;}
  .steppers button:active{background:var(--accent-soft); border-color:var(--accent);}
  .steppers button::after{content:''; position:absolute; inset:-8px;}
  .setrow2 .sp{flex:1;}
  .setmenu{width:30px; height:30px; font-size:16px; position:relative;}
  .setmenu::after{content:''; position:absolute; inset:-7px;}
  /* F25 (2026-07-06): pills + the three icon buttons stay on ONE row that
     never wraps at 375px (owner's item-2 complaint was the icons wrapping
     BELOW the pills). nowrap + compact pills/icons keeps them in-bounds. */
  .exfoot{margin-top:12px; gap:2px; flex-wrap:nowrap; min-width:0;}
  .exfoot .pillbtn{white-space:nowrap; padding:6px 5px; font-size:11.5px; gap:3px;}
  .exi{width:32px; height:34px; flex:none; display:inline-flex; align-items:center; justify-content:center;
    border-radius:10px; color:var(--accent);}
  .exi:active{background:var(--card2);}
  .exi .ico{width:20px; height:20px;}
  /* F25: dense muted stats line under the footer; PR e1RM (its <b>) in accent */
  .cardstats{margin-top:8px; font-size:11.5px; color:var(--faint); font-weight:600;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .cardstats b{color:var(--accent); font-weight:800;}
  /* F36 (2026-07-06): a live set that beats the pre-workout record lights up —
     same accent-soft glow + border as the latched swipe state. Petite PR chip
     sits in the row; one accent line ("New e1RM record…") sits under the card. */
  .swipe.pr .swipe-fg{background:color-mix(in srgb, var(--accent) 14%, var(--card));}  /* F85: opaque, same reason as .done above */
  .swipe.pr{border-radius:12px; box-shadow:inset 0 0 0 1.5px color-mix(in srgb, var(--accent) 55%, transparent);}
  /* F36/F37: PR chip + beat-last-time hint share a micro-line under the set
     inputs (aligned left with the set number), so the input row never widens. */
  .setextra{display:flex; flex-wrap:wrap; gap:6px; margin:2px 0 4px 46px;}
  .prchip{display:inline-flex; align-items:center; padding:1px 7px; border-radius:99px;
    background:var(--accent); color:#18100a; font-size:10px; font-weight:800; letter-spacing:.04em;}
  .prline{margin-top:6px; font-size:11.5px; font-weight:700; color:var(--accent);
    white-space:normal; overflow-wrap:anywhere;}
  /* F37: petite beat-last-time suggestion chip — display-only */
  .hintchip{display:inline-flex; align-items:center; padding:1px 7px; border-radius:99px;
    background:var(--card2); color:var(--muted); font-size:10.5px; font-weight:700; white-space:nowrap;}
  /* F38: superset flow chip — "Next: <partner>" (accent-soft, chevron), taps to scroll */
  .ssflow{display:inline-flex; align-items:center; gap:4px; margin-top:8px; max-width:100%;
    padding:5px 10px; border-radius:99px; background:var(--accent-soft);
    border:1px solid color-mix(in srgb, var(--accent) 40%, transparent); color:var(--accent);
    font-size:11.5px; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .ssflow .ico{width:14px; height:14px; flex:none;}

  /* #3 rest button in the workout header corner */
  .hbtn{width:36px; height:36px; flex:none; display:inline-flex; align-items:center; justify-content:center;
    border-radius:10px; border:1px solid var(--line); background:var(--card2); color:var(--muted);}
  .hbtn:active{background:var(--line); color:var(--accent);}
  .hbtn .ico{width:19px; height:19px;}

  /* #5 swipe-to-reveal — OWNER SPEC, verbatim (2026-07-05): "when you swipe
     left, show the delete button on RIGHT SIDE, when you swipe right, show
     copy on the LEFT SIDE" — the row STOPS open and the button is TAPPED.
     Nothing ever fires from the swipe itself. */
  .swipe{position:relative; overflow:hidden;}
  .swipe .swipe-fg{position:relative; z-index:1; background:var(--card);
    transition:transform .2s cubic-bezier(.22,.61,.36,1);}
  /* Item 6b (2026-07-08): the done/PR highlight was FLOATING — the set rows sit
     in the exercise card's 16px content padding, so the tint filled only the inner
     column and left a 16px dark gap on each side (the owner: "isn't filling out the
     space"). Full-bleed the rows to the card's inner edge: a negative margin pulls
     the row (and its tinted fg background) edge-to-edge, while matching padding on
     the fg keeps the numbers/controls exactly where they were. Scoped to .excard
     set rows so the Log/other .swipe lists are untouched. */
  .excard .swipe{margin-left:-16px; margin-right:-16px;}
  .excard .swipe .swipe-fg{padding-left:16px; padding-right:16px;}
  .swipe.swiping .swipe-fg{transition:none;}
  /* F9 (2026-07-06): icon-only inset buttons tinted like the app's chips —
     seamless with the row, no solid slab. Reveal offset = button + margins. */
  .swipe.open-l .swipe-fg{transform:translateX(60px);}   /* swiped right → Copy shows left */
  .swipe.open-r .swipe-fg{transform:translateX(-60px);}  /* swiped left → Delete shows right */
  .swipe .swipe-act{position:absolute; top:5px; bottom:5px; width:48px;
    display:flex; align-items:center; justify-content:center; border-radius:12px;}
  .swipe .swipe-act.copy{left:6px; background:color-mix(in srgb, var(--accent) 16%, transparent);
    border:1px solid color-mix(in srgb, var(--accent) 40%, transparent); color:var(--accent);}
  .swipe .swipe-act.del{right:6px; background:color-mix(in srgb, var(--bad) 16%, transparent);
    border:1px solid color-mix(in srgb, var(--bad) 40%, transparent); color:var(--bad);}
  .swipe .swipe-act .ico{width:18px; height:18px;}
  .swipe:last-child .listrow{border-bottom:none;}

  @media(prefers-reduced-motion:reduce){*{animation:none!important; transition:none!important;}}
</style>
</head>

<header class="topbar">

  <button class="gearbtn" id="gear" onclick="setView('settings')" aria-label="Settings">

<script>
'use strict';
/* ============================== constants ============================== */
const APP_VERSION='0.9.28';
const CHANGELOG=[
  {v:'0.9.28', date:'2026-07-08', items:[

  {v:'0.9.26', date:'2026-07-08', items:[

  {v:'0.9.20', date:'2026-07-07', items:[

  {v:'0.9.19', date:'2026-07-07', items:[

  {v:'0.9.17', date:'2026-07-07', items:[
    'The bottom bar now pins itself to the visible edge of the screen — it should no longer drift up or scroll away while a menu is open.',

    'The Statistics tab has one timeframe control at the top (Week / Month / Year / All) that drives every panel, and the volume chart is now tappable — tap a bar to read it, tap again for the detail.',

/* Female standards are derived from the male table by movement-group factors
   (women lift a smaller multiple of bodyweight, most so on upper-body pressing,
   least on lower body). Approximate, aligned with strengthlevel.com's separate
   male/female bands. "Neutral" (unisex) sits halfway between the two. */
const MOVEMENT_GROUP={
  'Bench Press':'press','Incline Bench Press':'press','Close Grip Bench Press':'press',
  'Military Press':'press','Dumbbell Press':'press','Incline Dumbbell Press':'press','Shoulder Dumbbell Press':'press',
  'Barbell Row':'pull','Dumbbell Row':'pull',
  'EZ Bar Curl':'arms','Dumbbell Bicep Curl':'arms','Seated Bicep Curl':'arms','Hammer Curl':'arms',
  'Squat':'legs','Deadlift':'legs','Romanian Deadlift':'legs','Hip thrust':'legs','Leg Press':'legs',
  'Pull Up':'body','Chin Up':'body','Dips':'body','Push-ups':'body',
};
const FEMALE_FACTOR={press:0.62,pull:0.65,arms:0.58,legs:0.72,body:0.50};
function deriveStandards(kind){
  if(kind==='male')return STANDARDS_MALE;
  const out={};
  for(const [name,def] of Object.entries(STANDARDS_MALE)){
    let f=FEMALE_FACTOR[MOVEMENT_GROUP[name]||'press'];
    if(kind==='neutral')f=(1+f)/2;
    out[name]={t:def.t,s:def.s.map(v=>def.t==='reps'?Math.max(1,Math.round(v*f)):Math.round(v*f*100)/100)};
  }
  return out;
}
const STANDARDS_BY_SEX={male:STANDARDS_MALE,female:deriveStandards('female'),neutral:deriveStandards('neutral')};
const SEX_LABEL={male:'Male',female:'Female',neutral:'Unisex'};

function lang(){return (store&&store.settings&&store.settings.lang==='no')?'no':'en';}
function T(key){
  const L=lang();
  let s=STRINGS[L]&&STRINGS[L][key];
  if(s==null)s=STRINGS.en[key];        // fall back to English for a missing key
  if(s==null)return key;               // last resort: the key itself (never blank)
  if(arguments.length>1){
    for(let i=1;i<arguments.length;i++)s=s.split('{'+(i-1)+'}').join(String(arguments[i]));
  }
  return s;
}
/* muscle-group DISPLAY name for a stored English group KEY. Unknown keys pass
   through untranslated (custom cats never happen, but be safe). */
function catName(key){const s=STRINGS[lang()]&&STRINGS[lang()]['cat.'+key];return s!=null?s:(STRINGS.en['cat.'+key]!=null?STRINGS.en['cat.'+key]:key);}
/* plural glue: T('u.exercise', n) style helpers → "3 exercises" / "3 øvelser". */
function plur(base,n){return n===1?T(base+'.one'):T(base+'.many');}
function nPlur(base,n){return n+' '+plur(base,n);}

const $=id=>document.getElementById(id);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const pad2=n=>String(n).padStart(2,'0');
const nowStr=d=>{d=d||new Date();return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate())+' '+pad2(d.getHours())+':'+pad2(d.getMinutes());};
const toDate=s=>new Date(String(s).replace(' ','T'));
/* R23 (audit E): date names are lang-aware. Norwegian day/month names are the
   standard bokmål set; .slice(0,3) yields the standard NO abbreviations too
   (Jan…Des, Mai included). Capitalized display forms on purpose — every use is
   a standalone label/badge/header, never mid-sentence (register choice flagged
   for the native Bokmål review). Stored dates stay ISO — display only. */
const DAYS_EN=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DAYS_NO=['Søn','Man','Tir','Ons','Tor','Fre','Lør'];
const WEEKDAYS_EN=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];   // F68: full weekday name for the Home day header
const WEEKDAYS_NO=['Søndag','Mandag','Tirsdag','Onsdag','Torsdag','Fredag','Lørdag'];
const MONTHS_EN=['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_NO=['Januar','Februar','Mars','April','Mai','Juni','Juli','August','September','Oktober','November','Desember'];
const dayName=i=>(lang()==='no'?DAYS_NO:DAYS_EN)[i];
const weekdayName=i=>(lang()==='no'?WEEKDAYS_NO:WEEKDAYS_EN)[i];
const monthName=i=>(lang()==='no'?MONTHS_NO:MONTHS_EN)[i];
const fmtDay=s=>{const d=toDate(s);return dayName(d.getDay())+' '+d.getDate()+' '+monthName(d.getMonth()).slice(0,3);};
const fmtClock=s=>{if(!s)return'';const d=toDate(s);return pad2(d.getHours())+':'+pad2(d.getMinutes());};
const fmtClockRange=(a,b)=>{const s=fmtClock(a);if(!s)return'';return b?s+'–'+fmtClock(b):s;};
const fmtMonth=s=>{const d=toDate(s);return monthName(d.getMonth())+' '+d.getFullYear();};
const monthKey=s=>String(s).slice(0,7);
const fmtNum=n=>Math.round(n).toLocaleString('en-US').replace(/,/g,' ');
const fmtW=w=>w==null?'—':(Math.round(w*10)/10).toString().replace(/\.0$/,'');
function fmtDur(a,b){if(!a||!b)return'';const m=Math.max(0,Math.round((toDate(b)-toDate(a))/60000));return m>=60?Math.floor(m/60)+' h '+pad2(m%60)+' min':m+' min';}
function epley(w,r){if(w==null||!r||r<1)return null;if(r===1)return w;return w*(1+r/30);}
function setVol(s){return (s.w||0)*(s.r||0);}
/* F26 (2026-07-06): warmup sets are excluded from every stat by default;
   the "Count warmup sets in stats" setting (default OFF) flips it. Central
   predicate so PRs/rep ladder/e1RM/volume/ranks all agree. */
function warmupsCount(){return !!(store&&store.settings&&store.settings.countWarmup);}
function statSet(s){return warmupsCount()||!s.warmup;}   // true = this set counts toward stats
/* F24 (2026-07-06): stats read the running workout too, so History/Charts/
   PRs/week summary/ranks update live during a workout. NOT while editing a
   past workout — its sets are already in store.workouts, so the edit copy
   would double-count. Guarded for a null/absent store.active (scripts/test.js
   drives these with minimal synthetic stores). */
function statWorkouts(){
  const ws=(store&&store.workouts)||[];
  const a=store&&store.active;
  if(a&&!a.editing&&a.entries&&a.entries.length)return [a,...ws];
  return ws;
}
function repRange(t){if(!t)return '';const lo=t.rlo,hi=t.rhi;if(lo==null&&hi==null)return '';if(lo!=null&&hi!=null)return lo===hi?String(lo):lo+'–'+hi;return String(lo!=null?lo:hi);}
function toast(msg,ms){const t=$('toast');t.textContent=msg;t.style.display='block';clearTimeout(toast._t);toast._t=setTimeout(()=>t.style.display='none',ms||2400);}
let _undo=null;
function toastUndo(msg){const t=$('toast');t.innerHTML=esc(msg)+' <button class="undo-btn" onmousedown="undoRemove()">'+T('toast.undo')+'</button>';t.style.display='block';clearTimeout(toast._t);toast._t=setTimeout(()=>{t.style.display='none';},5000);}
function finalizeUndo(){if(_undo){clearTimeout(_undo.timer);_undo=null;}$('toast').style.display='none';}
function undoRemove(){
  if(!_undo||!store.active)return;
  if(_undo.type==='set'){store.active.entries[_undo.ei].sets.splice(_undo.si,0,_undo.obj);}
  else{store.active.entries.splice(_undo.ei,0,_undo.obj);cleanSS();}
  clearTimeout(_undo.timer);_undo=null;$('toast').style.display='none';save();render();
}
const newWid=()=>'w'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);

/* ============================== store ============================== */
function freshStore(){return {schema:1, workouts:[], ex:{}, settings:{}, routines:[]};}
function normalizeStore(){
  if(!Array.isArray(store.workouts))store.workouts=[];
  if(!store.ex||typeof store.ex!=='object'||Array.isArray(store.ex))store.ex={};
  /* F53: per-exercise fields (incl. the new catRev "reviewed" flag) are never
     rewritten here — they ride whole objects through save/export/restore, so a
     kept/accepted group survives backup round-trips untouched. No backfill
     needed: absent catRev is falsy, i.e. "not yet reviewed", the correct default. */
  if(!store.settings||typeof store.settings!=='object'||Array.isArray(store.settings))store.settings={};
  if(!Array.isArray(store.routines))store.routines=[];
  store.active=store.active||null;
  store.workouts.sort((a,b)=>a.start<b.start?1:-1);
  /* one-time re-id: old 'w'+digits ids collide for same-minute starts */
  let changed=false;const seen=new Set();
  /* B4/R22: entry lists from a hand-edited backup get one shared repair —
     drop non-object items (a null entry would crash this very loop), then
     coerce each entry's sets to an array. */
  const fixEntries=o=>{
    if(!Array.isArray(o.entries)){o.entries=[];changed=true;}
    const n=o.entries.length;
    o.entries=o.entries.filter(e=>e&&typeof e==='object'&&!Array.isArray(e));
    if(o.entries.length!==n)changed=true;
    for(const e of o.entries)if(!Array.isArray(e.sets)){e.sets=[];changed=true;}
  };
  for(const w of store.workouts){if(!w.id||seen.has(w.id)){w.id=newWid();changed=true;}seen.add(w.id);
    /* B4 (sweep 2026-07-06): a hand-edited backup can lack entries/sets arrays —
       renderLog/renderStats then throw. Coerce like S4 did for top-level fields. */
    fixEntries(w);}
  /* R22 (audit 2026-07-08 A): same bar for routines — a restored backup whose
     routine lacks .exercises (or whose routine exercise lacks .sets) threw in
     renderRoutines and confirmStartInfo, bricking the Routines tab and Home's
     routine chips. */
  {const n=store.routines.length;
   store.routines=store.routines.filter(r=>r&&typeof r==='object'&&!Array.isArray(r));
   if(store.routines.length!==n)changed=true;}
  for(const r of store.routines){
    if(!Array.isArray(r.exercises)){r.exercises=[];changed=true;}
    const n=r.exercises.length;
    r.exercises=r.exercises.filter(e=>e&&typeof e==='object'&&!Array.isArray(e));
    if(r.exercises.length!==n)changed=true;
    for(const e of r.exercises)if(!Array.isArray(e.sets)){e.sets=[];changed=true;}
  }
  /* R22 (audit 2026-07-08 B): exportJson exports the whole store, active
     included — a truncated mid-workout backup can carry a malformed active
     that threw in renderHome AND renderActive: app dead on open, no healthy
     tab left to reach the Danger zone. Drop an active that isn't even an
     object; repair a workout-shaped one like any workout. */
  if(store.active&&(typeof store.active!=='object'||Array.isArray(store.active))){store.active=null;changed=true;}
  if(store.active)fixEntries(store.active);
  /* strip the junk 'undefined' set key the v0.9.6–0.9.7 wireInputs bug wrote */
  const scrub=es=>{for(const e of es||[])for(const s of e.sets||[])if('undefined' in s){delete s.undefined;changed=true;}};
  for(const w of store.workouts)scrub(w.entries);
  if(store.active)scrub(store.active.entries);
  if(changed)save();
}
let store=null, firstRun=false;
try{const raw=localStorage.getItem(KEY);if(raw){const s=JSON.parse(raw);if(s&&s.schema===1)store=s;}}catch(e){console.warn('store load failed',e);}
if(!store){store=freshStore();firstRun=true;}
normalizeStore();
function save(){
  if(store.active&&!store.active.editing)store.active.touch=Date.now();
  try{localStorage.setItem(KEY,JSON.stringify(store));}catch(e){toast(T('toast.storageFull'));console.error(e);}}

/* ============================== F60: sett:diag ==============================
   A SECOND localStorage key, wholly separate from sett:store. Holds a ring
   buffer of event/error entries (capped at DIAG_CAP, oldest dropped) plus
   per-local-day usage counters. PRIVACY BY CONSTRUCTION: nothing here ever
   touches store.workouts / store.ex — entries carry event NAMES and error text
   only, never exercise names, weights or reps. Every read/write is wrapped in
   try/catch and SILENT on failure: a broken diag layer must never break or
   toast the app (it has its own persistence, and never calls save()). */
const DIAG_KEY='sett:diag';
const DIAG_CAP=300;
function diagLoad(){
  try{const raw=localStorage.getItem(DIAG_KEY);if(raw){const d=JSON.parse(raw);
    if(d&&typeof d==='object'){if(!Array.isArray(d.log))d.log=[];if(!d.counts||typeof d.counts!=='object')d.counts={};return d;}}}
  catch(e){}
  return {log:[],counts:{}};
}
function diagPersist(d){try{localStorage.setItem(DIAG_KEY,JSON.stringify(d));}catch(e){}}
function diagStamp(){
  /* the common stamp on every entry — version, OS, install context, time. */
  return {v:APP_VERSION, os:platformOS(), sa:isStandalone(), t:nowStr()};
}
/* Record a diagnostic entry. `type` is 'error' | 'event'; `data` is a small
   object of names/text only. Ring-capped to DIAG_CAP (oldest dropped). */
function diagLog(type,data){
  try{
    const d=diagLoad();
    d.log.push(Object.assign({type:String(type)}, data||{}, diagStamp()));
    if(d.log.length>DIAG_CAP)d.log.splice(0,d.log.length-DIAG_CAP);
    diagPersist(d);
  }catch(e){}
}
/* Bump a per-local-day usage counter. O(1), silent, no store.save(). */
function diagCount(name){
  try{
    const d=diagLoad();const day=nowStr().slice(0,10);
    d.counts[day]=d.counts[day]||{};
    d.counts[day][name]=(d.counts[day][name]||0)+1;
    diagPersist(d);
  }catch(e){}
}

/* F57 (2026-07-07): factual primary + secondary muscle groups from the bundled
   catalog. catalogPrimaryGroup maps the FIRST primary muscle (.p[0]) to a group,
   falling back to the legacy .c when .p is empty. catalogGroups maps EVERY .p+.s
   muscle to its group and returns the unique set. Pure — no store reads — so the
   test shim can drive them on synthetic catalog entries. */
function catalogPrimaryGroup(vid){
  const c=CAT_BY_ID[vid];if(!c)return null;
  const p0=(c.p&&c.p[0])||null;
  const g=p0?MUSCLE_GROUP[p0]:null;
  return g||(CATS.includes(c.c)?c.c:'Other');
}
function catalogGroups(vid){
  const c=CAT_BY_ID[vid];if(!c)return [];
  const out=[];const seen=new Set();
  for(const mus of [...(c.p||[]),...(c.s||[])]){
    const g=MUSCLE_GROUP[mus];
    if(g&&!seen.has(g)){seen.add(g);out.push(g);}
  }
  if(!out.length&&CATS.includes(c.c))out.push(c.c);   // no mapped muscles → fall back to legacy .c
  return out;
}
/* F57: one-time backfill of ex.cats2 (secondary groups). For every library
   exercise with a linked vid and no cats2 field yet, set cats2 = catalogGroups
   minus the CURRENTLY-stored primary (ex.cat is the owner's — never touched here;
   the review sheet handles primary disagreements). cats2 rides whole objects
   through save/export/restore, so it survives backup round-trips untouched. */
function migrateGroups(){
  let changed=false;
  for(const m of Object.values(store.ex)){
    if(m.cats2!==undefined)continue;
    if(!m.vid||!CAT_BY_ID[m.vid]){m.cats2=[];changed=true;continue;}
    m.cats2=catalogGroups(m.vid).filter(g=>g!==m.cat);
    changed=true;
  }
  if(changed)save();
}

/* ============================== CSV import (RepCount export) ============================== */
function parseCsv(text){
  const rows=[];let field='',row=[],inQ=false;
  text=text.replace(/^﻿/,'');
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQ){
      if(c==='"'){if(text[i+1]==='"'){field+='"';i++;}else inQ=false;}
      else field+=c;
    }else if(c==='"')inQ=true;
    else if(c===';'){row.push(field);field='';}
    else if(c==='\n'){row.push(field);field='';if(row.some(f=>f!=='')||row.length>1)rows.push(row);row=[];}
    else if(c!=='\r')field+=c;
  }
  if(field!==''||row.length){row.push(field);if(row.some(f=>f!==''))rows.push(row);}
  return rows;
}
function importCsv(text){
  const rows=parseCsv(text);
  if(!rows.length||!/workout start/i.test(rows[0][0]||''))
    return {ok:false,msg:'Not a RepCount export — expected a header starting with "Workout Start".'};
  const existing=new Set(store.workouts.map(w=>w.start+'|'+w.end));
  const byKey=new Map();
  let sets=0;
  for(let i=1;i<rows.length;i++){
    const r=rows[i];if(r.length<12)continue;
    const [start,end,exRaw,weight,reps,note,kcal,dist,dur,cat,routine,bw]=r;
    const name=exRaw.trim();if(!name||!start)continue;
    const key=start+'|'+end;
    if(!byKey.has(key))byKey.set(key,{id:newWid(),start,end,
      routine:routine.trim(),bw:bw?parseFloat(bw):null,entries:[]});
    const w=byKey.get(key);
    if(routine.trim()&&!w.routine)w.routine=routine.trim();
    if(bw&&w.bw==null)w.bw=parseFloat(bw);
    ensureEx(name,cat.trim()||'Other');
    let entry=w.entries[w.entries.length-1];
    if(!entry||entry.name!==name){entry={name,ss:null,note:'',sets:[]};w.entries.push(entry);}
    entry.sets.push({
      w:weight===''?null:parseFloat(weight),
      r:reps===''?null:parseInt(reps,10),
      dur:dur===''?null:parseFloat(dur),
      dist:dist===''?null:parseFloat(dist),
      note:note.trim(),drop:false});
    sets++;
  }
  let added=0,skipped=0;
  for(const w of byKey.values()){
    if(existing.has(w.start+'|'+w.end)){skipped++;continue;}
    store.workouts.push(w);added++;
  }
  store.workouts.sort((a,b)=>a.start<b.start?1:-1);
  save();
  return {ok:true,added,skipped,sets,msg:'Imported '+added+' workouts ('+sets+' sets)'+(skipped?', skipped '+skipped+' already present':'')+'.'};
}

/* ============================== derived stats ============================== */
function allSetsOf(name,exclActive){
  const out=[];
  const ws=exclActive?((store&&store.workouts)||[]):statWorkouts();  // F24 + F26
  for(const w of ws)for(const e of w.entries)if(e.name===name)for(const s of e.sets)if(statSet(s))out.push({s,date:w.start});
  return out;
}
function exSessions(name){
  const out=[];
  for(const w of statWorkouts()){                                    // F24 + F26
    const sets=[];for(const e of w.entries)if(e.name===name)for(const s of e.sets)if(statSet(s))sets.push(s);
    if(!sets.length)continue;
    let best=null;for(const s of sets){const e1=epley(s.w,s.r);if(e1!=null&&(best==null||e1>best))best=e1;}
    out.push({date:w.start,sets,best,vol:sets.reduce((a,s)=>a+setVol(s),0)});
  }
  return out; // newest first (workouts sorted desc)
}
function prFor(name,exclActive){
  let maxW=null,maxWr=null,bestE1=null,bestSet=null,total=0,last=null;
  for(const {s,date} of allSetsOf(name,exclActive)){                 // F24: exclActive → history only (finishWorkout PR check)
    total++;if(!last||date>last)last=date;
    if(s.w!=null&&(maxW==null||s.w>maxW||(s.w===maxW&&(s.r||0)>(maxWr||0)))){maxW=s.w;maxWr=s.r;}
    const e1=epley(s.w,s.r);
    if(e1!=null&&(bestE1==null||e1>bestE1)){bestE1=e1;bestSet=s;}
  }
  return {maxW,maxWr,bestE1,bestSet,total,last,sessions:exSessions(name).length};
}
function latestBW(){for(const w of store.workouts)if(w.bw)return w.bw;return store.active&&store.active.bw||null;}

/* ============================== ranks ============================== */
function rankFor(name){
  const std=STD()[name];if(!std)return null;
  let value,unit,bw=null;
  if(std.t==='bw'){
    bw=latestBW();if(!bw)return {locked:'bw'};
    const pr=prFor(name);if(pr.bestE1==null||pr.bestE1<=0)return {locked:'data'};
    value=pr.bestE1/bw;unit='ratio';
  }else{
    let best=null;
    for(const {s} of allSetsOf(name))if((s.w==null||s.w===0)&&s.r&&(best==null||s.r>best))best=s.r;
    if(best==null)return {locked:'data'};
    value=best;unit='reps';
  }
  const s=std.s;
  let tier=0;while(tier<s.length&&value>=s[tier])tier++;
  const lo=tier===0?0:s[tier-1];
  const hi=tier<s.length?s[tier]:null;
  const prog=hi==null?1:Math.min(1,Math.max(0,(value-lo)/(hi-lo)));
  return {tier,value,unit,prog,bw,next:hi,e1:unit==='ratio'?value*bw:null};
}
function overallRank(){
  const parts=[];
  for(const name of Object.keys(STD())){
    const r=rankFor(name);
    if(r&&!r.locked)parts.push(r.tier+r.prog);
  }
  if(!parts.length)return null;
  const avg=parts.reduce((a,b)=>a+b,0)/parts.length;
  return {tier:Math.min(TIERS.length-1,Math.floor(avg)),prog:avg-Math.floor(avg),count:parts.length};
}
function rankBadge(tier,extra){
  const t=TIERS[tier];
  return '<span class="rankbadge" style="color:'+t.color+';border-color:'+t.color+'55;background:'+t.color+'14">'+t.name+(extra||'')+'</span>';
}
/* F40 (2026-07-06): what's left to rank up, from a rankFor() result. Weighted
   lifts → kg of e1RM to the next tier (next ratio × bodyweight − best e1RM,
   rounded to 0.5 kg); rep-based → reps to the next tier. Top tier (next==null)
   → a "Top tier" note with no gap. Returns {text, gap, frac, top} or null for a
   locked/absent rank. `frac` = progress fraction toward the next threshold, used
   by the Home "Closest to rank-up" card. */
function rankGap(rk){
  if(!rk||rk.locked)return null;
  const nextName=rk.tier<TIERS.length-1?TIERS[rk.tier+1].name:null;
  if(rk.next==null||!nextName)return {text:T('rank.topTier'),gap:0,frac:1,top:true};
  if(rk.unit==='reps'){
    const gap=Math.max(0,rk.next-rk.value);
    // 'to' kept as a stable separator for the Home tile split (T('rank.to')).
    return {text:gap+' '+T('u.rep')+' '+T('rank.to')+' '+nextName,gap,frac:rk.prog,top:false};
  }
  // weighted: kg of e1RM to the next ratio at the current bodyweight
  const targetKg=rk.next*rk.bw;
  const gap=Math.max(0,Math.round((targetKg-rk.e1)*2)/2);
  return {text:fmtW(gap)+' '+T('rank.kgE1')+' '+T('rank.to')+' '+nextName,gap,frac:rk.prog,top:false};
}
/* F40(b) (2026-07-06): the ranked lift closest to ranking up — highest progress
   fraction toward its next threshold, excluding top-tier lifts. Returns
   {name, rk, gap} or null (no ranked lifts, or all at top tier). Gated by the
   caller on showRanks(). */
function closestRankUp(){
  let best=null;
  for(const n of Object.keys(STD())){
    const rk=rankFor(n);if(!rk||rk.locked)continue;
    const gap=rankGap(rk);if(!gap||gap.top)continue;   // skip top-tier
    if(best==null||gap.frac>best.gap.frac)best={name:n,rk,gap};
  }
  return best;
}

function diagOnError(e){try{diagLog('error',{
  msg:String((e&&e.message)||'error'),

  stack:(e&&e.error&&e.error.stack)?String(e.error.stack).slice(0,600):'',
});}catch(_){}}
function diagOnRejection(e){try{const r=e&&e.reason;diagLog('error',{
  msg:'unhandledrejection: '+String((r&&r.message)||r||'rejection'),
  src:'',
  stack:(r&&r.stack)?String(r.stack).slice(0,600):'',
});}catch(_){}}

/* F41 (2026-07-06): monthly recap. On Home, during any month where the PREVIOUS
   calendar month logged ≥1 workout and the recap for that month hasn't been
   dismissed, show a dismissable "Your <Month>" card. All figures come from
   store.workouts (finished history — the previous month is complete, so it
   never fluctuates with a live workout). Fork SETTLED: volume in tonnes.
   records = sets that month whose e1RM beat ALL prior history for that exercise
   (running PRs); top lift = exercise in the most sessions that month; delta =
   volume vs the month before. Warmups follow statSet (F26). */
function prevMonthKey(offset){
  const d=new Date();d.setDate(1);d.setMonth(d.getMonth()-(offset||1));
  return d.getFullYear()+'-'+pad2(d.getMonth()+1);
}
function monthAgg(mk){
  let sessions=0,vol=0;const topCount={};
  for(const w of store.workouts){
    if(monthKey(w.start)!==mk)continue;
    sessions++;
    const seen=new Set();
    for(const e of w.entries){
      if(!seen.has(e.name)){seen.add(e.name);topCount[e.name]=(topCount[e.name]||0)+1;}
      for(const s of e.sets)if(statSet(s))vol+=setVol(s);
    }
  }
  return {sessions,vol,topCount};
}
function monthRecords(mk){
  /* running PRs: a set counts if its e1RM beats every prior e1RM for that
     exercise across ALL history up to (and excluding) that set. Iterate oldest
     → newest so "prior" is well-defined. */
  const asc=[...store.workouts].sort((a,b)=>a.start<b.start?-1:1);
  const bestSoFar={};let records=0;
  for(const w of asc){
    const inMonth=monthKey(w.start)===mk;
    for(const e of w.entries)for(const s of e.sets){
      if(!statSet(s))continue;
      const e1=epley(s.w,s.r);if(e1==null||e1<=0)continue;
      const prev=bestSoFar[e.name];
      if(prev==null||e1>prev){if(inMonth)records++;bestSoFar[e.name]=e1;}
    }
  }
  return records;
}
function monthlyRecap(){
  const mk=prevMonthKey(1);
  if(store.settings&&store.settings.recapDismissed===mk)return null;   // dismissed
  const a=monthAgg(mk);
  if(!a.sessions)return null;                                          // no prior-month workouts
  const prev=monthAgg(prevMonthKey(2));
  const top=Object.entries(a.topCount).sort((x,y)=>y[1]-x[1])[0]||null;
  const records=monthRecords(mk);
  // delta vs the month before (volume)
  let delta=null;
  if(prev.vol>0){
    const pct=Math.round((a.vol-prev.vol)/prev.vol*100);
    const prevName=monthName(+prevMonthKey(2).slice(5)-1);
    delta={pct,up:pct>0,prevName};
  }
  return {mk,monthName:monthName(+mk.slice(5)-1),sessions:a.sessions,vol:a.vol,records,top,delta};
}
function recapCardHtml(){
  const r=monthlyRecap();if(!r)return '';
  const tonnes=(r.vol/1000).toFixed(1)+' t';
  let deltaHtml='';
  if(r.delta){
    const word=r.delta.pct>0?T('rec.up'):r.delta.pct<0?T('rec.down'):T('rec.flat');
    const col=r.delta.up?'var(--good)':'var(--muted)';
    deltaHtml='<div class="tiny" style="color:'+col+';margin-top:8px;font-weight:700">'+T('rec.volume')+' '+word+
      (r.delta.pct!==0?' '+Math.abs(r.delta.pct)+'%':'')+' '+T('rec.vs')+' '+esc(r.delta.prevName)+'</div>';
  }
  return '<div class="card" style="background:var(--accent-soft);border-color:color-mix(in srgb, var(--accent) 35%, var(--line))">'+
    '<div class="row" style="align-items:flex-start"><h3 class="grow" style="margin:0">'+T('rec.your',esc(r.monthName))+'</h3>'+
    /* F56 (2026-07-07): the old margin:-4px -4px pulled the ✕ 4px outside the
       card. Keep it inside the padding box (small top nudge only, no negative
       right margin). */
    '<button class="iconbtn" title="'+T('rec.dismiss')+'" aria-label="'+T('rec.dismiss')+'" data-mk="'+esc(r.mk)+'" onclick="dismissRecap(this.dataset.mk)" style="width:28px;height:28px;margin:-2px 0 0 6px;flex:none">✕</button></div>'+
    '<div class="statgrid" style="margin-top:10px">'+
      '<div class="stat"><div class="v">'+r.sessions+'</div><div class="l">'+T('rec.sessions')+'</div></div>'+
      '<div class="stat"><div class="v">'+tonnes+'</div><div class="l">'+T('st.volume')+'</div></div>'+
      '<div class="stat"><div class="v">'+r.records+'</div><div class="l">'+plur('u.record',r.records)+'</div></div>'+
    '</div>'+
    (r.top?'<div class="tiny muted" style="margin-top:10px">'+T('rec.topLift')+' · <b style="color:var(--text)">'+esc(r.top[0])+'</b> ×'+r.top[1]+'</div>':'')+
    deltaHtml+
    '</div>';
}

function startRoutine(id){

  for(const ex of r.exercises)ensureEx(ex.name);

    entries:r.exercises.map(ex=>({name:ex.name,ss:ex.ss??null,note:'',
      /* Item 5 (2026-07-08): seed each ghost from your ACTUAL last session of this
         exercise (like Repeat workout does) — falling back to the routine's planned
         target only when you've never logged it. Before, a routine always showed the
         frozen template, so kg/reps from your last session never appeared. */
      sets:ex.sets.map((t,si)=>({w:null,r:null,dur:null,dist:null,note:'',drop:false,
        tgt:prevSessionSet(ex.name,si)||{tw:t.tw??null,rlo:t.rlo??null,rhi:t.rhi??null}}))}))};
  diagCount('workoutStarted');save();setView('log');toast(T('start.started',r.name));

function startPopular(i){

    /* Item 5 (2026-07-08): seed the ghost from your last session of each exercise (null → "—" when never logged). */
    entries:r.ex.map(n=>({name:n,ss:null,note:'',sets:[{w:null,r:null,dur:null,dist:null,note:'',drop:false,tgt:prevSessionSet(n,0)}]}))};

/* F33 (2026-07-06) OWNER SPEC, verbatim: "Pressing on a routine/previous
   workout shouldn't instantly start a new workout, let the user confirm if
   they want to start it." A petite confirm sheet — name + N exercises · M sets
   summary + a primary Start; normal sheet dismissals cancel. The existing
   "finish or discard current workout first" guard fires BEFORE the confirm
   (no point confirming what can't start). Dataset pattern keeps the
   apostrophe foot-gun out of the Start handler. */
/* F43 (2026-07-07) OWNER SPEC, verbatim: "Start workout screen doesn't show
   what type of routine/exercises it has." Fork SETTLED (variant A): each row is
   the exercise name (left) and its muscle group + set count (right, muted). No
   last-time numbers. Sourced per kind: routine → r.exercises (name, sets.length);
   popular → POPULAR_ROUTINES[i].ex (one set each); repeat → w.entries. Every name
   escaped; muscle group from store.ex[name].cat with an 'Other' fallback. The
   modal system scrolls, so a long list scrolls inside the sheet. Returns
   {name, rows:[{name,cat,sets}]} — pure, so it's directly testable. */
function confirmStartInfo(kind,arg){
  if(kind==='routine'){const r=store.routines.find(x=>x.id===arg);if(!r)return null;
    return {name:r.name,rows:r.exercises.map(e=>({name:e.name,cat:(store.ex[e.name]||{}).cat||'Other',sets:e.sets.length}))};}
  if(kind==='popular'){const r=POPULAR_ROUTINES[arg];if(!r)return null;
    return {name:r.name,rows:r.ex.map(n=>({name:n,cat:(store.ex[n]||{}).cat||'Other',sets:1}))};}
  if(kind==='repeat'){const w=store.workouts.find(x=>x.id===arg);if(!w)return null;
    return {name:w.routine||T('home.workout'),rows:w.entries.map(e=>({name:e.name,cat:(store.ex[e.name]||{}).cat||'Other',sets:e.sets.length}))};}
  return null;
}

  const mon=new Date(now);mon.setHours(0,0,0,0);mon.setDate(now.getDate()-day);

function lastTimeHint(name){

    const top=e.sets.reduce((a,s)=>setVol(s)>setVol(a)?s:a,e.sets[0]);

/* F25 (2026-07-06): compact live stats line under the exercise footer —
   today's volume · best set this session · standing PR e1RM (accent).
   Recomputed on every keystroke (wireInputs) so it tracks typed values.
   Warmups follow the same setting as the rest of the stats. */
function cardStatsLine(ei){
  const e=store.active&&store.active.entries[ei];if(!e)return '';
  let vol=0,best=null,bestS=null;
  for(const s of e.sets){if(!statSet(s))continue;vol+=setVol(s);
    const v=setVol(s);if(v>0&&(best==null||v>best)){best=v;bestS=s;}}
  const pr=prFor(e.name,true).bestE1;   // standing PR from HISTORY only (excludes this live session)
  const parts=[T('live.vol')+' '+fmtNum(vol)+' kg'];
  if(bestS)parts.push(T('live.best')+' '+fmtW(bestS.w)+'×'+(bestS.r||0));
  parts.push('<b>'+T('live.prE1')+' '+(pr!=null?fmtW(pr)+' kg':'—')+'</b>');
  return parts.join(' · ');
}
/* F36 (2026-07-06): the PR moment. A live set that beats the PRE-WORKOUT record
   lights up as it's typed. Baseline records EXCLUDE store.active (records as of
   workout start), so the comparison is honest. Weighted lifts → e1RM record;
   rep-based lifts (bodyweight sets, w null/0) → best-reps record. Never while

/* ===================== F87: factual substitute exercises (2026-07-08) =====================
   Owner: "Useful if a machine is taken, or you don't want to do that particular
   exercise… It has to be factual, so the replacements need to make sense and not
   just be based on vibes and instead real data." Ranks CATALOG exercises by REAL
   muscle overlap with the current exercise's linked catalog entry: a shared PRIMARY
   muscle weighs most, then primary↔secondary crossover, then a shared secondary,
   with a small nudge for the same movement category. Deterministic from .p/.s/.c —
   no LLM, no guessing. Equipment DIFFERENCE is surfaced as a feature (machine taken
   → free-weight alt for the same muscle), never penalised. Picking one runs the F84
   replace path (keeps sets, re-seeds ghosts from the substitute's own history). */
function substituteRank(vid){
  const c0=CAT_BY_ID[vid];if(!c0)return [];
  const p0=new Set((c0.p||[]).map(m=>m.toLowerCase()));
  const s0=new Set((c0.s||[]).map(m=>m.toLowerCase()));
  const out=[];
  for(const id in CAT_BY_ID){
    if(id===vid)continue;
    const c=CAT_BY_ID[id];
    const p=(c.p||[]).map(m=>m.toLowerCase()), s=(c.s||[]).map(m=>m.toLowerCase());
    let sc=0;
    for(const m of p)if(p0.has(m))sc+=10;   // shared primary muscle — the strongest signal
    for(const m of p)if(s0.has(m))sc+=3;     // its primary is our secondary
    for(const m of s)if(p0.has(m))sc+=3;     // its secondary is our primary
    for(const m of s)if(s0.has(m))sc+=1;     // shared secondary
    if(sc===0)continue;                       // no muscle overlap → not a substitute
    if(c.c===c0.c)sc+=2;                       // same movement category, small nudge
    out.push({id,c,sc,diffEquip:(c.q||'')!==(c0.q||'')});
  }
  out.sort((a,b)=>b.sc-a.sc || a.c.n.localeCompare(b.c.n));
  return out.slice(0,15);
}
function openSubstitute(ei){
  const a=store.active;if(!a)return;const e=a.entries[ei];if(!e)return;
  const vid=(store.ex[e.name]||{}).vid;
  if(!vid||!CAT_BY_ID[vid]){toast(T('sub.noData'));return;}
  const list=substituteRank(vid);
  let h='<h2>'+T('sub.title')+'</h2><p class="tiny muted" style="margin-bottom:8px">'+T('sub.help')+'</p>';
  if(!list.length){h+='<p class="muted" style="margin-top:12px">'+T('sub.none')+'</p>';}
  else{
    /* F63 law: inline dataset onclick so restored rows keep their taps after a push→pop. */
    for(const r of list){
      const c=r.c;const primary=catalogPrimaryGroup(r.id)||(CATS.includes(c.c)?c.c:'Other');
      h+='<div class="listrow" data-sub-ei="'+ei+'" data-sub-id="'+esc(r.id)+'" onclick="pickSubstitute(this.dataset.subEi,this.dataset.subId)" style="cursor:pointer">'+
        '<img class="thumb" loading="lazy" src="exercises/'+esc(r.id)+'/0.jpg" alt="">'+
        '<div class="grow"><div style="font-weight:600">'+esc(c.n)+'</div>'+
        '<div class="row" style="gap:4px;margin-top:3px;flex-wrap:wrap">'+catChip(primary)+
          (r.diffEquip&&c.q?'<span class="chip sec2">'+esc(c.q)+'</span>':'')+'</div></div>'+
        '</div>';
    }
  }
  openModal(h);
}

let restTimer=null, restEnd=0, restTotal=0, _actx=null;
function restDefault(){return (store.settings&&store.settings.restTime)||90;}
function restAutoOn(){return !(store.settings&&store.settings.restAuto===false);}
function setRestTime(sec){sec=Math.max(15,Math.min(600,sec));store.settings=store.settings||{};store.settings.restTime=sec;save();render();}
function setRestAuto(on){store.settings=store.settings||{};store.settings.restAuto=on;save();render();}
function primeBeep(){try{_actx=_actx||new (window.AudioContext||window.webkitAudioContext)();if(_actx.state==='suspended')_actx.resume();}catch(e){}}
function beep(){try{if(!_actx)return;const t=_actx.currentTime;const o=_actx.createOscillator(),g=_actx.createGain();
  o.frequency.value=880;o.connect(g);g.connect(_actx.destination);
  g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(.35,t+.02);g.gain.exponentialRampToValueAtTime(.0001,t+.45);
  o.start(t);o.stop(t+.5);}catch(e){}}
function startRest(sec){
  primeBeep();
  restTotal=sec||restDefault();restEnd=Date.now()+restTotal*1000;
  $('restbar').classList.add('show');
  clearInterval(restTimer);restTimer=setInterval(tickRest,200);tickRest();
}
function tickRest(){
  const leftMs=restEnd-Date.now();
  drawRestBar(Math.max(0,Math.ceil(leftMs/1000)),false);
  if(leftMs<=0)finishRest();
}
function drawRestBar(left,done){
  $('restbar').innerHTML='<div class="inner'+(done?' done':'')+'">'+
    '<div><div class="rlabel">'+(done?T('rest.done'):T('rest.label'))+'</div>'+
    '<div class="rt">'+Math.floor(left/60)+':'+pad2(left%60)+'</div></div>'+
    '<span style="flex:1"></span>'+
    (done?'<button onclick="stopRest()">'+T('rest.dismiss')+'</button>':
      '<button onclick="addRest(-15)">−15</button><button onclick="addRest(15)">+15</button>'+
      '<button onclick="stopRest()">'+T('rest.skip')+'</button>')+'</div>';
}
function addRest(d){restEnd+=d*1000;const now=Date.now();if(restEnd<now+1000)restEnd=now+1000;
  if(restEnd-now>restTotal*1000)restTotal=Math.ceil((restEnd-now)/1000);tickRest();}
function finishRest(){
  clearInterval(restTimer);restTimer=null;
  drawRestBar(0,true);beep();if(navigator.vibrate)navigator.vibrate([120,60,120]);
  clearTimeout(finishRest._t);finishRest._t=setTimeout(stopRest,6000);
}
function stopRest(){clearInterval(restTimer);restTimer=null;clearTimeout(finishRest._t);
  const b=$('restbar');b.classList.remove('show');b.innerHTML='';}
/* ============================== drag-to-reorder (active workout) ============================== */
let drag=null;
function dragCards(){return [...document.querySelectorAll('#main .excard')];}
function startDrag(e,handle){
  if(!store.active)return;
  const card=handle.closest('.excard');if(!card)return;
  const cards=dragCards();
  drag={pid:e.pointerId,card,from:+card.dataset.ei,startY:e.clientY,
    centers:cards.map(c=>{const r=c.getBoundingClientRect();return r.top+r.height/2;}),target:+card.dataset.ei};
  try{handle.setPointerCapture(e.pointerId);}catch(_){}
  card.classList.add('dragging');
  document.addEventListener('pointermove',onDragMove,{passive:false});
  document.addEventListener('pointerup',onDragEnd);
  document.addEventListener('pointercancel',onDragEnd);
  e.preventDefault();
}
function onDragMove(e){
  if(!drag)return;e.preventDefault();
  drag.card.style.transition='none';
  drag.card.style.transform='translateY('+(e.clientY-drag.startY)+'px)';
  drag.card.style.position='relative';drag.card.style.zIndex='20';
  let ti=0;for(const c of drag.centers)if(e.clientY>c)ti++;
  ti=Math.max(0,Math.min(drag.centers.length,ti));drag.target=ti;
  const f=drag.from, slot=drag.card.offsetHeight+24; // card height + vertical margin
  dragCards().forEach((c,i)=>{
    if(i===f)return;
    let shift=0;
    if(f<ti){if(i>f&&i<ti)shift=-slot;}       // dragging down: cards above the gap slide up
    else if(ti<f){if(i>=ti&&i<f)shift=slot;}  // dragging up: cards below the gap slide down
    c.style.transition='transform .18s cubic-bezier(.22,.61,.36,1)';
    c.style.transform=shift?'translateY('+shift+'px)':'';
  });
}
function onDragEnd(){
  if(!drag)return;
  document.removeEventListener('pointermove',onDragMove);
  document.removeEventListener('pointerup',onDragEnd);
  document.removeEventListener('pointercancel',onDragEnd);
  const from=drag.from;let to=drag.target;if(to>from)to--;
  drag=null;
  dragCards().forEach(c=>{c.classList.remove('dragging');c.style.transition='';c.style.transform='';c.style.position='';c.style.zIndex='';});
  if(store.active&&to!==from&&to>=0){
    const es=store.active.entries;const [m]=es.splice(from,1);es.splice(to,0,m);save();render();
  }
}

function finishWorkout(){
  const a=store.active;
  const entries=a.entries.map(e=>({...e,sets:e.sets.filter(s=>s.w!=null||s.r!=null||s.dur!=null||s.dist!=null).map(({tgt,done,...s})=>s)})).filter(e=>e.sets.length);
  if(!entries.length){toast(T('fin.logFirst'));return;}
  if(a.editing){
    const idx=store.workouts.findIndex(x=>x.id===a.editing);
    const w={id:a.editing,start:a.start,end:a.end||a.start,routine:a.routine.trim(),bw:a.bw||null,entries};
    for(const e of entries)ensureEx(e.name);
    if(idx>=0)store.workouts[idx]=w;else store.workouts.unshift(w);
    store.workouts.sort((x,y)=>x.start<y.start?1:-1);
    store.active=null;save();toast(T('fin.updated'));setView('log');
    return;
  }
  // PR check against history before saving
  const prs=[];
  for(const e of entries){
    const before=prFor(e.name,true).bestE1;   // F24: compare against HISTORY only, not the workout being finished
    let best=null;for(const s of e.sets){if(!statSet(s))continue;const v=epley(s.w,s.r);if(v!=null&&(best==null||v>best))best=v;}
    if(best!=null&&best>0&&(before==null||best>before))prs.push({name:e.name,e1:best});
    ensureEx(e.name);
  }
  const w={id:newWid(),start:a.start,end:nowStr(),routine:a.routine.trim(),bw:a.bw||null,entries};
  store.workouts.unshift(w);store.workouts.sort((x,y)=>x.start<y.start?1:-1);
  store.active=null;diagCount('workoutFinished');save();clearInterval(tick);
  const vol=entries.reduce((t,e)=>t+e.sets.reduce((x,s)=>x+(statSet(s)?setVol(s):0),0),0);   // F26
  const nsets=entries.reduce((t,e)=>t+e.sets.length,0);
  /* F48: the worst dead-space offender — moved to the centered dialog. */
  openDialog('<div style="text-align:center;margin-bottom:6px">'+badgerSVG(64)+'</div>'+
    '<h2 style="margin-bottom:4px;text-align:center">'+T('fin.saved')+'</h2>'+
    '<p class="muted small" style="text-align:center;margin-bottom:'+(prs.length?'12px':'16px')+'">'+fmtDur(w.start,w.end)+' · '+nPlur('u.set',nsets)+' · '+T('u.kgVol',fmtNum(vol))+'</p>'+
    (prs.length?'<div class="card"><h3>'+T('fin.newRecords')+'</h3>'+prs.map(p=>'<div class="listrow" style="cursor:default"><div class="grow">'+esc(p.name)+'</div><b style="color:var(--good)">e1RM '+fmtW(p.e1)+' kg</b></div>').join('')+'</div>':'')+
    '<button class="btn primary wide" onclick="closeModal();setView(\'log\')">'+T('fin.nice')+'</button>');
  render();
}

/* F52: the ~6 most recently TRAINED distinct exercise names, newest-first.
   store.workouts is always newest-first (never re-sorted here) so first-seen
   order over its entries is the recency order. Only names still in the library. */
function recentExercises(limit){
  limit=limit||6;const out=[];const seen=new Set();
  for(const w of store.workouts){
    for(const e of w.entries){
      const n=e.name;
      if(!n||seen.has(n)||!store.ex[n])continue;
      seen.add(n);out.push(n);
      if(out.length>=limit)return out;
    }
  }

}

    }).join('')+'</div>';
  }
  const counts={},sec={};
  for(const n of names){

  h+='<div class="mgrid">'+CATS.filter(c=>counts[c]||sec[c]).map(c=>
